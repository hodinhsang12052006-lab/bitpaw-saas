<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitPaw Ad Assistant – Trợ lý quảng cáo AI</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #08061a;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            padding: 1.5rem;
            position: relative;
        }
        
        /* 3D Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.85;
            pointer-events: none;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .absolute-blur {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 500px;
            background: rgba(6, 182, 212, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            border-color: #06b6d4;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        
        @keyframes float-logo {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float { animation: float-logo 4s ease-in-out infinite; }

        .chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        .chat-toggle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(6,182,212,0.5);
            transition: 0.2s;
        }
        .chat-toggle:hover { transform: scale(1.05); }
        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            background: rgba(10, 15, 37, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.4);
            border-radius: 1.5rem;
            overflow: hidden;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .chat-window.open { display: flex; }
        .chat-header {
            padding: 12px 16px;
            background: rgba(6,182,212,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-input-area {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 8px 16px;
            color: white;
            outline: none;
        }
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 1rem;
            font-size: 0.85rem;
        }
        .user-message {
            background: #06b6d4;
            color: black;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-message {
            background: rgba(255,255,255,0.1);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        
        .tab-button {
            background: transparent;
            border: none;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            color: #9ca3af;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab-button.active {
            color: #06b6d4;
            border-bottom-color: #06b6d4;
        }
        .tab-content { display: none; padding: 16px 0; }
        .tab-content.active { display: block; }
        
        .copy-btn {
            cursor: pointer;
            transition: 0.1s;
        }
        .copy-btn:hover { color: #06b6d4; }
        
        .fb-mockup {
            background: #1e1e2f;
            border-radius: 12px;
            padding: 12px;
            max-width: 380px;
            margin: 0 auto;
        }
        .fb-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .fb-avatar {
            width: 40px;
            height: 40px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .fb-caption { font-size: 13px; margin: 10px 0; }
        .fb-img-placeholder {
            height: 200px;
            background: #2d3748;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #718096;
        }
        
        .tt-mockup {
            background: #111;
            border-radius: 20px;
            padding: 12px;
            max-width: 320px;
            margin: 0 auto;
            position: relative;
        }
        .tt-video {
            aspect-ratio: 9 / 16;
            background: #2d3748;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        @media (max-width: 1024px) {
            .grid-cols-2 { grid-template-columns: 1fr; }
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #06b6d4;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== CSKH WIDGET STYLES (lấy từ POS) ========== */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(6,182,212,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }
        .glass-input-sm {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }
        .glass-input-sm:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6,182,212,0.3);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-color: #ef4444;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10003;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="laser-vertical"></div>
    <div class="absolute-blur"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="relative z-10 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <div class="relative w-12 h-12 logo-float">
                    <div class="absolute inset-0 rounded-full border-2 border-cyan-500/50 animate-ping opacity-20"></div>
                    <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-full h-full rounded-full border-2 border-cyan-400 object-cover shadow-[0_0_15px_#06b6d4]">
                </div>
                <h1 class="text-2xl font-bold">Bit<span class="text-cyan-400">Paw</span> <span class="text-gray-400 text-lg">Ad Assistant</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button type="button" id="langToggleBtn" class="bg-white/10 hover:bg-white/20 text-white px-3 py-2 rounded-full text-xs font-bold transition" title="Switch language / Đổi ngôn ngữ">EN</button>
                <a href="/" class="text-gray-400 hover:text-white text-sm"><span data-i18n="ad_assistant_back_dashboard">← Về Dashboard</span></a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Cột trái: Form + Chart -->
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-4" data-i18n="ad_assistant_campaign_info_title">🚀 Thông tin chiến dịch</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1" data-i18n="ad_assistant_product_name_label">Tên sản phẩm / Dịch vụ</label>
                        <input type="text" id="productName" class="w-full bg-black/30 border border-white/10 rounded-lg p-2 text-white" placeholder="VD: Áo thun thể thao" data-i18n-placeholder="ad_assistant_product_name_placeholder">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1" data-i18n="ad_assistant_product_desc_label">Mô tả (tuỳ chọn)</label>
                        <textarea id="productDesc" rows="2" class="w-full bg-black/30 border border-white/10 rounded-lg p-2 text-white" placeholder="Mô tả ngắn về sản phẩm" data-i18n-placeholder="ad_assistant_product_desc_placeholder"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1"><span data-i18n="ad_assistant_budget_label">Ngân sách</span> (<span id="budgetCurrencyUnit">{{ 'USD' if tenant_currency == 'USD' else 'VNĐ' }}</span>)</label>
                        <input type="number" id="budget" value="2000000" class="w-full bg-black/30 border border-white/10 rounded-lg p-2 text-white" step="100000">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1" data-i18n="ad_assistant_platform_label">Nền tảng</label>
                        <select id="platform" class="w-full bg-black/30 border border-white/10 rounded-lg p-2 text-white">
                            <option value="facebook">Facebook / Instagram</option>
                            <option value="tiktok">TikTok</option>
                            <option value="google">Google Ads</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1" data-i18n="ad_assistant_audience_label">Đối tượng mục tiêu (tuổi, sở thích)</label>
                        <div class="flex gap-2">
                            <input type="number" id="ageMin" placeholder="Tuổi min" class="w-1/2 bg-black/30 border border-white/10 rounded-lg p-2 text-white" value="18" data-i18n-placeholder="ad_assistant_age_min_placeholder">
                            <input type="number" id="ageMax" placeholder="Tuổi max" class="w-1/2 bg-black/30 border border-white/10 rounded-lg p-2 text-white" value="35" data-i18n-placeholder="ad_assistant_age_max_placeholder">
                        </div>
                        <input type="text" id="interests" placeholder="Sở thích (cách nhau dấu phẩy)" class="w-full mt-2 bg-black/30 border border-white/10 rounded-lg p-2 text-white" value="thể thao, thời trang" data-i18n-placeholder="ad_assistant_interests_placeholder">
                    </div>
                    <button id="createCampaignBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-2 rounded-lg font-bold mt-2 relative">
                        <span id="btnText" data-i18n="ad_assistant_create_campaign_btn">🚀 Lấy gợi ý AI & Tạo chiến dịch</span>
                        <span id="btnLoading" class="loading-spinner hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></span>
                    </button>
                    <div id="campaignResult" class="text-sm mt-2 hidden"></div>
                </div>

                <div class="mt-8">
                    <h3 class="font-bold text-sm mb-2 text-cyan-400" data-i18n="ad_assistant_forecast_title">📈 Dự phóng hiệu quả (7 ngày)</h3>
                    <canvas id="roiChart" height="200" style="max-height: 200px;"></canvas>
                    <p class="text-xs text-gray-400 text-center mt-2" data-i18n="ad_assistant_forecast_note">*Dữ liệu mô phỏng, thay đổi theo ngân sách</p>
                </div>
            </div>

            <!-- Cột phải: Gợi ý AI -->
            <div class="glass-card p-6">
                <div class="flex border-b border-white/10 mb-4">
                    <button class="tab-button active" data-tab="abtest">A/B Testing</button>
                    <button class="tab-button" data-tab="preview">Live Preview</button>
                </div>
                
                <div id="abtestTab" class="tab-content active">
                    <div class="space-y-4" id="abContentContainer">
                        <!-- Sẽ được render bằng JS -->
                    </div>
                </div>
                
                <div id="previewTab" class="tab-content">
                    <div id="livePreviewContainer" class="flex justify-center">
                        <!-- Mockup -->
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4 mt-6">
            <div class="cskh-widget">
                <h3 class="text-sm font-bold text-cyan-400 mb-2 flex items-center gap-2"><i class="fas fa-comment-dots"></i> <span data-i18n="ad_assistant_support_title">Gửi yêu cầu hỗ trợ</span></h3>
                <form id="supportForm" class="space-y-2">
                    <input type="text" id="supportName" placeholder="Tên của bạn" class="glass-input-sm" required data-i18n-placeholder="ad_assistant_support_name_placeholder">
                    <input type="text" id="supportPhone" placeholder="Số điện thoại / Zalo" class="glass-input-sm" required data-i18n-placeholder="ad_assistant_support_phone_placeholder">
                    <textarea id="supportMessage" rows="2" placeholder="Nội dung cần hỗ trợ..." class="glass-input-sm" required data-i18n-placeholder="ad_assistant_support_message_placeholder"></textarea>
                    <button type="submit" class="w-full bg-cyan-600/80 hover:bg-cyan-500 text-white font-bold py-2 rounded-xl text-sm transition" data-i18n="ad_assistant_support_submit_btn">Gửi yêu cầu</button>
                </form>
                <div id="supportStatus" class="text-xs text-center mt-2 text-gray-400"></div>
            </div>
        </div>
    </div>

    <!-- Chatbox AI -->
    <div class="chat-container">
        <div class="chat-toggle" id="chatToggle">
            <i class="fas fa-comment-dots text-2xl text-white"></i>
        </div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span><i class="fas fa-robot text-cyan-400"></i> <span data-i18n="ad_assistant_chat_header">AI Trợ lý quảng cáo</span></span>
                <i class="fas fa-times cursor-pointer" id="closeChat"></i>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message" data-i18n="ad_assistant_chat_welcome">Chào bạn! Hãy chat với tôi, ví dụ: "Lên chiến dịch bán giày thể thao 5 triệu trên TikTok"</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Nhập yêu cầu..." data-i18n-placeholder="ad_assistant_chat_input_placeholder">
                <button id="sendChat" class="bg-cyan-500 px-4 py-2 rounded-full text-black font-bold" data-i18n="ad_assistant_chat_send_btn">Gửi</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="bg-black/80 rounded-2xl p-6 flex flex-col items-center gap-3 border border-cyan-500/30"><i class="fas fa-spinner fa-spin text-3xl text-cyan-400"></i><span class="text-sm" data-i18n="ad_assistant_processing">Đang xử lý...</span></div></div>

        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function tf(key, params) {
            let str = t(key);
            for (const k in params) str = str.split(`{${k}}`).join(params[k]);
            return str;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerHTML = t(el.getAttribute('data-i18n'));
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
            });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
            fetchSuggestions();
        }
        document.addEventListener('DOMContentLoaded', applyStaticTranslations);
        applyStaticTranslations();
        const langToggleBtn = document.getElementById('langToggleBtn');
        if (langToggleBtn) {
            langToggleBtn.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));
        }

        // ========== TOAST & LOADING ==========
        const toast = document.getElementById('toast');
        function showToast(msg, isError = false) {
            toast.innerText = msg;
            toast.className = 'toast ' + (isError ? 'error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        const loadingOverlay = document.getElementById('loadingOverlay');
        function showLoading(show) {
            if (show) loadingOverlay.classList.add('active');
            else loadingOverlay.classList.remove('active');
        }

        // ==================== CHART (dự phóng client-side) ====================
        let roiChart = null;
        function updateChart(budget) {
            const baseClick = Math.floor(budget / 10000);
            const days = ['T+1', 'T+2', 'T+3', 'T+4', 'T+5', 'T+6', 'T+7'];
            const clicks = days.map(() => Math.floor(baseClick * (0.7 + Math.random() * 0.6)));
            const ctx = document.getElementById('roiChart').getContext('2d');
            if (roiChart) roiChart.destroy();
            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days,
                    datasets: [{
                        label: 'Lượt click dự kiến',
                        data: clicks,
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6,182,212,0.1)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#a855f7'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#ccc' } },
                        tooltip: { callbacks: { label: (ctx) => ctx.raw.toLocaleString() + ' clicks' } }
                    },
                    scales: {
                        y: { ticks: { color: '#aaa' } },
                        x: { ticks: { color: '#aaa' } }
                    }
                }
            });
        }

        // ==================== RENDER A/B TESTING TỪ API ====================
        function renderSuggestions(suggestions) {
            const container = document.getElementById('abContentContainer');
            if (!suggestions || !suggestions.headlines || !suggestions.descriptions) {
                container.innerHTML = `<p class="text-gray-400">${t('ad_assistant_no_suggestions')}</p>`;
                return;
            }
            const headlines = suggestions.headlines;
            const descriptions = suggestions.descriptions;
            const cardData = [
                { type: 'fomo', label: t('ad_assistant_card_fomo'), headline: headlines[0] || '', desc: descriptions[0] || '', cta: t('ad_assistant_cta_buy_now') },
                { type: 'story', label: t('ad_assistant_card_story'), headline: headlines[1] || headlines[0] || '', desc: descriptions[1] || descriptions[0] || '', cta: t('ad_assistant_cta_experience') },
                { type: 'trend', label: t('ad_assistant_card_trend'), headline: headlines[2] || headlines[0] || '', desc: descriptions[2] || descriptions[0] || '', cta: t('ad_assistant_cta_view_now') }
            ];
            container.innerHTML = cardData.map(card => `
                <div class="glass-card p-4">
                    <div class="flex justify-between items-start">
                        <div><span class="text-emerald-400 font-bold">${card.label}</span></div>
                        <i class="fas fa-copy copy-btn text-gray-400" data-headline="${escapeHtml(card.headline)}" data-desc="${escapeHtml(card.desc)}"></i>
                    </div>
                    <h4 class="font-bold mt-2">${card.headline}</h4>
                    <p class="text-sm text-gray-300 mt-1">${card.desc}</p>
                    <div class="mt-2 text-xs text-cyan-400">${t('ad_assistant_cta_label')} ${card.cta}</div>
                </div>
            `).join('');
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const headline = btn.getAttribute('data-headline');
                    const desc = btn.getAttribute('data-desc');
                    navigator.clipboard.writeText(headline + "\n" + desc);
                    alert(t('ad_assistant_copied'));
                });
            });
            const platform = document.getElementById('platform').value;
            updateLivePreview(platform, headlines[0] || '', descriptions[0] || '');
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // ==================== GỌI API LẤY GỢI Ý ====================
        async function fetchSuggestions() {
            const productName = document.getElementById('productName').value.trim();
            if (!productName) {
                showToast(t('ad_assistant_enter_product_name'), true);
                return;
            }
            const body = {
                product_name: productName,
                product_desc: document.getElementById('productDesc').value.trim(),
                target_audience: {
                    age_min: parseInt(document.getElementById('ageMin').value) || 18,
                    age_max: parseInt(document.getElementById('ageMax').value) || 65,
                    interests: document.getElementById('interests').value.split(',').map(s => s.trim()).filter(s => s)
                },
                budget: parseInt(document.getElementById('budget').value) || 1000000,
                platform: document.getElementById('platform').value
            };
            try {
                const response = await fetch('/ad-assistant/api/suggest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                if (data.success) {
                    renderSuggestions(data.suggestions);
                } else {
                    showToast(t('ad_assistant_error_prefix') + (data.error || t('ad_assistant_cannot_get_suggestions')), true);
                }
            } catch (err) {
                showToast(t('ad_assistant_connection_error'), true);
            }
        }

        // ==================== GỌI API TẠO CHIẾN DỊCH ====================
        async function createCampaign() {
            const productName = document.getElementById('productName').value.trim();
            if (!productName) {
                showToast(t('ad_assistant_enter_product_name'), true);
                return;
            }
            const body = {
                platform: document.getElementById('platform').value,
                name: productName + " - " + new Date().toLocaleDateString(),
                objective: 'OUTCOME_TRAFFIC',
                budget: parseFloat(document.getElementById('budget').value) || 1000000,
                access_token: '',
                ad_account_id: ''
            };
            try {
                const response = await fetch('/ad-assistant/api/create-campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                if (data.success) {
                    return data.campaign_id;
                } else {
                    throw new Error(data.error || t('ad_assistant_campaign_create_failed'));
                }
            } catch (err) {
                showToast(t('ad_assistant_error_prefix') + err.message, true);
                return null;
            }
        }

        // ==================== NÚT CHÍNH ====================
        const createBtn = document.getElementById('createCampaignBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const campaignResult = document.getElementById('campaignResult');

        createBtn.addEventListener('click', async () => {
            createBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            campaignResult.classList.add('hidden');

            await fetchSuggestions();
            const campaignId = await createCampaign();

            if (campaignId) {
                campaignResult.innerHTML = `${t('ad_assistant_campaign_created')} <span class="text-cyan-400 font-mono">${campaignId}</span>`;
            } else {
                campaignResult.innerHTML = t('ad_assistant_campaign_pending');
            }
            campaignResult.classList.remove('hidden');

            createBtn.disabled = false;
            btnText.classList.remove('hidden');
            btnLoading.classList.add('hidden');
        });

        // ==================== CHAT AI ====================
        const chatToggle = document.getElementById('chatToggle');
        const chatWindow = document.getElementById('chatWindow');
        const closeChat = document.getElementById('closeChat');
        const sendChat = document.getElementById('sendChat');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');

        chatToggle.addEventListener('click', () => chatWindow.classList.toggle('open'));
        closeChat.addEventListener('click', () => chatWindow.classList.remove('open'));

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function parseMessage(msg) {
            const lower = msg.toLowerCase();
            let productName = t('ad_assistant_default_product_name');
            let budgetVal = 3000000;
            let platformVal = "facebook";
            const productMatch = msg.match(/bán\s+([a-zA-ZÀ-ỹ\s]+?)(?:\s+\d+\s*tr|trên|\s+với|\s+giá)/i);
            if (productMatch) productName = productMatch[1].trim();
            const moneyMatch = msg.match(/(\d+)\s*tr/i);
            if (moneyMatch) budgetVal = parseInt(moneyMatch[1]) * 1000000;
            if (lower.includes("tiktok")) platformVal = "tiktok";
            else if (lower.includes("facebook") || lower.includes("fb")) platformVal = "facebook";
            else if (lower.includes("google")) platformVal = "google";
            return { productName, budgetVal, platformVal };
        }

        function autoFillFormAndFetch(productName, budgetVal, platformVal) {
            document.getElementById('productName').value = productName;
            document.getElementById('budget').value = budgetVal;
            document.getElementById('platform').value = platformVal;
            updateChart(budgetVal);
            fetchSuggestions();
        }

        sendChat.addEventListener('click', async () => {
            const userMsg = chatInput.value.trim();
            if (!userMsg) return;
            addMessage(userMsg, true);
            chatInput.value = '';
            addMessage(t('ad_assistant_chat_analyzing'), false);
            const { productName, budgetVal, platformVal } = parseMessage(userMsg);
            autoFillFormAndFetch(productName, budgetVal, platformVal);
            setTimeout(() => {
                if (chatMessages.lastChild) chatMessages.removeChild(chatMessages.lastChild);
                addMessage(tf('ad_assistant_chat_filled', { name: productName, platform: platformVal, budget: budgetVal.toLocaleString() }), false);
            }, 2500);
        });
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat.click(); });

        // ==================== TAB SWITCHING ====================
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                if (tabId === 'abtest') document.getElementById('abtestTab').classList.add('active');
                else document.getElementById('previewTab').classList.add('active');
            });
        });

        // ==================== FORM THAY ĐỔI ====================
        const budgetInput = document.getElementById('budget');
        const productInput = document.getElementById('productName');
        const platformSelect = document.getElementById('platform');
        budgetInput.addEventListener('input', () => updateChart(parseInt(budgetInput.value) || 0));
        productInput.addEventListener('input', () => {}); // placeholder
        platformSelect.addEventListener('change', () => {
            const headlines = document.querySelectorAll('#abContentContainer h4');
            const descs = document.querySelectorAll('#abContentContainer p.text-gray-300');
            if (headlines.length > 0) {
                updateLivePreview(platformSelect.value, headlines[0].innerText, descs[0].innerText);

        // CSKH track click + form hỗ trợ: gom về static/js/cskh_track.js (dùng chung,
        // gọi /api/cskh/click + /api/cskh/request qua Flask/MongoDB) — xem <script> nạp cuối trang.

        // ==================== KHỞI TẠO ====================
        updateChart(2000000);
        fetchSuggestions();

        // ==================== 3D BACKGROUND ====================
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 700 : 1500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x06b6d4, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const starCount = 100;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.07, y: (Math.random() - 0.5) * 0.1 - 0.04, z: (Math.random() - 0.5) * 0.03 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.09, color: 0xffaa88, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            scene.fog = new THREE.FogExp2(0x08061a, 0.008);

            let mouseX = 0, mouseY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();
                material.color.setHSL((t * 0.03) % 1, 0.8, 0.6);
                particles.rotation.y = t * 0.02;
                particles.rotation.x = t * 0.01;
                particles.rotation.y += 0.5 * (mouseX * 0.5 - particles.rotation.y);
                particles.rotation.x += 0.5 * (mouseY * 0.5 - particles.rotation.x);
                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
