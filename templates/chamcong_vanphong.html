<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Công Văn Phòng - BitPaw OS</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #08061a; color: white; margin: 0; padding: 0; overflow-x: hidden;}
        
        /* Three.js Background */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.8; pointer-events: none; }

        /* Smooth Scroll Lenis */
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }

        /* Hiệu ứng scanline và laser dọc */
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed; top: 0; left: 0; width: 1px; height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        /* Tia sáng chéo */
        .light-ray { position: absolute; background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.3), transparent); height: 2px; width: 150%; transform: rotate(-35deg); transform-origin: left; pointer-events: none; }
        
        /* Khối mờ */
        .absolute-blur {
            position: absolute;
            top: -10%;
            left: 20%;
            width: 600px;
            height: 600px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 10px; }
        
        .excel-input { width: 100%; background: transparent; border: 1px solid transparent; color: #fff; padding: 8px; border-radius: 6px; outline: none; transition: all 0.2s; text-align: center; font-family: monospace; }
        .excel-input:focus, .excel-input:hover { background: rgba(255,255,255,0.05); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 10px rgba(6,182,212,0.1); }
        ::-webkit-calendar-picker-indicator { filter: invert(1) sepia(1) saturate(5) hue-rotate(175deg); cursor: pointer; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Hiệu ứng Kudo */
        .kudo-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .kudo-card:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 20px rgba(6, 182, 212, 0.2); }
        .crown-glow { filter: drop-shadow(0 0 8px rgba(250, 204, 21, 0.8)); }

        /* Mini 3D Hologram Logo */
        .hologram-mini { perspective: 800px; transform-style: preserve-3d; display: flex; justify-content: center; align-items: center; }
        @keyframes float-mini {
            0% { transform: translateY(0px) rotateX(5deg) rotateY(-5deg); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-10px) rotateX(-5deg) rotateY(10deg); filter: drop-shadow(0 15px 15px rgba(168, 85, 247, 0.6)); }
            100% { transform: translateY(0px) rotateX(5deg) rotateY(-5deg); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .animated-mini-3d { animation: float-mini 4s ease-in-out infinite; position: relative; z-index: 10; }
        @keyframes scan-laser { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scanner-line { position: absolute; width: 120%; height: 2px; background: #06b6d4; box-shadow: 0 0 10px #06b6d4; left: -10%; animation: scan-laser 2.5s linear infinite; z-index: 20; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen flex text-white font-sans overflow-hidden relative">
    
    <!-- Các lớp hiệu ứng nền -->
    <div class="scan-line"></div>
    <div class="laser-vertical"></div>
    <div class="light-ray top-0 -left-[20%] z-0"></div>
    <div class="light-ray top-[60%] -left-[50%] opacity-40 z-0"></div>
    <div class="absolute-blur"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[700px] h-[700px] bg-cyan-600/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <!-- ThreeJS Particles -->
    <canvas id="bg-canvas"></canvas>

    <!-- Sidebar (đã bổ sung đầy đủ menu) -->
    {% include 'components/app_sidebar.html' %}

    <!-- Main Content (giữ nguyên toàn bộ chức năng) -->
    <main class="flex-1 p-8 lg:p-10 overflow-y-auto relative z-10 h-screen" id="scroll-container">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl lg:text-4xl font-black tracking-tight flex items-center gap-3">
                    <span data-i18n="chamcong_vanphong_title_prefix">Chấm Công</span> <span class="text-blue-500 drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]" data-i18n="chamcong_vanphong_title_name">Văn Phòng</span> <i class="fas fa-laptop-code text-cyan-400 animate-pulse"></i>
                </h2>
                <p class="text-gray-400 mt-2 flex items-center gap-2">
                    <i class="far fa-calendar-alt text-cyan-400"></i> <span data-i18n="chamcong_vanphong_date_label">Ngày ghi nhận:</span> <strong id="currentDate" class="text-white">--/--/----</strong>
                </p>
            </div>
            <div class="flex gap-3">
                <button onclick="markAllPresent()" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 hover:scale-105 border border-emerald-500/50 text-white px-5 py-2.5 rounded-xl transition-all text-sm font-bold flex items-center gap-2 shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                    <i class="fas fa-check-double"></i> <span data-i18n="chamcong_vanphong_btn_mark_all">Điểm danh hàng loạt</span>
                </button>
                <a href="chamcong.html" class="bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 px-4 py-2.5 rounded-xl transition-colors text-sm font-bold flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> <span data-i18n="chamcong_vanphong_btn_back">Quay lại</span>
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-black/40 backdrop-blur-md border border-cyan-500/20 rounded-3xl p-6 shadow-2xl group">
                <h3 class="font-black text-cyan-400 uppercase tracking-widest text-sm flex items-center gap-2 mb-4 group-hover:text-white transition-colors">
                    <i class="fas fa-paper-plane"></i> <span data-i18n="chamcong_vanphong_leave_title">Xin Phép Siêu Tốc</span>
                </h3>
                <div class="flex gap-3">
                    <select id="nv_xin_phep" class="flex-1 bg-black/60 border border-white/10 rounded-xl p-3 text-white text-sm outline-none focus:border-cyan-400 transition-colors"></select>
                    <select id="loai_nghi" class="w-40 bg-black/60 border border-white/10 rounded-xl p-3 text-white text-sm outline-none focus:border-cyan-400 transition-colors">
                        <option value="Nghỉ Phép" data-i18n="chamcong_vanphong_leave_full">Nghỉ Phép</option>
                        <option value="Nửa ngày" data-i18n="chamcong_vanphong_leave_half">Nghỉ Nửa Ngày</option>
                        <option value="Làm việc từ xa (WFH)" data-i18n="chamcong_vanphong_leave_wfh">Làm việc từ xa (WFH)</option>
                        <option value="Gặp khách hàng" data-i18n="chamcong_vanphong_leave_client">Đi gặp khách</option>
                    </select>
                </div>
                <input type="text" id="ly_do_nghi" placeholder="Lý do (VD: Khám bệnh, Họp đối tác)..." data-i18n-placeholder="chamcong_vanphong_leave_reason_placeholder" class="w-full bg-black/60 border border-white/10 rounded-xl p-3 text-white text-sm outline-none focus:border-cyan-400 mt-3 mb-3 transition-colors">
                <button onclick="duyetNghiPhep()" class="w-full bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500 hover:text-black font-black py-3 rounded-xl transition-all text-sm tracking-widest uppercase border border-cyan-500/30 hover:shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                    <i class="fas fa-stamp mr-2"></i> <span data-i18n="chamcong_vanphong_leave_approve_btn">Duyệt Nhanh & Trừ Phép</span>
                </button>
            </div>

            <div class="bg-gradient-to-br from-blue-900/30 to-black border border-blue-500/20 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 text-9xl text-blue-500/10 pointer-events-none hover:rotate-12 transition-transform duration-500"><i class="fas fa-medal"></i></div>
                <h3 class="font-black text-blue-400 uppercase tracking-widest text-sm flex items-center gap-2 mb-4 relative z-10">
                    <i class="fas fa-star text-yellow-400 animate-pulse"></i> <span data-i18n="chamcong_vanphong_kudos_title">Bảng Vinh Danh (Kudos)</span>
                </h3>
                <div id="kudoList" class="grid grid-cols-1 md:grid-cols-2 gap-3 relative z-10 h-[140px] overflow-y-auto pr-2 custom-scrollbar">
                    <div class="text-sm text-gray-500 animate-pulse" data-i18n="chamcong_vanphong_kudos_loading">Đang tải bảng xếp hạng...</div>
                </div>
            </div>
        </div>

        <div class="bg-white/[0.02] backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden overflow-x-auto mb-20">
            <table class="min-w-full text-left border-collapse whitespace-nowrap">
                <thead class="bg-black/40 border-b border-cyan-500/30 text-cyan-400 text-xs xl:text-sm uppercase tracking-wider font-bold">
                    <tr>
                        <th class="px-6 py-4 border-r border-white/5 w-64" data-i18n="chamcong_vanphong_th_info">Thông tin Nhân sự</th>
                        <th class="px-2 py-4 w-32 text-center border-r border-white/5"><i class="fas fa-sign-in-alt text-emerald-400 mr-1"></i> <span data-i18n="chamcong_vanphong_th_in">Giờ IN</span></th>
                        <th class="px-2 py-4 w-32 text-center border-r border-white/5"><i class="fas fa-sign-out-alt text-rose-400 mr-1"></i> <span data-i18n="chamcong_vanphong_th_out">Giờ OUT</span></th>
                        <th class="px-2 py-4 w-32 text-center border-r border-white/5"><i class="fas fa-business-time text-purple-400 mr-1"></i> <span data-i18n="chamcong_vanphong_th_ot">Tăng Ca (h)</span></th>
                        <th class="px-4 py-4 w-48 text-center border-r border-white/5" data-i18n="chamcong_vanphong_th_status">Trạng thái</th>
                        <th class="px-6 py-4 w-32 text-center" data-i18n="chamcong_vanphong_th_action">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="officeTable" class="divide-y divide-white/5 text-gray-300 text-sm xl:text-base">
                    <tr><td colspan="6" class="text-center py-10 text-gray-500 animate-pulse" data-i18n="chamcong_vanphong_loading">Đang tải dữ liệu từ máy chủ...</td</tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-3"></div>

    <script>
        // ========================================================
        // TÍCH HỢP HIỆU ỨNG (LENIS, THREE.JS, TILT)
        // ========================================================
        const lenis = new Lenis({
            wrapper: document.getElementById('scroll-container'),
            content: document.querySelector('main > div'),
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true
        });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        VanillaTilt.init(document.querySelectorAll("[data-tilt]"));

        // Three.js Particles Background (Cyan, giống chamcong_spa)
        if(document.getElementById('bg-canvas')) {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesCount = 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for(let i = 0; i < particlesCount * 3; i++) { positions[i] = (Math.random() - 0.5) * 120; }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({ size: 0.15, color: 0x06b6d4, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const clock = new THREE.Clock();
            function animateBg() {
                requestAnimationFrame(animateBg);
                const elapsedTime = clock.getElapsedTime();
                particles.rotation.y = elapsedTime * 0.03;
                particles.rotation.x = elapsedTime * 0.01;
                renderer.render(scene, camera);
            }
            animateBg();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function fireConfettiSide() {
            var duration = 2000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#06b6d4', '#3b82f6'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#06b6d4', '#3b82f6'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        // ========================================================
        // LOGIC CHÍNH — Flask API nội bộ (db.employees/db.chamcong), thay Supabase JS.
        // TODO: Tech Debt - Merge db.chamcong (ma_nv) into db.attendance (staff_id) in Phase 5
        // ========================================================
        async function hrApi(path, options) {
            const res = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options && options.headers) },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                throw new Error(body.error || `Lỗi máy chủ (${res.status})`);
            }
            return body;
        }

        const rawDate = new Date();
        const formattedDate = `${String(rawDate.getDate()).padStart(2, '0')}/${String(rawDate.getMonth() + 1).padStart(2, '0')}/${rawDate.getFullYear()}`;
        document.getElementById('currentDate').innerText = formattedDate;

        let globalEmployees = [];

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : 'bg-rose-500/20 border-rose-500/50 text-rose-400';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle';
            toast.className = `flex items-center px-6 py-4 rounded-xl border backdrop-blur-md shadow-2xl transform transition-all duration-500 translate-x-full opacity-0 ${bgColor}`;
            toast.innerHTML = `<i class="fas ${icon} mr-3 text-xl"></i><span class="font-bold">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        async function loadOffice() {
            try {
                const empsBody = await hrApi('/api/hr/employees?sort=diem_kudo_desc');
                const emps = empsBody.data || [];
                globalEmployees = emps;

                const recordsBody = await hrApi(`/api/hr/chamcong?ngay_cham=${encodeURIComponent(formattedDate)}&nganh_nghe=${encodeURIComponent('Văn Phòng')}`);
                const records = recordsBody.data || [];

                document.getElementById('nv_xin_phep').innerHTML = '<option value="">-- Chọn NV xin phép --</option>' + emps.map(e => `<option value="${e.ma_nv}">${e.ho_ten}</option>`).join('');

                renderKudoBoard(emps);

                const tbody = document.getElementById('officeTable');
                if(emps.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-gray-500">${t('chamcong_vanphong_no_staff')}</td></tr>`;
                    return;
                }

                let html = '';
                emps.forEach(emp => {
                    const todayRecord = records ? records.find(r => r.ma_nv === emp.ma_nv) : null;
                    const isSaved = todayRecord ? true : false;
                    
                    const status = isSaved ? todayRecord.trang_thai : '';
                    const gioIn = isSaved ? todayRecord.gio_den : '';
                    const gioOut = isSaved ? todayRecord.gio_ve : '';
                    const ot = isSaved ? todayRecord.tang_ca : '';
                    const note = (isSaved && todayRecord.ghi_chu) ? `<p class="text-[10px] text-gray-400 mt-1"><i class="fas fa-info-circle mr-1 text-cyan-500"></i>${todayRecord.ghi_chu}</p>` : '';

                    const btnUI = isSaved
                        ? `<button class="bg-emerald-500/20 text-emerald-400 font-bold p-2.5 rounded-xl w-full flex items-center justify-center gap-2 cursor-not-allowed opacity-50"><i class="fas fa-check"></i> ${t('chamcong_vanphong_btn_saved')}</button>`
                        : `<button id="btn_${emp.ma_nv}" onclick="saveRow('${emp.ma_nv}')" class="bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500 hover:text-black font-black tracking-widest p-2.5 rounded-xl transition-all w-full flex items-center justify-center gap-2 border border-cyan-500/30 hover:shadow-[0_0_15px_rgba(6,182,212,0.4)] uppercase text-xs"><i class="fas fa-save text-lg"></i> ${t('chamcong_vanphong_btn_save')}</button>`;

                    html += `
                        <tr class="hover:bg-white/[0.05] transition-colors group border-b border-white/5">
                            <td class="px-6 py-4 border-r border-white/5">
                                <div class="font-bold text-white flex items-center gap-2 text-base">
                                    ${emp.ho_ten}
                                    ${emp.diem_kudo > 0 ? `<span class="text-[9px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded border border-blue-500/30"><i class="fas fa-star mr-1 text-yellow-400"></i>${emp.diem_kudo}</span>` : ''}
                                </div>
                                <div class="text-[10px] text-cyan-400 font-mono mt-1 bg-cyan-500/10 px-2 py-0.5 rounded inline-block border border-cyan-500/20">${emp.ma_nv} | ${emp.chuc_vu || t('chamcong_vanphong_default_role')}</div>
                                ${note}
                            </td>
                            <td class="px-2 py-4 border-r border-white/5"><input type="time" id="in_${emp.ma_nv}" value="${gioIn}" class="excel-input text-emerald-300 font-bold" ${isSaved?'disabled':''}></td>
                            <td class="px-2 py-4 border-r border-white/5"><input type="time" id="out_${emp.ma_nv}" value="${gioOut}" class="excel-input text-rose-300 font-bold" ${isSaved?'disabled':''}></td>
                            <td class="px-2 py-4 border-r border-white/5"><input type="number" id="ot_${emp.ma_nv}" value="${ot}" step="0.5" placeholder="0" class="excel-input text-purple-400 font-bold" ${isSaved?'disabled':''}></td>
                            <td class="px-2 py-4 border-r border-white/5">
                                <select id="status_${emp.ma_nv}" class="excel-input text-sm appearance-none cursor-pointer font-bold" ${isSaved?'disabled':''}>
                                    <option value="" class="bg-gray-900">-- ${t('chamcong_vanphong_status_none')} --</option>
                                    <option value="Có mặt" class="bg-gray-900 text-emerald-400" ${status === 'Có mặt' ? 'selected' : ''}>✅ ${t('chamcong_vanphong_status_present')}</option>
                                    <option value="Nửa ngày" class="bg-gray-900 text-yellow-400" ${status === 'Nửa ngày' ? 'selected' : ''}>🌤️ ${t('chamcong_vanphong_status_halfday')}</option>
                                    <option value="Làm việc từ xa (WFH)" class="bg-gray-900 text-blue-400" ${status === 'Làm việc từ xa (WFH)' ? 'selected' : ''}>💻 ${t('chamcong_vanphong_status_wfh')}</option>
                                    <option value="Gặp khách hàng" class="bg-gray-900 text-orange-400" ${status === 'Gặp khách hàng' ? 'selected' : ''}>🤝 ${t('chamcong_vanphong_status_client')}</option>
                                    <option value="Nghỉ Phép" class="bg-gray-900 text-pink-400" ${status === 'Nghỉ Phép' ? 'selected' : ''}>❌ ${t('chamcong_vanphong_status_leave')}</option>
                                </select>
                            </td>
                            <td class="px-6 py-4 text-center">
                                ${btnUI}
                            </td>
                        </tr>`;
                });
                tbody.innerHTML = html;

                emps.forEach(emp => {
                    const inInput = document.getElementById(`in_${emp.ma_nv}`);
                    if(inInput && !inInput.disabled) {
                        inInput.addEventListener('change', function() {
                            if(this.value) document.getElementById(`status_${emp.ma_nv}`).value = "Có mặt";
                        });
                    }
                });

            } catch(e) { console.log(e); }
        }

        function renderKudoBoard(emps) {
            const list = document.getElementById('kudoList');
            list.innerHTML = '';
            
            const topEmps = emps.filter(e => e.diem_kudo > 0).slice(0, 4);
            
            if(topEmps.length === 0) {
                list.innerHTML = `<div class="col-span-2 text-gray-500 text-xs italic">${t('chamcong_vanphong_kudos_empty')}</div>`; return;
            }

            const colors = ['border-yellow-400 text-yellow-400', 'border-gray-300 text-gray-300', 'border-amber-600 text-amber-600', 'border-blue-500/30 text-blue-400'];

            topEmps.forEach((emp, index) => {
                const color = colors[index] || colors[3];
                const isTop1 = index === 0;
                const crown = isTop1 ? '<i class="fas fa-crown text-yellow-400 absolute -top-3 left-1/2 transform -translate-x-1/2 text-lg crown-glow z-20"></i>' : '';
                const avatar = emp.avatar_url ? `<img src="${emp.avatar_url}" class="w-full h-full object-cover">` : emp.ho_ten.charAt(0);
                
                list.innerHTML += `
                    <div class="kudo-card bg-black/40 border ${isTop1 ? 'border-yellow-500/50 shadow-[0_0_10px_rgba(250,204,21,0.2)]' : 'border-white/5'} rounded-xl p-3 flex items-center gap-3 cursor-default">
                        <div class="text-lg font-black ${color} w-4">${index + 1}</div>
                        <div class="relative">
                            ${crown}
                            <div class="w-10 h-10 rounded-full bg-gray-800 border-2 ${color} flex items-center justify-center font-bold text-white overflow-hidden shrink-0 relative z-10">${avatar}</div>
                        </div>
                        <div class="min-w-0 flex-1">
                            <p class="text-xs font-bold ${isTop1 ? 'text-yellow-400' : 'text-white'} truncate">${emp.ho_ten}</p>
                            <p class="text-[10px] text-gray-400"><i class="fas fa-star text-yellow-400 mr-1"></i>${emp.diem_kudo} BitPaw</p>
                        </div>
                    </div>
                `;
            });
        }

        async function duyetNghiPhep() {
            const ma_nv = document.getElementById('nv_xin_phep').value;
            const loai_nghi = document.getElementById('loai_nghi').value;
            const ly_do = document.getElementById('ly_do_nghi').value.trim();

            if(!ma_nv) return showToast(t('chamcong_vanphong_toast_pick_staff'), "error");

            try {
                await hrApi('/api/hr/chamcong', {
                    method: 'POST',
                    body: JSON.stringify({
                        ngay_cham: formattedDate,
                        ma_nv: ma_nv,
                        trang_thai: loai_nghi,
                        ghi_chu: ly_do ? `[HR Đã Duyệt] ${ly_do}` : `[HR Đã Duyệt] Không có lý do`,
                        nganh_nghe: 'Văn Phòng'
                    }),
                });

                showToast(tf('chamcong_vanphong_toast_leave_approved', { loai_nghi }), "success");

                document.getElementById('nv_xin_phep').value = '';
                document.getElementById('ly_do_nghi').value = '';
                loadOffice();
            } catch(e) {
                showToast(t('chamcong_vanphong_toast_leave_error'), "error");
            }
        }

        async function saveRow(ma_nv) {
            const gio_in = document.getElementById(`in_${ma_nv}`).value;
            const gio_out = document.getElementById(`out_${ma_nv}`).value;
            const ot_hours = document.getElementById(`ot_${ma_nv}`).value || 0;
            const status = document.getElementById(`status_${ma_nv}`).value;
            
            if(!status) {
                showToast(t('chamcong_vanphong_toast_pick_status'), "error");
                document.getElementById(`status_${ma_nv}`).focus();
                return;
            }

            let so_gio = 0;
            if(gio_in && gio_out) {
                const [hIn, mIn] = gio_in.split(':').map(Number);
                const [hOut, mOut] = gio_out.split(':').map(Number);
                let diff = (hOut * 60 + mOut) - (hIn * 60 + mIn);
                if (diff < 0) diff += 24 * 60; // Bù ngày cho ca làm vắt qua nửa đêm
                so_gio = parseFloat((diff / 60).toFixed(2));
            } else if (status === 'Có mặt' && gio_in && !gio_out) {
                so_gio = 8; 
            }

            const btn = document.getElementById(`btn_${ma_nv}`);
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;

            try {
                await hrApi('/api/hr/chamcong', {
                    method: 'POST',
                    body: JSON.stringify({
                        ngay_cham: formattedDate,
                        ma_nv: ma_nv,
                        nganh_nghe: 'Văn Phòng',
                        trang_thai: status,
                        gio_den: gio_in || null,
                        gio_ve: gio_out || null,
                        so_gio: so_gio,
                        tang_ca: parseFloat(ot_hours)
                    }),
                });

                showToast(tf('chamcong_vanphong_toast_saved', { ma_nv }), "success");
                fireConfettiSide();

                btn.className = "bg-emerald-500/20 text-emerald-400 font-bold p-2.5 rounded-xl w-full flex items-center justify-center gap-2 cursor-not-allowed opacity-50 border-none";
                btn.innerHTML = `<i class="fas fa-check"></i> ${t('chamcong_vanphong_btn_saved')}`; btn.disabled = true;
                document.getElementById(`in_${ma_nv}`).disabled = true;
                document.getElementById(`out_${ma_nv}`).disabled = true;
                document.getElementById(`ot_${ma_nv}`).disabled = true;
                document.getElementById(`status_${ma_nv}`).disabled = true;

            } catch(e) {
                showToast(t('chamcong_vanphong_toast_conn_error'), "error");
                btn.innerHTML = `<i class="fas fa-save text-lg"></i> ${t('chamcong_vanphong_btn_save')}`;
            }
        }

        function markAllPresent() {
            const rows = document.querySelectorAll('#officeTable tr');
            let count = 0;
            rows.forEach(row => {
                const timeIn = row.querySelector('input[type="time"]');
                const status = row.querySelector('select');
                if(timeIn && status && !timeIn.value && !timeIn.disabled) {
                    timeIn.value = "08:00";
                    status.value = "Có mặt";
                    count++;
                }
            });
            if(count > 0) {
                showToast(tf('chamcong_vanphong_toast_markall_done', { count }), "success");
                fireConfettiSide();
            } else {
                showToast(t('chamcong_vanphong_toast_markall_none'), "error");
            }
