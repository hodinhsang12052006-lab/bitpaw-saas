<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BitPaw | Chốt đơn bán hàng</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #08061a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 1.5rem;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.85;
            pointer-events: none;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .absolute-blur {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 500px;
            background: rgba(6, 182, 212, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: rgba(10, 15, 37, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.35);
            border-radius: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }
        
        @keyframes float-logo {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float {
            animation: float-logo 4s ease-in-out infinite;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.2rem;
            padding: 0.75rem 1rem;
            width: 100%;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .glass-input:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        .glass-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.2rem;
            padding: 0.75rem 1rem;
            width: 100%;
            color: white;
            cursor: pointer;
        }
        .glass-select option {
            background: #0f111a;
        }
        
        .product-preview {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.5rem;
            padding: 1.2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .product-img {
            width: 70px;
            height: 70px;
            border-radius: 1rem;
            object-fit: cover;
            background: rgba(0,0,0,0.5);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        /* CSKH Widget */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(6,182,212,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }
        .glass-input-sm {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }
        .glass-input-sm:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6,182,212,0.3);
        }
        
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .glass-card { padding: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="laser-vertical"></div>
    <div class="absolute-blur"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="w-full max-w-lg relative z-10">
        <div class="flex justify-center mb-6">
            <div class="relative w-14 h-14 logo-float">
                <div class="absolute inset-0 rounded-full border-2 border-cyan-500/50 animate-ping opacity-20"></div>
                <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-full h-full rounded-full border-2 border-cyan-400 object-cover shadow-[0_0_15px_#06b6d4]">
            </div>
        </div>
        
        <div class="glass-card p-6 md:p-8">
            <div class="flex justify-end mb-2">
                <button type="button" id="langToggleBtn" class="bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-full text-xs font-bold transition" title="Switch language / Đổi ngôn ngữ">EN</button>
            </div>
            <h2 class="text-2xl md:text-3xl font-black text-center mb-6">
                <span class="text-cyan-400" data-i18n="sell_header_title">🛒 Chốt đơn</span> <span class="text-gray-300 text-xl" data-i18n="sell_header_subtitle">| Bán hàng nhanh</span>
            </h2>

            <div class="product-preview mb-6">
                <!-- Ảnh sản phẩm -->
                <div class="product-img flex items-center justify-center text-3xl bg-black/50" id="productImgContainer">
                    🍽️
                </div>
                <div class="flex-1">
                    <h3 class="text-lg font-bold text-white" id="productName">Loading...</h3>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-2xl font-black text-cyan-400" id="productPrice">0₫</span>
                        <span class="text-xs text-gray-400 bg-black/30 px-2 py-1 rounded-full">📦 <span data-i18n="sell_stock_label">Tồn:</span> <span id="productStock">0</span></span>
                    </div>
                </div>
            </div>

            <form id="sellForm" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1 ml-1" data-i18n="sell_quantity_label">Số lượng</label>
                    <div class="flex gap-3 items-center">
                        <button type="button" id="decrQty" class="w-10 h-10 rounded-full bg-cyan-500/20 border border-cyan-500/50 text-cyan-400 hover:bg-cyan-500/40 transition">-</button>
                        <input type="number" name="quantity" id="quantityInput" required value="1" min="1" class="glass-input text-center text-xl font-bold w-24">
                        <button type="button" id="incrQty" class="w-10 h-10 rounded-full bg-cyan-500/20 border border-cyan-500/50 text-cyan-400 hover:bg-cyan-500/40 transition">+</button>
                    </div>
                </div>

                <div class="bg-black/40 rounded-xl p-3 flex justify-between items-center border border-white/10">
                    <span class="text-sm font-bold text-gray-400" data-i18n="sell_total_label">Tổng thanh toán</span>
                    <span id="totalPreview" class="text-2xl font-black text-cyan-400">0₫</span>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1 ml-1" data-i18n="sell_payment_method_label">Phương thức thanh toán</label>
                    <select name="payment_method" id="paymentMethod" class="glass-select">
                        <option value="cash" data-i18n="sell_pm_cash">💵 Tiền mặt</option>
                        <option value="bank" data-i18n="sell_pm_bank">🏦 Chuyển khoản</option>
                        <option value="momo" data-i18n="sell_pm_momo">📱 Momo</option>
                        <option value="card" data-i18n="sell_pm_card">💳 Thẻ ngân hàng</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1 ml-1" data-i18n="sell_note_label">Ghi chú (tuỳ chọn)</label>
                    <textarea name="note" id="note" rows="2" class="glass-input resize-none" placeholder="VD: Giao hàng, quà tặng, ..." data-i18n-placeholder="sell_note_placeholder"></textarea>
                </div>

                <div class="pt-3 space-y-3">
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)] flex items-center justify-center gap-2">
                        <i class="fas fa-check-circle"></i> <span data-i18n="sell_submit_btn">Xác nhận bán hàng</span>
                    </button>
                    {% if tenant_country == 'US' %}
                    <button type="button" id="squareSellBtn" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-[0_0_15px_rgba(99,102,241,0.4)] flex items-center justify-center gap-2">
                        <i class="fab fa-square"></i> <span data-i18n="sell_square_btn">Pay with Square / Credit Card</span>
                    </button>
                    {% endif %}
                    <a href="{{ url_for('index') }}" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-left"></i> <span data-i18n="sell_back_dashboard_btn">Quay lại Dashboard</span>
                    </a>
                </div>
            </form>
        </div>

    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="bg-black/70 rounded-2xl p-6 flex flex-col items-center gap-3 border border-cyan-500/30">
            <i class="fas fa-spinner fa-pulse text-3xl text-cyan-400"></i>
            <span class="text-sm font-medium text-gray-200" data-i18n="sell_processing">Đang xử lý đơn hàng...</span>
        </div>
    </div>
    <div id="toast" class="toast" data-i18n="sell_toast_default">Thông báo</div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // ========== SUPABASE CONFIG ==========
        const supabaseUrl = 'https://iojtglaxgdwsxxalhubx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvanRnbGF4Z2R3c3h4YWxodWJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjgzNTIsImV4cCI6MjA5MzE0NDM1Mn0.KA7wdsZsK3oA6ybi5Gl_KnkzAKZM-ESI3Eyzx-mipwM';
        let supabase = createClient(supabaseUrl, supabaseKey);
        // Nâng cấp lên client có JWT business_id để RLS lọc đúng tenant.
        const supabaseReady = fetch('/api/session/supabase_token', { credentials: 'same-origin' })
            .then(res => res.json())
            .then(json => {
                if (json && json.success) {
                    supabase = createClient(supabaseUrl, supabaseKey, { global: { headers: { Authorization: `Bearer ${json.token}` } } });
                } else {
                    console.error('Không lấy được tenant token:', json && json.error);
                }
                return supabase;
            })
            .catch(e => { console.error('Lỗi khi gọi /api/session/supabase_token:', e); return supabase; });

        // Lấy thông tin sản phẩm từ URL (product id)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('product_id') ? parseInt(urlParams.get('product_id')) : null;
        if (!productId) {
            window.location.href = "{{ url_for('index') }}";
        }

        let currentProduct = null;
        let maxStock = 0;
        let productPrice = 0;

        // ========== MULTI-REGION: CURRENCY & LANGUAGE ==========
        const TENANT_CURRENCY = "{{ tenant_currency }}";
        const TENANT_COUNTRY = "{{ tenant_country }}";
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";

        function formatMoney(amount) {
            const value = Number(amount) || 0;
            if (TENANT_CURRENCY === 'USD') {
                return '$' + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
            return Math.round(value).toLocaleString('vi-VN') + '₫';
        }

        const translations = {
            vi: {
                sell_header_title: '🛒 Chốt đơn',
                sell_header_subtitle: '| Bán hàng nhanh',
                sell_stock_label: 'Tồn:',
                sell_quantity_label: 'Số lượng',
                sell_total_label: 'Tổng thanh toán',
                sell_payment_method_label: 'Phương thức thanh toán',
                sell_pm_cash: '💵 Tiền mặt',
                sell_pm_bank: '🏦 Chuyển khoản',
                sell_pm_momo: '📱 Momo',
                sell_pm_card: '💳 Thẻ ngân hàng',
                sell_note_label: 'Ghi chú (tuỳ chọn)',
                sell_note_placeholder: 'VD: Giao hàng, quà tặng, ...',
                sell_submit_btn: 'Xác nhận bán hàng',
                sell_square_btn: 'Thanh toán Square / Thẻ tín dụng',
                sell_back_dashboard_btn: 'Quay lại Dashboard',
                sell_processing: 'Đang xử lý đơn hàng...',
                sell_submit_processing: 'Đang xử lý...',
                sell_toast_default: 'Thông báo',
                sell_toast_product_not_found: 'Sản phẩm không tồn tại',
                sell_toast_load_error: 'Lỗi tải sản phẩm: ',
                sell_toast_invalid_qty: 'Số lượng không hợp lệ!',
                sell_toast_qty_exceeds_stock: 'Số lượng vượt quá tồn kho ({stock})',
                sell_toast_sale_success: '✅ Bán hàng thành công! Đơn hàng đã được ghi nhận.',
                sell_toast_error: '❌ Lỗi: ',
                sell_toast_fill_all_fields: 'Vui lòng nhập đầy đủ thông tin',
                sell_toast_support_sent: '✅ Yêu cầu đã gửi! Chúng tôi sẽ liên hệ lại trong 15 phút.',
                sell_toast_generic_error: 'Lỗi: '
            },
            en: {
                sell_header_title: '🛒 Checkout',
                sell_header_subtitle: '| Quick Sale',
                sell_stock_label: 'Stock:',
                sell_quantity_label: 'Quantity',
                sell_total_label: 'Total',
                sell_payment_method_label: 'Payment Method',
                sell_pm_cash: '💵 Cash',
                sell_pm_bank: '🏦 Bank Transfer',
                sell_pm_momo: '📱 Momo',
                sell_pm_card: '💳 Card',
                sell_note_label: 'Note (optional)',
                sell_note_placeholder: 'E.g.: Delivery, gift, ...',
                sell_submit_btn: 'Confirm Sale',
                sell_square_btn: 'Pay with Square / Credit Card',
                sell_back_dashboard_btn: 'Back to Dashboard',
                sell_processing: 'Processing order...',
                sell_submit_processing: 'Processing...',
                sell_toast_default: 'Notification',
                sell_toast_product_not_found: 'Product not found',
                sell_toast_load_error: 'Error loading product: ',
                sell_toast_invalid_qty: 'Invalid quantity!',
                sell_toast_qty_exceeds_stock: 'Quantity exceeds stock ({stock})',
                sell_toast_sale_success: '✅ Sale successful! Order has been recorded.',
                sell_toast_error: '❌ Error: ',
                sell_toast_fill_all_fields: 'Please fill in all fields',
                sell_toast_support_sent: '✅ Request sent! We will contact you back within 15 minutes.',
                sell_toast_generic_error: 'Error: '
            }
        };

        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }

        function tf(key, params) {
            let str = t(key);
            for (const k in params) str = str.split(`{${k}}`).join(params[k]);
            return str;
        }

        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerHTML = t(el.getAttribute('data-i18n'));
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
            });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
        }

        applyStaticTranslations();
        const langToggleBtn = document.getElementById('langToggleBtn');
        if (langToggleBtn) {
            langToggleBtn.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));
        }

        // DOM elements
        const productNameSpan = document.getElementById('productName');
        const productPriceSpan = document.getElementById('productPrice');
        const productStockSpan = document.getElementById('productStock');
        const productImgContainer = document.getElementById('productImgContainer');
        const quantityInput = document.getElementById('quantityInput');
        const decrBtn = document.getElementById('decrQty');
        const incrBtn = document.getElementById('incrQty');
        const totalPreviewSpan = document.getElementById('totalPreview');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('sellForm');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toast = document.getElementById('toast');

        // Helper functions
        function showToastMessage(msg, isError = false) {
            toast.innerText = msg;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function showLoading(show) {
            if (show) loadingOverlay.classList.add('active');
            else loadingOverlay.classList.remove('active');
        }

        // Load sản phẩm từ Supabase
        async function loadProduct() {
            showLoading(true);
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('id, name, price, stock, image')
                    .eq('id', productId)
                    .single();
                if (error) throw error;
                if (!data) {
                    showToastMessage(t('sell_toast_product_not_found'), true);
                    setTimeout(() => window.location.href = "{{ url_for('index') }}", 1500);
                    return;
                }
                currentProduct = data;
                productPrice = data.price;
                maxStock = data.stock;
                productNameSpan.innerText = data.name;
                productPriceSpan.innerText = formatMoney(data.price);
                productStockSpan.innerText = data.stock;
                if (data.image) {
                    productImgContainer.innerHTML = `<img src="${data.image}" class="product-img object-cover">`;
                } else {
                    productImgContainer.innerHTML = '🍽️';
                }
                quantityInput.max = maxStock;
                updateTotalPreview();
            } catch (err) {
                console.error(err);
                showToastMessage(t('sell_toast_load_error') + err.message, true);
            } finally {
                showLoading(false);
            }
        }

        function updateTotalPreview() {
            let qty = parseInt(quantityInput.value);
            if (isNaN(qty)) qty = 1;
            if (qty > maxStock) {
                qty = maxStock;
                quantityInput.value = maxStock;
            }
            if (qty < 1) {
                qty = 1;
                quantityInput.value = 1;
            }
            const total = qty * productPrice;
            totalPreviewSpan.innerText = formatMoney(total);
        }

        quantityInput.addEventListener('input', updateTotalPreview);
        decrBtn.addEventListener('click', () => {
            let qty = parseInt(quantityInput.value);
            if (qty > 1) quantityInput.value = qty - 1;
            updateTotalPreview();
        });
        incrBtn.addEventListener('click', () => {
            let qty = parseInt(quantityInput.value);
            if (qty < maxStock) quantityInput.value = qty + 1;
            updateTotalPreview();
        });

        // Tạo đơn hàng mới
        async function createOrder(quantity, paymentMethod, note) {
            const totalAmount = quantity * productPrice;
            // 1. Insert into orders
            const { data: orderData, error: orderError } = await supabase
                .from('orders')
                .insert([{
                    total_amount: totalAmount,
                    payment_method: paymentMethod,
                    status: 'completed',
                    created_at: new Date().toISOString(),
                    business_id: '{{ session.get("business_id", "") }}'
                }])
                .select('id')
                .single();
            if (orderError) throw orderError;
            const orderId = orderData.id;
            // 2. Insert into order_items
            const { error: itemError } = await supabase
                .from('order_items')
                .insert([{
                    order_id: orderId,
                    product_id: productId,
                    quantity: quantity,
                    price: productPrice,
                    total_price: totalAmount
                }]);
            if (itemError) throw itemError;
            // 3. Update stock of product
            const newStock = maxStock - quantity;
            const { error: updateError } = await supabase
                .from('products')
                .update({ stock: newStock })
                .eq('id', productId);
            if (updateError) throw updateError;
            return { orderId };
        }

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const quantity = parseInt(quantityInput.value);
            if (isNaN(quantity) || quantity < 1) {
                showToastMessage(t('sell_toast_invalid_qty'), true);
                return;
            }
            if (quantity > maxStock) {
                showToastMessage(tf('sell_toast_qty_exceeds_stock', {stock: maxStock}), true);
                return;
            }
            const paymentMethod = document.getElementById('paymentMethod').value;
            const note = document.getElementById('note').value.trim();

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('sell_submit_processing')}`;
            showLoading(true);
            try {
                await createOrder(quantity, paymentMethod, note);
                showToastMessage(t('sell_toast_sale_success'));
                setTimeout(() => {
                    window.location.href = "{{ url_for('index') }}";
                }, 1500);
            } catch (err) {
                console.error(err);
                showToastMessage(t('sell_toast_error') + err.message, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fas fa-check-circle"></i> ${t('sell_submit_btn')}`;
                showLoading(false);
            }
        });

        // ========== US MARKET: SQUARE SANDBOX CHECKOUT ==========
        const squareSellBtn = document.getElementById('squareSellBtn');
        if (squareSellBtn) {
            squareSellBtn.addEventListener('click', async () => {
                const quantity = parseInt(quantityInput.value);
                if (isNaN(quantity) || quantity < 1) {
                    showToastMessage('Invalid quantity!', true);
                    return;
                }
                if (quantity > maxStock) {
                    showToastMessage(`Quantity exceeds stock (${maxStock})`, true);
                    return;
                }
                const total = quantity * productPrice;

                squareSellBtn.disabled = true;
                showLoading(true);
                try {
                    const response = await fetch('/api/us-payment/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: Math.round(total * 100) / 100 })
                    });
                    const result = await response.json();
                    if (result.success) {
                        showToastMessage('✅ Redirecting to Square checkout...');
                        if (result.checkout_url) {
                            setTimeout(() => { window.location.href = result.checkout_url; }, 800);
                        } else if (result.terminal_status) {
                            showToastMessage(`Square Terminal checkout sent (status: ${result.terminal_status})`);
                        }
                    } else {
                        showToastMessage('Square checkout error: ' + result.message, true);
                    }
                } catch (err) {
                    console.error(err);
                    showToastMessage('Server connection error: ' + err.message, true);
                } finally {
                    squareSellBtn.disabled = false;
                    showLoading(false);
                }
            });
        }

        // CSKH track click + form hỗ trợ: gom về static/js/cskh_track.js (dùng chung,
        // gọi /api/cskh/click + /api/cskh/request qua Flask/MongoDB) — xem <script> nạp cuối trang.

        // Khởi tạo
        supabaseReady.then(() => { loadProduct(); });

        // 3D Background (giữ nguyên)
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 700 : 1500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x06b6d4, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            const starCount = 100;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.07, y: (Math.random() - 0.5) * 0.1 - 0.04, z: (Math.random() - 0.5) * 0.03 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.09, color: 0xffaa88, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            scene.fog = new THREE.FogExp2(0x08061a, 0.008);
            
            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length) {
                    mouseX = (e.touches[0].clientX - halfX) * 0.001;
                    mouseY = (e.touches[0].clientY - halfY) * 0.001;
                }
            }, { passive: true });
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });
            
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();
                const hue = (t * 0.03) % 1;
                material.color.setHSL(hue, 0.8, 0.6);
                particles.rotation.y = t * 0.02;
                particles.rotation.x = t * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);
                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
    <script src="{{ url_for('static', filename='js/cskh_track.js') }}"></script>
</body>
