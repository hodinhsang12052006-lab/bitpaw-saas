<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BitPaw Network | Đăng Nhập Cổng Kết Nối</title>
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #05030f;
            color: #f1f3f9;
            min-height: 100vh;
            padding: 1rem;
        }
        .glass-panel {
            background: rgba(10, 15, 37, 0.65);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.55);
        }
        .cyber-input {
            background: rgba(4, 3, 12, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: #ffffff !important;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
        }
        .cyber-input:focus {
            background: rgba(4, 3, 12, 0.85) !important;
            border-color: rgba(6, 182, 212, 0.85) !important;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.18), 0 0 22px rgba(6, 182, 212, 0.45) !important;
            outline: none !important;
        }
        .cyber-btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .cyber-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
        }
        .aurora-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.1) 0%, transparent 65%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="relative flex items-center justify-center min-h-screen">
    <div class="aurora-bg"></div>

    <div class="w-full max-w-md glass-panel p-6 sm:p-8 space-y-6">
        <div class="text-center space-y-2">
            <a href="{{ url_for('network_home') }}" class="inline-block relative w-16 h-16 rounded-full overflow-hidden border border-cyan-500/30">
                <img src="{{ url_for('static', filename='cho1.jpg') }}" onerror="this.src='/static/cho1.jpg'" class="w-full h-full object-cover">
            </a>
            <h2 class="text-2xl font-black tracking-wider text-white">ĐĂNG NHẬP</h2>
            <p class="text-xs text-gray-400">Kết nối tài khoản vận hành / dịch vụ / tìm việc</p>
        </div>

        <!-- Notification messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
            <div class="px-4 py-2 text-xs rounded-xl bg-cyan-500/10 border border-cyan-500/30 text-cyan-300">
                {{ msg }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('network_login') }}" method="POST" class="space-y-4">
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                <input type="email" name="email" required placeholder="Email quản trị hoặc ứng viên" class="cyber-input w-full pl-12 pr-4 py-3 rounded-xl text-sm outline-none">
            </div>

            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                <input type="password" name="password" required placeholder="Mật khẩu" class="cyber-input w-full pl-12 pr-4 py-3 rounded-xl text-sm outline-none">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">Đăng nhập với vai trò</label>
                <select name="role" class="cyber-input w-full px-4 py-3 rounded-xl text-xs cursor-pointer outline-none">
                    <option value="job_seeker">👤 Người tìm việc / Ứng viên</option>
                    <option value="employer">💼 Nhà tuyển dụng / Tiệm Nail-Spa</option>
                    <option value="provider">🔧 Kỹ thuật viên / Dịch vụ điện lạnh</option>
                    <option value="local_business">🏢 Doanh nghiệp / Đối tác SaaS</option>
                </select>
            </div>

            <div class="flex justify-end">
                <a href="#" class="text-xs text-cyan-400 hover:text-cyan-300 font-semibold transition">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="cyber-btn-primary w-full text-black font-black text-xs py-3.5 rounded-xl uppercase tracking-widest transition">
                Đăng nhập hệ thống
            </button>
        </form>

        <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-white/5"></div>
            <span class="flex-shrink mx-4 text-gray-500 text-[10px] uppercase font-bold tracking-wider">Đăng nhập nhanh</span>
            <div class="flex-grow border-t border-white/5"></div>
        </div>

        <!-- Social login placeholders -->
        <div class="grid grid-cols-4 gap-2">
            <button class="bg-white/5 hover:bg-white/10 text-white p-2.5 rounded-xl text-sm transition" onclick="alert('Google Auth placeholder (Phase 1A)')"><i class="fab fa-google"></i></button>
            <button class="bg-white/5 hover:bg-white/10 text-white p-2.5 rounded-xl text-sm transition" onclick="alert('Zalo Auth placeholder (Phase 1A)')"><span class="text-[9px] font-black tracking-tighter">Zalo</span></button>
            <button class="bg-white/5 hover:bg-white/10 text-white p-2.5 rounded-xl text-sm transition" onclick="alert('Facebook Auth placeholder (Phase 1A)')"><i class="fab fa-facebook-f"></i></button>
            <button class="bg-white/5 hover:bg-white/10 text-white p-2.5 rounded-xl text-sm transition" onclick="alert('Apple Auth placeholder (Phase 1A)')"><i class="fab fa-apple"></i></button>
        </div>

        <div class="text-center pt-2">
            <a href="{{ url_for('network_register') }}" class="text-xs text-gray-400 hover:text-white transition">Chưa có bản quyền? <span class="text-cyan-400 font-bold border-b border-cyan-400/30">Tạo ngay</span></a>
        </div>
    </div>
</body>
</html>
