<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ 'BitPaw | Table Order' if default_lang == 'en' else 'BitPaw | Khách gọi món tại bàn' }}</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ========== PRO UI BACKGROUND ========== (matches templates/pos.html) */
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #f1f5f9;
            overflow-x: hidden;
            padding-bottom: 80px;
            background-color: #0a0e17;
            background-image:
                radial-gradient(circle at 15% 0%, rgba(8, 145, 178, 0.10), transparent 45%),
                radial-gradient(circle at 100% 30%, rgba(79, 70, 229, 0.08), transparent 45%),
                linear-gradient(180deg, #0b0f19 0%, #090c14 100%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.72);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 1.25rem;
            box-shadow: 0 4px 28px rgba(0, 0, 0, 0.35);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            border-color: rgba(6, 182, 212, 0.45);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        }

        @keyframes float-logo {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float {
            animation: float-logo 4s ease-in-out infinite;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 10px; }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid #06b6d4;
            color: white;
            font-weight: bold;
            transition: 0.1s;
        }
        .qty-btn:active { transform: scale(0.9); }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 380px;
            height: 100vh;
            background: rgba(8, 6, 26, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(6, 182, 212, 0.4);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }
        .cart-sidebar.open {
            transform: translateX(0);
        }
        @media (max-width: 480px) {
            .cart-sidebar { width: 100%; }
        }
        
        .cart-item {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.1s;
        }
        .cart-item:hover { background: rgba(6,182,212,0.1); }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        @media (max-width: 640px) {
            .menu-grid { grid-template-columns: 1fr; }
        }

        /* CSKH Widget */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(6, 182, 212, 0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }
        .glass-input-sm {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }
        .glass-input-sm:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6,182,212,0.3);
        }
    </style>
</head>
<body>
    <div class="relative z-10 max-w-6xl mx-auto px-4 pt-5">
        <div class="glass-panel p-4 flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="relative w-12 h-12 logo-float">
                    <div class="absolute inset-0 rounded-full border-2 border-cyan-500/50 animate-ping opacity-20"></div>
                    <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-full h-full rounded-full border-2 border-cyan-400/70 object-cover shadow-md">
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">Bit<span class="text-cyan-400">Paw</span> <span class="text-gray-300 text-sm font-normal">Menu</span></h1>
                    <p class="text-[10px] text-gray-400 flex items-center gap-1"><i class="fas fa-qrcode"></i> <span id="locationLabel">Vị trí</span>: <span class="text-cyan-300 font-bold" id="tableNameDisplay" data-table-id="{{ table.id }}" data-table-name="{{ table.name }}">{{ table.name }}</span></p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="cartButton" class="bg-cyan-500/20 hover:bg-cyan-500/40 text-cyan-300 border border-cyan-500/50 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 transition">
                    <i class="fas fa-shopping-cart"></i> <span id="cartButtonLabel" data-i18n="cart_title">Giỏ hàng</span> <span id="cartBadge" class="bg-rose-500 text-white text-xs w-5 h-5 rounded-full inline-flex items-center justify-center ml-1">0</span>
                </button>
                <div class="relative">
                    <button id="langBtn" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-full text-sm font-semibold flex items-center gap-1">
                        <span id="currentLangFlag">{{ '🇬🇧' if default_lang == 'en' else '🇻🇳' }}</span> <span id="currentLangName">{{ 'EN' if default_lang == 'en' else 'VN' }}</span> <i class="fas fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="langDropdown" class="absolute right-0 mt-2 w-32 bg-black/80 backdrop-blur border border-white/10 rounded-xl hidden flex-col z-30">
                        <button onclick="setLanguage('vi')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 rounded-t-xl flex items-center gap-2" data-lang="vi">🇻🇳 Tiếng Việt</button>
                        <button onclick="setLanguage('en')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 flex items-center gap-2" data-lang="en">🇬🇧 English</button>
                        <button onclick="setLanguage('ko')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 flex items-center gap-2" data-lang="ko">🇰🇷 한국어</button>
                        <button onclick="setLanguage('zh')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 rounded-b-xl flex items-center gap-2" data-lang="zh">🇨🇳 中文</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 py-6">
        <div class="glass-panel p-5">
            <div class="mb-4 relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Tìm món..." class="w-full bg-black/50 border border-white/10 rounded-full py-3 pl-11 pr-4 text-white focus:outline-none focus:border-cyan-400">
            </div>
            <div class="menu-grid" id="menuGrid">
                <div class="col-span-full text-center py-10 text-gray-500" data-i18n="menu_loading">Đang tải thực đơn...</div>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="p-5 border-b border-white/10 flex justify-between items-center bg-black/40">
            <h2 class="text-xl font-bold text-cyan-400"><i class="fas fa-shopping-basket mr-2"></i> <span id="cartSidebarTitle" data-i18n="cart_title">Giỏ hàng</span></h2>
            <button id="closeCartBtn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="cartItemsList" class="flex-1 overflow-y-auto p-4 space-y-3">
            <div class="text-center text-gray-500 py-10" data-i18n="cart_empty">Chưa có món nào</div>
        </div>
        <div class="p-4 border-t border-white/10 bg-black/40">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-300"><span id="cartTotalLabel" data-i18n="total">Tổng cộng</span>:</span>
                <span id="cartTotal" class="text-2xl font-bold text-cyan-400">0₫</span>
            </div>
            <button id="submitOrderBtn" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 text-white font-bold py-3 rounded-xl transition shadow-lg">
                <i class="fas fa-paper-plane mr-1"></i> Gửi đơn hàng
            </button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="bg-black/70 rounded-2xl p-6 flex flex-col items-center gap-3 border border-cyan-500/30"><i class="fas fa-spinner fa-pulse text-3xl text-cyan-400"></i><span data-i18n="loading">Đang xử lý...</span></div></div>
    <div id="toast" class="toast"></div>

    <script>
        // ========== FLASK/MONGO JSON API (thay lớp gọi thẳng DB từ trình duyệt trước đây) ==========
        // Wrapper fetch dùng chung, cùng phong cách hrApi() ở templates/chat.html: set JSON
        // header, throw nếu !res.ok hoặc body.success === false để các nơi gọi chỉ cần try/catch.
        async function posApi(path, options) {
            const res = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options && options.headers) },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                throw new Error(body.message || body.error || `Lỗi máy chủ (${res.status})`);
            }
            return body;
        }

        // State
        let tableId = null;
        let tableName = null;
        // business_id của tiệm sở hữu bàn đang được quét — dùng để chặn lộ menu/đơn hàng chéo giữa các tiệm khác nhau
        const tableBusinessId = {{ (table.business_id or '') | tojson }};
        // AI CSKH widget đọc window.BITPAW_BUSINESS_ID để cá nhân hoá đúng tenant — trang
        // này không có session đăng nhập (khách quét QR ẩn danh) nên phải set thủ công thành global.
        window.BITPAW_BUSINESS_ID = tableBusinessId || null;

        // Load table parameters from DOM data attributes
        const tableDisplayEl = document.getElementById('tableNameDisplay');
        if (tableDisplayEl) {
            const attrId = tableDisplayEl.getAttribute('data-table-id');
            tableId = attrId ? parseInt(attrId) : null;
            tableName = tableDisplayEl.getAttribute('data-table-name');
        }
        let products = [];
        let cart = []; // { id, name, price, quantity }
        // English MUST be the default everywhere for launch — dùng chung key 'bitpaw_lang' với
        // pos.html để khách/nhân viên đổi ngôn ngữ 1 lần là nhớ trên toàn bộ POS flow của thiết bị.
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";
        let currentIndustry = 'fnb';

        // Multi-region: tenant_country/tenant_currency được Flask resolve theo business_id CỦA
        // BÀN đang quét (route /table_order truyền đè lên context processor mặc định, vì khách
        // quét QR không có session để tự resolve) — KHÔNG hardcode VND/vi-VN như trước.
        const TENANT_CURRENCY = "{{ tenant_currency }}";
        const TENANT_COUNTRY = "{{ tenant_country }}";

        function formatMoney(amount) {
            const value = Number(amount) || 0;
            if (TENANT_CURRENCY === 'USD') {
                return '$' + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
            return Math.round(value).toLocaleString('vi-VN') + '₫';
        }

        // Translation dictionary
        const translations = {
            vi: {
                cart_empty: "Chưa có món nào",
                total: "Tổng cộng",
                send_order: "Gửi đơn hàng",
                added_to_cart: "Đã thêm vào giỏ",
                order_sent: "Đơn hàng đã gửi!",
                order_failed: "Gửi đơn thất bại, thử lại",
                staff_called: "Đã gọi nhân viên",
                bill_requested: "Đã yêu cầu tính tiền",
                loading: "Đang xử lý...",
                search_placeholder: "Tìm món...",
                cart_title: "Giỏ hàng",
                menu_loading: "Đang tải thực đơn...",
                loading_generic: "Đang tải...",
                location_load_error: "Lỗi tải vị trí",
                menu_load_error: "Lỗi tải thực đơn: ",
                menu_empty: "Chưa có món nào",
                default_category: "Món",
                add_to_cart_btn: "Thêm vào giỏ",
                cart_empty_warning: "Giỏ hàng trống!",
                table_undetermined: "Không xác định được bàn",
                location_not_found_retry: "Không tìm thấy thông tin vị trí. Vui lòng thử lại.",
                support_fill_all_fields: "Vui lòng nhập đầy đủ thông tin",
                support_request_sent: "✅ Yêu cầu đã gửi! Chúng tôi sẽ liên hệ lại trong 15 phút.",
                error_prefix: "Lỗi: ",
                label_table: "Bàn",
                label_chair: "Ghế",
                label_bed_room: "Giường/Phòng"
            },
            en: {
                cart_empty: "Cart is empty",
                total: "Total",
                send_order: "Place order",
                added_to_cart: "Added to cart",
                order_sent: "Order sent!",
                order_failed: "Order failed, please retry",
                staff_called: "Staff called",
                bill_requested: "Bill requested",
                loading: "Processing...",
                search_placeholder: "Search dish...",
                cart_title: "Shopping Cart",
                menu_loading: "Loading menu...",
                loading_generic: "Loading...",
                location_load_error: "Error loading location",
                menu_load_error: "Error loading menu: ",
                menu_empty: "No dishes available",
                default_category: "Dish",
                add_to_cart_btn: "Add to cart",
                cart_empty_warning: "Your cart is empty!",
                table_undetermined: "Could not determine the table",
                location_not_found_retry: "Location information not found. Please try again.",
                support_fill_all_fields: "Please fill in all fields",
                support_request_sent: "✅ Request sent! We'll get back to you within 15 minutes.",
                error_prefix: "Error: ",
                label_table: "Table",
                label_chair: "Chair",
                label_bed_room: "Bed/Room"
            },
            ko: {
                cart_empty: "장바구니가 비어 있습니다",
                total: "총계",
                send_order: "주문하기",
                added_to_cart: "장바구니에 추가됨",
                order_sent: "주문이 접수되었습니다!",
                order_failed: "주문 실패, 다시 시도하세요",
                staff_called: "직원 호출됨",
                bill_requested: "계산서 요청됨",
                loading: "처리 중...",
                search_placeholder: "메뉴 검색...",
                cart_title: "장바구니",
                menu_loading: "메뉴 로딩 중...",
                loading_generic: "로딩 중...",
                location_load_error: "위치 로딩 오류",
                menu_load_error: "메뉴 로딩 오류: ",
                menu_empty: "메뉴가 없습니다",
                default_category: "메뉴",
                add_to_cart_btn: "장바구니에 담기",
                cart_empty_warning: "장바구니가 비어 있습니다!",
                table_undetermined: "테이블을 확인할 수 없습니다",
                location_not_found_retry: "위치 정보를 찾을 수 없습니다. 다시 시도해 주세요.",
                support_fill_all_fields: "모든 항목을 입력해 주세요",
                support_request_sent: "✅ 요청이 전송되었습니다! 15분 이내에 연락드리겠습니다.",
                error_prefix: "오류: ",
                label_table: "테이블",
                label_chair: "의자",
                label_bed_room: "침대/객실"
            },
            zh: {
                cart_empty: "购物车是空的",
                total: "总计",
                send_order: "下订单",
                added_to_cart: "已添加到购物车",
                order_sent: "订单已发送！",
                order_failed: "订单失败，请重试",
                staff_called: "已呼叫服务员",
                bill_requested: "已请求结账",
                loading: "处理中...",
                search_placeholder: "搜索菜品...",
                cart_title: "购物车",
                menu_loading: "菜单加载中...",
                loading_generic: "加载中...",
                location_load_error: "位置加载错误",
                menu_load_error: "菜单加载错误：",
                menu_empty: "暂无菜品",
                default_category: "菜品",
                add_to_cart_btn: "加入购物车",
                cart_empty_warning: "购物车是空的！",
                table_undetermined: "无法确定桌台",
                location_not_found_retry: "未找到位置信息。请重试。",
                support_fill_all_fields: "请填写完整信息",
                support_request_sent: "✅ 请求已发送！我们将在15分钟内与您联系。",
                error_prefix: "错误：",
                label_table: "桌台",
                label_chair: "座椅",
                label_bed_room: "床位/房间"
            }
        };

        function t(key) {
            return translations[currentLang]?.[key] || translations.vi[key] || key;
        }

        // Nhãn "Bàn/Ghế/Giường/Phòng" phụ thuộc industry (không đổi khi chuyển ngôn ngữ)
        // nhưng vẫn phải dịch theo currentLang mỗi khi người dùng đổi ngôn ngữ.
        function tableLabelKey(ind) {
            if (ind === 'nail') return 'label_chair';
            if (ind === 'spa') return 'label_bed_room';
            return 'label_table';
        }
        function updateTableLabel() {
            const labelSpan = document.getElementById('locationLabel');
            if (labelSpan) labelSpan.innerText = t(tableLabelKey(currentIndustry));
        }

        function updateUIAfterLang() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.placeholder = t('search_placeholder');
            const submitBtn = document.getElementById('submitOrderBtn');
            if (submitBtn) submitBtn.innerHTML = `<i class="fas fa-paper-plane mr-1"></i> ${t('send_order')}`;
            updateTableLabel();
            renderCart();
        }
        
        // Helper functions
        function showToastMessage(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }
        
        // Thông tin bàn (id/name) do Flask render sẵn vào data-attribute của #tableNameDisplay
        // (cả route /table/<id> của nhân viên lẫn /table_order của khách quét QR đều truyền
        // `table` vào template) — không còn cần tự query lại 'dining_tables' phía client nữa.
        async function loadTableInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const ind = urlParams.get('industry') || 'fnb';
            currentIndustry = ind;
            updateTableLabel();

            if (tableId && tableName) {
                const nameSpan = document.getElementById('tableNameDisplay');
                if (nameSpan) nameSpan.innerText = tableName;
                return true;
            }

            const nameSpan = document.getElementById('tableNameDisplay');
            if (nameSpan) nameSpan.innerText = t('location_load_error');
            return null;
        }
        
        // Lấy danh sách sản phẩm (is_active true, filtered dynamically by industry) qua
        // GET /api/pos/products?channel_type=... (Flask/MongoDB, business_id lấy từ session).
        async function loadProducts() {
            showLoading(true);
            const urlParams = new URLSearchParams(window.location.search);
            const ind = urlParams.get('industry') || 'fnb';
            let channelType = 'fnb';
            if (ind === 'nail') channelType = 'nail';
            else if (ind === 'spa') channelType = 'spa';

            try {
                // /table_order phục vụ cả nhân viên đã đăng nhập (route /table/<id>) LẪN
                // khách quét QR chưa có session (route /table_order) — dùng route public
                // resolve tenant qua table_id, thay vì /api/pos/products vốn @login_required
                // và sẽ luôn fail với khách chưa đăng nhập.
                const body = await posApi(`/api/public/pos/products?table_id=${encodeURIComponent(tableId)}&channel_type=${encodeURIComponent(channelType)}`);
                showLoading(false);
                return body.data || [];
            } catch (error) {
                showToastMessage(t('menu_load_error') + error.message, true);
                showLoading(false);
                return [];
            }
        }
        
        function renderMenu(productsArray) {
            const container = document.getElementById('menuGrid');
            if (!productsArray.length) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">${t('menu_empty')}</div>`;
                return;
            }
            container.innerHTML = productsArray.map(p => `
                <div class="glass-card p-3 cursor-pointer transition" data-product-id="${p.id}" data-product-name="${escapeHtml(p.name)}" data-product-price="${p.price}" data-product-img="${p.image || ''}">
                    <div class="flex gap-3">
                        ${p.image ? `<img src="${p.image}" class="w-20 h-20 rounded-xl object-cover bg-black/30">` : `<div class="w-20 h-20 rounded-xl bg-black/30 flex items-center justify-center text-3xl">🍽️</div>`}
                        <div class="flex-1">
                            <h3 class="font-bold text-white text-base">${escapeHtml(p.name)}</h3>
                            <p class="text-xs text-gray-400">${escapeHtml(p.category) || t('default_category')}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-cyan-400 font-mono font-bold">${formatMoney(p.price)}</span>
                                <div class="flex items-center gap-2">
                                    <button class="qty-btn-decr w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30 text-white text-sm">-</button>
                                    <span class="item-qty-display w-6 text-center text-white font-bold">1</span>
                                    <button class="qty-btn-incr w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30 text-white text-sm">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="add-to-cart-btn mt-2 w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-2 rounded-xl text-sm transition">+ ${t('add_to_cart_btn')}</button>
                </div>
            `).join('');
            attachProductEvents();
        }
        
        function attachProductEvents() {
            // Tăng/giảm số lượng
            document.querySelectorAll('.qty-btn-decr').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.glass-card');
                    const qtySpan = card.querySelector('.item-qty-display');
                    let val = parseInt(qtySpan.innerText) || 1;
                    if (val > 1) qtySpan.innerText = val - 1;
                });
            });
            document.querySelectorAll('.qty-btn-incr').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.glass-card');
                    const qtySpan = card.querySelector('.item-qty-display');
                    let val = parseInt(qtySpan.innerText) || 1;
                    qtySpan.innerText = val + 1;
                });
            });
            // Thêm vào giỏ
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.glass-card');
                    const productId = parseInt(card.getAttribute('data-product-id'));
                    const name = card.getAttribute('data-product-name');
                    const price = parseInt(card.getAttribute('data-product-price'));
                    const qtySpan = card.querySelector('.item-qty-display');
                    const quantity = parseInt(qtySpan.innerText) || 1;
                    addToCart(productId, name, price, quantity);
                    qtySpan.innerText = '1';
                });
            });
        }
        
        function addToCart(productId, name, price, quantity) {
            const existing = cart.find(item => item.id === productId);
            if (existing) existing.quantity += quantity;
            else cart.push({ id: productId, name, price, quantity });
            renderCart();
            showToastMessage(t('added_to_cart'));
        }
        
        function renderCart() {
            const container = document.getElementById('cartItemsList');
            const totalSpan = document.getElementById('cartTotal');
            const badge = document.getElementById('cartBadge');
            let total = 0, count = 0;
            if (!cart.length) {
                container.innerHTML = `<div class="text-center text-gray-500 py-10">${t('cart_empty')}</div>`;
                totalSpan.innerText = formatMoney(0);
                badge.innerText = '0';
                return;
            }
            let html = '';
            cart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                count += item.quantity;
                html += `
                     <div class="cart-item flex justify-between items-center p-3 rounded-xl">
                        <div class="flex-1">
                            <h4 class="font-bold text-white">${escapeHtml(item.name)}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <button class="cart-qty-down w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30" data-idx="${idx}">-</button>
                                <span class="w-6 text-center text-white">${item.quantity}</span>
                                <button class="cart-qty-up w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30" data-idx="${idx}">+</button>
                                <span class="ml-2 text-cyan-400 font-mono">${formatMoney(item.price)}</span>
                            </div>
                        </div>
                        <button class="cart-remove text-rose-400 hover:text-rose-300 text-xl w-8 h-8 rounded-full flex items-center justify-center" data-idx="${idx}"><i class="fas fa-trash-alt text-sm"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html;
            totalSpan.innerText = formatMoney(total);
            badge.innerText = count;
            
            // Cart events
            document.querySelectorAll('.cart-qty-down').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    if (cart[idx].quantity > 1) cart[idx].quantity--;
                    else cart.splice(idx, 1);
                    renderCart();
                });
            });
            document.querySelectorAll('.cart-qty-up').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    cart[idx].quantity++;
                    renderCart();
                });
            });
            document.querySelectorAll('.cart-remove').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    cart.splice(idx, 1);
                    renderCart();
                });
            });
        }
        
        async function submitOrder() {
            if (cart.length === 0) {
                showToastMessage(t('cart_empty_warning'), true);
                return;
            }
            if (!tableId) {
                showToastMessage(t('table_undetermined'), true);
                return;
            }
            showLoading(true);
            
            let isSubmitted = false;

            // Gửi đơn hàng qua Flask API (POST /api/submit_qr_order) — route PUBLIC, tự xác
            // thực bàn theo table_id/qr_token phía server, không cần session đăng nhập.
            try {
                await posApi('/api/submit_qr_order', {
                    method: 'POST',
                    body: JSON.stringify({
                        table_id: tableId,
                        items: cart,
                        total: cart.reduce((acc, item) => acc + (item.price * item.quantity), 0),
                        customer_note: ''
                    })
                });
                isSubmitted = true;
            } catch (e) {
                console.error("submit_qr_order failed:", e);
            }

            if (isSubmitted) {
                cart = [];
                renderCart();
                showToastMessage(t('order_sent'));
                document.getElementById('cartSidebar').classList.remove('open');
            } else {
                showToastMessage(t('order_failed'), true);
            }
            showLoading(false);
        }
        
        // Gọi nhân viên / tính tiền qua POST /api/table/notify (route PUBLIC, ghi vào
        // db.user_logs để POS/nhân viên theo dõi — thay cho insert thẳng từ trình duyệt trước đây).
        async function callService(type) {
            if (!tableId) return;
            showLoading(true);
            try {
                await posApi('/api/table/notify', {
                    method: 'POST',
                    body: JSON.stringify({
                        table_id: tableId,
                        table_name: tableName,
                        type: type === 'staff' ? 'staff' : 'bill'
                    })
                });
                showToastMessage(type === 'staff' ? t('staff_called') : t('bill_requested'));
            } catch (err) {
                console.warn(err);
                showToastMessage(type === 'staff' ? t('staff_called') : t('bill_requested'));
            } finally {
                showLoading(false);
            }
        }
        
        // Tìm kiếm sản phẩm (client-side)
        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                const cards = document.querySelectorAll('.glass-card[data-product-id]');
                cards.forEach(card => {
                    const name = card.getAttribute('data-product-name').toLowerCase();
                    card.style.display = name.includes(keyword) ? '' : 'none';
                });
            });
        }
        
        // Sidebar controls
        function initSidebar() {
            const cartButton = document.getElementById('cartButton');
            const cartSidebar = document.getElementById('cartSidebar');
            const closeCartBtn = document.getElementById('closeCartBtn');
            cartButton.addEventListener('click', () => cartSidebar.classList.add('open'));
            closeCartBtn.addEventListener('click', () => cartSidebar.classList.remove('open'));
            document.addEventListener('click', (e) => {
                if (!cartSidebar.contains(e.target) && e.target !== cartButton && !cartButton.contains(e.target)) {
                    cartSidebar.classList.remove('open');
                }
            });
            document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);
        }
        
        // FAB gọi nhân viên & tính tiền
        function initFAB() {
            const fabDiv = document.createElement('div');
            fabDiv.className = 'fixed bottom-24 right-6 z-30 flex flex-col gap-3';
            fabDiv.innerHTML = `
                <button id="callStaffBtn" class="bg-white/10 backdrop-blur border border-cyan-500/30 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg hover:scale-105 transition"><i class="fas fa-bell text-cyan-400 text-xl"></i></button>
                <button id="callBillBtn" class="bg-white/10 backdrop-blur border border-cyan-500/30 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg hover:scale-105 transition"><i class="fas fa-receipt text-cyan-400 text-xl"></i></button>
            `;
            document.body.appendChild(fabDiv);
            document.getElementById('callStaffBtn').addEventListener('click', () => callService('staff'));
            document.getElementById('callBillBtn').addEventListener('click', () => callService('bill'));
        }
        
        // Ngôn ngữ
        function initLanguage() {
            const langBtn = document.getElementById('langBtn');
            const langDropdown = document.getElementById('langDropdown');
            langBtn.addEventListener('click', () => langDropdown.classList.toggle('hidden'));
            document.addEventListener('click', (e) => {
                if (!langBtn.contains(e.target) && !langDropdown.contains(e.target)) langDropdown.classList.add('hidden');
            });
            window.setLanguage = (lang) => {
                currentLang = lang;
                localStorage.setItem('bitpaw_lang', lang);
                syncLangBadge();
                langDropdown.classList.add('hidden');
                updateUIAfterLang();
            };
        }

        // Đồng bộ cờ/tên ngôn ngữ hiển thị trên nút toggle với currentLang thực tế — cần gọi cả
        // lúc khởi tạo (vì server chỉ render sẵn theo default_lang, còn currentLang có thể khác
        // nếu khách đã từng đổi ngôn ngữ ở thiết bị này trước đó, lưu trong localStorage).
        function syncLangBadge() {
            const flag = currentLang === 'vi' ? '🇻🇳' : currentLang === 'en' ? '🇬🇧' : currentLang === 'ko' ? '🇰🇷' : '🇨🇳';
            const name = currentLang === 'vi' ? 'VN' : currentLang === 'en' ? 'EN' : currentLang === 'ko' ? 'KO' : 'ZH';
            document.getElementById('currentLangFlag').innerText = flag;
            document.getElementById('currentLangName').innerText = name;
        }
        
        // CSKH track click + form hỗ trợ: gom về static/js/cskh_track.js (dùng chung,
        // gọi /api/cskh/click + /api/cskh/request qua Flask/MongoDB) — xem <script> nạp cuối trang.

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        // Khởi tạo
        async function init() {
            const tableLoaded = await loadTableInfo();
            if (!tableLoaded) {
                document.getElementById('menuGrid').innerHTML = `<div class="col-span-full text-center py-10 text-rose-400">${t('location_not_found_retry')}</div>`;
                return;
            }
            let productsList = await loadProducts();
            if (!productsList || productsList.length === 0) {
                const urlParams = new URLSearchParams(window.location.search);
                const ind = urlParams.get('industry') || 'fnb';
                // Demo fallback CHỈ hiện khi tenant chưa cấu hình menu thật — giá phải cùng đơn vị
                // với TENANT_CURRENCY (USD tenant demo phải là giá USD thực tế, không phải số VND
                // cũ đem gắn "$" vào là thành vô lý, vd "$120,000" cho 1 lần làm gel).
                const isUSD = TENANT_CURRENCY === 'USD';
                if (ind === 'nail') {
                    productsList = isUSD ? [
                        { id: 201, name: "Premium Gel Polish", price: 35, category: "Nail Services", image: "" },
                        { id: 202, name: "Cuticle Care & Shaping", price: 15, category: "Nail Care", image: "" },
                        { id: 203, name: "Sculpted Acrylic Art", price: 55, category: "Premium Nails", image: "" },
                        { id: 204, name: "3D Nail Art Design", price: 45, category: "Nail Design", image: "" }
                    ] : [
                        { id: 201, name: "Sơn Gel Cao Cấp", price: 120000, category: "Dịch Vụ Nails", image: "" },
                        { id: 202, name: "Cắt Da & Tạo Form Móng", price: 50000, category: "Chăm Sóc Móng", image: "" },
                        { id: 203, name: "Đắp Bột Nghệ Thuật", price: 350000, category: "Nails Cao Cấp", image: "" },
                        { id: 204, name: "Vẽ Móng Nghệ Thuật 3D", price: 180000, category: "Nails Thiết Kế", image: "" }
                    ];
                } else if (ind === 'spa') {
                    productsList = isUSD ? [
                        { id: 301, name: "Herbal Body Massage (60 min)", price: 70, category: "Relaxation Massage", image: "" },
                        { id: 302, name: "Traditional Scalp Treatment", price: 35, category: "Hair Care", image: "" },
                        { id: 303, name: "Deep Facial Treatment", price: 90, category: "Skin Care", image: "" },
                        { id: 304, name: "Himalayan Salt Steam Therapy", price: 60, category: "Therapy", image: "" }
                    ] : [
                        { id: 301, name: "Massage Body Thảo Dược (60p)", price: 290000, category: "Massage Thư Giãn", image: "" },
                        { id: 302, name: "Gội Đầu Dưỡng Sinh Cổ Truyền", price: 150000, category: "Chăm Sóc Tóc", image: "" },
                        { id: 303, name: "Chăm Sóc Da Mặt Chuyên Sâu", price: 450000, category: "Chăm Sóc Da", image: "" },
                        { id: 304, name: "Liệu Trình Xông Hơi Đá Muối", price: 200000, category: "Trị Liệu", image: "" }
                    ];
                } else {
                    productsList = isUSD ? [
                        { id: 101, name: "BitPaw Salted Caramel Coffee", price: 5.50, category: "Coffee", image: "" },
                        { id: 102, name: "Peach Passion Iced Tea", price: 5.00, category: "Fruit Tea", image: "" },
                        { id: 103, name: "Coconut Milk Coffee", price: 5.50, category: "Coffee", image: "" },
                        { id: 104, name: "Shrimp & Pork Noodles", price: 12.00, category: "Dishes", image: "" },
                        { id: 105, name: "Special Kobe Beef Pho", price: 18.00, category: "Dishes", image: "" },
                        { id: 106, name: "Taro Milk Tea with Boba", price: 6.00, category: "Milk Tea", image: "" }
                    ] : [
                        { id: 101, name: "Cà Phê Muối BitPaw", price: 35000, category: "Cà Phê", image: "" },
                        { id: 102, name: "Trà Đào Cam Sả", price: 40000, category: "Trà Trái Cây", image: "" },
                        { id: 103, name: "Bạc Xỉu Sữa Dừa", price: 35000, category: "Cà Phê", image: "" },
                        { id: 104, name: "Mì Quảng Tôm Thịt", price: 55000, category: "Món Ăn", image: "" },
                        { id: 105, name: "Phở Bò Kobe Đặc Biệt", price: 85000, category: "Món Ăn", image: "" },
                        { id: 106, name: "Trà Sữa Khoai Môn Trân Châu", price: 45000, category: "Trà Sữa", image: "" }
                    ];
                }
            }
            products = productsList;
            renderMenu(products);
            initSearch();
            initSidebar();
            initFAB();
            initLanguage();
            syncLangBadge();
            updateUIAfterLang();
        }
        init();
    </script>
    <script src="/static/js/cskh_widget.js"></script>
    <script src="{{ url_for('static', filename='js/cskh_track.js') }}"></script>
</body>
</html>
