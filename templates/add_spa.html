<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Add Spa Treatment - BitPaw OS</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #08061a; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.85; pointer-events: none; }

        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #e879f9, #c084fc, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed; top: 0; left: 0; width: 1px; height: 100%;
            background: linear-gradient(180deg, transparent, #e879f9, #c084fc, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .absolute-blur {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: rgba(232, 121, 249, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        .glass-panel { 
            background: rgba(10, 15, 37, 0.6); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(232, 121, 249, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(232, 121, 249, 0.15); 
        }
        
        .glass-input, .glass-select { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            transition: all 0.3s; 
            padding: 12px 16px; 
            border-radius: 12px; 
            outline: none; 
            width: 100%; 
            font-weight: 500;
            font-size: 0.9rem;
        }
        .glass-input:focus, .glass-select:focus { 
            border-color: #e879f9; 
            box-shadow: 0 0 15px rgba(232, 121, 249, 0.4); 
            background: rgba(0,0,0,0.8); 
        }

        .glass-select option { background-color: #0f111a; color: white; }
        .glass-select optgroup { color: #e879f9; font-weight: 900; background: #08061a; }

        .file-label {
            cursor: pointer;
            transition: 0.2s;
        }
        .file-label:hover {
            background: rgba(232, 121, 249, 0.2);
            border-color: #e879f9;
        }
        #imagePreview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(232,121,249,0.5);
            background: rgba(0,0,0,0.5);
        }

        @keyframes float-hologram {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(232, 121, 249, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(255, 148, 77, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(232, 121, 249, 0.4)); }
        }
        .logo-float { animation: float-hologram 4s ease-in-out infinite; }

        /* CSKH Widget hiển thị đầy đủ thông tin */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(232,121,249,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(232,121,249,0.5); border-radius: 10px; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(232, 121, 249, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="antialiased relative">
    
    <!-- <div class="scan-line"></div> -->
    <!-- <div class="laser-vertical"></div> -->
    <div class="absolute-blur"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="w-full max-w-lg mx-auto relative z-10 px-4 py-8 max-h-screen overflow-y-auto custom-scrollbar">
        
        <div class="flex flex-col items-center justify-center mb-6">
            <div class="relative w-16 h-16 flex items-center justify-center logo-float mb-3">
                <div class="absolute w-full h-full border-t-2 border-fuchsia-500/80 rounded-full animate-spin" style="animation-duration: 3s;"></div>
                <div class="absolute w-[120%] h-[120%] border-b-2 border-pink-400/80 rounded-full animate-spin" style="animation-duration: 4s; animation-direction: reverse;"></div>
                <img src="{{ url_for('static', filename='cho1.jpg') }}" alt="BitPaw Logo" class="relative w-12 h-12 rounded-full object-cover bg-[#08061a] border border-white/20 p-0.5 z-10">
            </div>
            <h1 class="text-2xl font-black tracking-widest text-white">Bit<span class="text-fuchsia-400">Paw</span></h1>
            <p class="text-xs text-gray-400 mt-1" data-i18n="addspa_tagline">Professional spa treatment management</p>
            <button id="langToggleBtn" type="button" class="mt-2 bg-white/10 hover:bg-white/20 text-white px-3 py-1 rounded-full text-[10px] font-bold transition">EN</button>
        </div>

        <div class="glass-panel rounded-3xl p-6 sm:p-8">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-fuchsia-400 flex items-center justify-center gap-2">
                    <i class="fas fa-spa"></i> <span data-i18n="addspa_title">Add New Treatment</span>
                </h2>
                <p class="text-[11px] text-gray-400 mt-1.5 font-medium uppercase tracking-widest" data-i18n="addspa_subtitle">Set up a professional Spa service</p>
            </div>

            <form id="spaForm" enctype="multipart/form-data" class="space-y-5">
                <!-- Image preview -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1" data-i18n="addspa_label_image">Description Image (Optional)</label>
                    <div class="flex items-center gap-4">
                        <div class="flex-1 glass-input file-label border-dashed border-2 hover:border-fuchsia-400 transition-colors flex items-center gap-2">
                            <i class="fas fa-camera text-gray-500"></i>
                            <span id="fileName" class="text-gray-400 text-sm" data-i18n="addspa_no_image">No image selected</span>
                            <input type="file" id="imageInput" name="image" accept="image/*" class="hidden">
                        </div>
                        <div class="w-16 h-16 flex-shrink-0 bg-black/30 rounded-xl border border-white/10 flex items-center justify-center overflow-hidden">
                            <img id="imagePreview" class="w-full h-full object-cover hidden">
                            <i id="previewPlaceholder" class="fas fa-spa text-gray-500 text-2xl"></i>
                        </div>
                    </div>
                </div>

                <!-- Treatment name -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1" data-i18n="addspa_label_name">Treatment / Service Package Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-leaf text-fuchsia-500/70 text-sm"></i></div>
                        <input type="text" name="name" id="spaName" required placeholder="E.g.: Therapeutic Hair Wash 60min..." data-i18n-placeholder="addspa_placeholder_name" class="glass-input pl-11">
                    </div>
                </div>

                <!-- Treatment category -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1" data-i18n="addspa_label_category">Treatment category</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-tags text-gray-500 text-sm"></i></div>
                        <select name="category" id="spaCategory" class="glass-select pl-11 appearance-none cursor-pointer">
                            <option value="Chăm sóc da mặt" data-i18n="addspa_opt_facial">✨ Facial care</option>
                            <option value="Massage cơ thể" data-i18n="addspa_opt_massage">💆 Body massage</option>
                            <option value="Chăm sóc tóc" data-i18n="addspa_opt_hair">💇 Hair care</option>
                            <option value="Liệu trình đặc biệt" data-i18n="addspa_opt_special">🌿 Special treatment</option>
                            <option value="Combo tiết kiệm" data-i18n="addspa_opt_combo">🎁 Value combo</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><i class="fas fa-chevron-down text-fuchsia-500 text-xs"></i></div>
                    </div>
                </div>

                <!-- Formatted service price -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1" data-i18n="addspa_label_price">Service Price (VND)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-money-bill-wave text-gray-500 text-sm"></i></div>
                        <input type="text" id="priceDisplay" placeholder="0" class="glass-input pl-11 font-mono text-fuchsia-300 text-right">
                        <input type="hidden" name="price" id="priceHidden">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><span class="text-gray-500 text-sm font-bold">₫</span></div>
                    </div>
                </div>

                <!-- Submit button -->
                <div class="pt-4 space-y-3">
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-fuchsia-500 to-pink-600 hover:from-fuchsia-400 hover:to-pink-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-[0_0_15px_rgba(232,121,249,0.4)] hover:shadow-[0_0_25px_rgba(232,121,249,0.6)] hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> <span data-i18n="addspa_btn_save">Save Treatment</span>
                    </button>

                    <a href="{{ url_for('spa') }}" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-pink-400 hover:text-pink-300 font-semibold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-left"></i> <span data-i18n="addspa_btn_back">Back to List</span>
                    </a>
                </div>
            </form>
        </div>

    </div>

    <div id="toast" class="toast">Notification</div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // ========== i18n ==========
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";
        const translations = {
            vi: {
                addspa_tagline: 'Quản lý dịch vụ Spa chuyên nghiệp',
                addspa_title: 'Thêm Liệu Trình Mới',
                addspa_subtitle: 'Thiết lập một dịch vụ Spa chuyên nghiệp',
                addspa_label_image: 'Hình ảnh minh họa (Không bắt buộc)',
                addspa_no_image: 'Chưa chọn hình ảnh',
                addspa_label_name: 'Tên Liệu Trình / Gói Dịch Vụ',
                addspa_placeholder_name: 'VD: Gội đầu dưỡng sinh 60 phút...',
                addspa_label_category: 'Danh mục liệu trình',
                addspa_opt_facial: '✨ Chăm sóc da mặt',
                addspa_opt_massage: '💆 Massage cơ thể',
                addspa_opt_hair: '💇 Chăm sóc tóc',
                addspa_opt_special: '🌿 Liệu trình đặc biệt',
                addspa_opt_combo: '🎁 Combo tiết kiệm',
                addspa_label_price: 'Giá Dịch Vụ (VNĐ)',
                addspa_btn_save: 'Lưu Liệu Trình',
                addspa_btn_saving: 'Đang lưu...',
                addspa_btn_back: 'Quay Lại Danh Sách',
                addspa_toast_no_name: 'Vui lòng nhập tên liệu trình',
                addspa_toast_invalid_price: 'Vui lòng nhập giá hợp lệ',
                addspa_toast_upload_error_prefix: 'Lỗi tải ảnh lên: ',
                addspa_toast_success: '✅ Thêm liệu trình thành công!',
                addspa_toast_error_prefix: '❌ Lỗi: ',
                addspa_console_token_error: 'Không lấy được tenant token:',
                addspa_console_supabase_token_error: 'Lỗi khi gọi /api/session/supabase_token:'
            },
            en: {
                addspa_tagline: 'Professional spa treatment management',
                addspa_title: 'Add New Treatment',
                addspa_subtitle: 'Set up a professional Spa service',
                addspa_label_image: 'Description Image (Optional)',
                addspa_no_image: 'No image selected',
                addspa_label_name: 'Treatment / Service Package Name',
                addspa_placeholder_name: 'E.g.: Therapeutic Hair Wash 60min...',
                addspa_label_category: 'Treatment category',
                addspa_opt_facial: '✨ Facial care',
                addspa_opt_massage: '💆 Body massage',
                addspa_opt_hair: '💇 Hair care',
                addspa_opt_special: '🌿 Special treatment',
                addspa_opt_combo: '🎁 Value combo',
                addspa_label_price: 'Service Price (VND)',
                addspa_btn_save: 'Save Treatment',
                addspa_btn_saving: 'Saving...',
                addspa_btn_back: 'Back to List',
                addspa_toast_no_name: 'Please enter a treatment name',
                addspa_toast_invalid_price: 'Please enter a valid price',
                addspa_toast_upload_error_prefix: 'Image upload error: ',
                addspa_toast_success: '✅ Treatment added successfully!',
                addspa_toast_error_prefix: '❌ Error: ',
                addspa_console_token_error: 'Failed to get tenant token:',
                addspa_console_supabase_token_error: 'Error calling /api/session/supabase_token:'
            }
        };
        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.getAttribute('data-i18n-title')); });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
        }
        applyStaticTranslations();
        document.getElementById('langToggleBtn')?.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));

        // ========== SUPABASE CONFIG ==========
        const supabaseUrl = 'https://iojtglaxgdwsxxalhubx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvanRnbGF4Z2R3c3h4YWxodWJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjgzNTIsImV4cCI6MjA5MzE0NDM1Mn0.KA7wdsZsK3oA6ybi5Gl_KnkzAKZM-ESI3Eyzx-mipwM';
        let supabaseClient = createClient(supabaseUrl, supabaseKey);
        // Nâng cấp lên client có JWT business_id để RLS lọc đúng tenant.
        const supabaseReady = fetch('/api/session/supabase_token', { credentials: 'same-origin' })
            .then(res => res.json())
            .then(json => {
                if (json && json.success) {
                    supabaseClient = createClient(supabaseUrl, supabaseKey, { global: { headers: { Authorization: `Bearer ${json.token}` } } });
                } else {
                    console.error(t('addspa_console_token_error'), json && json.error);
                }
                return supabaseClient;
            })
            .catch(e => { console.error(t('addspa_console_supabase_token_error'), e); return supabaseClient; });
        const STORAGE_BUCKET = 'product_images';

        // DOM elements
        const imageInput = document.getElementById('imageInput');
        const previewImg = document.getElementById('imagePreview');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const fileNameSpan = document.getElementById('fileName');
        const priceDisplay = document.getElementById('priceDisplay');
        const priceHidden = document.getElementById('priceHidden');
        const form = document.getElementById('spaForm');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        // ========== Preview ảnh ==========
        imageInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                fileNameSpan.innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    previewPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            } else {
                fileNameSpan.innerText = t('addspa_no_image');
                previewImg.classList.add('hidden');
                previewPlaceholder.classList.remove('hidden');
                previewImg.src = '';
            }
        });
        document.querySelector('.file-label').addEventListener('click', () => imageInput.click());

        // ========== Format giá ==========
        function formatPriceInput(e) {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value === '') value = '0';
            let intValue = parseInt(value, 10);
            e.target.value = intValue.toLocaleString('vi-VN');
            priceHidden.value = intValue;
        }
        priceDisplay.addEventListener('input', formatPriceInput);

        // ========== Toast ==========
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== Upload ảnh lên Supabase Storage ==========
        async function uploadImage(file) {
            if (!file) return null;
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            const filePath = `spa/${fileName}`;
            const { data, error } = await supabaseClient.storage
                .from(STORAGE_BUCKET)
                .upload(filePath, file, {
                    cacheControl: '3600',
                    upsert: false
                });
            if (error) {
                console.error('Upload error:', error);
                showToast(t('addspa_toast_upload_error_prefix') + error.message, true);
                return null;
            }
            const { data: publicUrl } = supabaseClient.storage
                .from(STORAGE_BUCKET)
                .getPublicUrl(filePath);
            return publicUrl.publicUrl;
        }

        // ========== Track click CSKH (log lên bảng) ==========
        async function trackCSKHClick(channel) {
            // Lấy user hiện tại nếu có (có thể dùng auth, nhưng ở đây tùy chọn)
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    await supabaseClient.from('cskh_clicks').insert([{ user_id: user.id, channel, clicked_at: new Date() }]);
                } else {
                    // Nếu chưa login, lưu anonymous (có thể bỏ qua)
                    console.log('Anonymous click tracked:', channel);
                }
            } catch(e) { console.warn('track click error', e); }
        }
        document.querySelectorAll('[data-channel]').forEach(link => {
            link.addEventListener('click', () => trackCSKHClick(link.getAttribute('data-channel')));
        });

        // ========== Submit form: lưu vào Supabase (bảng products, channel_type='spa') ==========
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('spaName').value.trim();
            if (!name) {
                showToast(t('addspa_toast_no_name'), true);
                return;
            }
            const priceVal = priceHidden.value;
            if (!priceVal || parseInt(priceVal) <= 0) {
                showToast(t('addspa_toast_invalid_price'), true);
                return;
            }
            const category = document.getElementById('spaCategory').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + t('addspa_btn_saving');

            let imageUrl = null;
            if (imageInput.files.length > 0) {
                imageUrl = await uploadImage(imageInput.files[0]);
                if (!imageUrl && imageInput.files[0]) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-magic"></i> ' + t('addspa_btn_save');
                    return;
                }
            }

            try {
                const { data, error } = await supabaseClient
                    .from('products')
                    .insert([{
                        name: name,
                        category: category,
                        channel_type: 'spa',
                        stock: 9999, // Spa doesn't need a hard quantity count
                        price: parseFloat(priceVal),
                        image: imageUrl,
                        is_active: true,
                        created_at: new Date().toISOString()
                    }]);
                if (error) throw error;
                showToast(t('addspa_toast_success'));
                // Reset form
                document.getElementById('spaName').value = '';
                priceDisplay.value = '';
                priceHidden.value = '';
                imageInput.value = '';
                fileNameSpan.innerText = t('addspa_no_image');
                previewImg.classList.add('hidden');
                previewPlaceholder.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = "{{ url_for('spa') }}";
                }, 1500);
            } catch (err) {
                console.error(err);
                showToast(t('addspa_toast_error_prefix') + err.message, true);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-magic"></i> ' + t('addspa_btn_save');
            }
        });

        // --- 3D Background (giữ nguyên) ---
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 500 : 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0xe879f9, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const starCount = 80;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.07, y: (Math.random() - 0.5) * 0.1 - 0.04, z: (Math.random() - 0.5) * 0.03 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.09, color: 0xffaa88, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            scene.fog = new THREE.FogExp2(0x08061a, 0.008);

            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();
                material.color.setHSL((t * 0.02) % 0.1 + 0.8, 0.8, 0.6);
                particles.rotation.y = t * 0.03;
                particles.rotation.x = t * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);

                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
