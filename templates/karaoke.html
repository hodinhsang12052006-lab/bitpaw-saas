<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke & Billiards - BitPaw OS</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #08061a;
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.85;
            pointer-events: none;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #10b981, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.4;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #10b981, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.2;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .absolute-blur {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 500px;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .glass-card:hover {
            border-color: #10b981;
            transform: translateY(-6px);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
        }
        .room-card-active {
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.1);
        }

        @keyframes float-logo {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(16, 185, 129, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(16, 185, 129, 0.4)); }
        }
        .logo-float { animation: float-logo 4s ease-in-out infinite; }

        .btn-start {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 0.75rem;
            border-radius: 2rem;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        .btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            padding: 0.75rem;
            border-radius: 2rem;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: rgba(10, 15, 37, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 90%;
            width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        /* CSKH Widget */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(16,185,129,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }
        .glass-input-sm {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }
        .glass-input-sm:focus {
            border-color: #10b981;
            box-shadow: 0 0 8px rgba(16,185,129,0.3);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10002;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .room-grid { gap: 1rem; }
        }
    </style>
</head>
<body class="antialiased">
    
    <div class="scan-line"></div>
    <div class="laser-vertical"></div>
    <div class="absolute-blur"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="relative z-10 max-w-6xl mx-auto px-4 py-6 md:py-10">
        
        <!-- Header với logo BitPaw -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
            <div class="flex items-center gap-4">
                <div class="relative w-12 h-12 logo-float">
                    <div class="absolute inset-0 rounded-full border-2 border-emerald-500/50 animate-ping opacity-20"></div>
                    <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-full h-full rounded-full border-2 border-emerald-400 object-cover shadow-[0_0_15px_#10b981]">
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight">
                        Bit<span class="text-emerald-400">Paw</span> <span class="text-gray-400 text-lg font-medium" data-i18n="karaoke_title_suffix">| Karaoke & Bida</span>
                    </h1>
                    <p class="text-sm text-gray-400" data-i18n="karaoke_subtitle">Quản lý phòng hát & bida thông minh</p>
                </div>
            </div>
            <div class="flex gap-3 items-center">
                <button id="langToggleBtn" type="button" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-3 py-2 rounded-full text-xs font-bold transition">EN</button>
                <a href="{{ url_for('index') }}" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-4 py-2 rounded-full text-sm font-semibold transition">
                    <i class="fas fa-home"></i> <span data-i18n="karaoke_nav_dashboard">Dashboard</span>
                </a>
            </div>
        </div>

        <!-- Grid danh sách phòng (load qua /api/karaoke/rooms) -->
        <div class="room-grid" id="roomGrid">
            <div class="text-center col-span-full text-gray-500 py-10" data-i18n="karaoke_loading_rooms">Đang tải danh sách phòng...</div>
        </div>

    </div>

    <!-- Modal xác nhận thanh toán -->
    <div id="checkoutModal" class="modal-overlay">
        <div class="modal-container">
            <i class="fas fa-receipt text-4xl text-emerald-400 mb-3 block"></i>
            <h3 class="text-xl font-bold mb-2" data-i18n="karaoke_modal_confirm_title">Xác nhận thanh toán</h3>
            <p id="modalRoomName" class="text-gray-300 mb-4"></p>
            <div class="bg-black/40 rounded-xl p-3 mb-4">
                <p class="text-sm text-gray-400" data-i18n="karaoke_time_used">Thời gian đã sử dụng</p>
                <p id="modalDuration" class="text-2xl font-bold text-emerald-400">0 giờ 0 phút</p>
                <p class="text-sm text-gray-400 mt-2" data-i18n="karaoke_total_amount">Thành tiền</p>
                <p id="modalAmount" class="text-3xl font-black text-white">0₫</p>
            </div>
            <div class="mb-4 text-left">
                <label class="block text-xs font-bold text-gray-400 mb-1" data-i18n="karaoke_cust_phone_label">Số điện thoại khách hàng (Tùy chọn)</label>
                <input type="tel" id="custPhone" class="glass-input" placeholder="09xx xxx xxx" pattern="[0-9+ ]{8,15}" autocomplete="tel">
            </div>
            <div class="flex gap-3">
                <button id="confirmCheckoutBtn" class="flex-1 bg-gradient-to-r from-emerald-500 to-green-600 py-2 rounded-full font-bold" data-i18n="karaoke_btn_confirm">Xác nhận</button>
                <button id="cancelModalBtn" class="flex-1 bg-white/10 hover:bg-white/20 py-2 rounded-full font-bold" data-i18n="karaoke_btn_cancel">Hủy</button>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="bg-black/70 rounded-2xl p-6 flex flex-col items-center gap-3 border border-emerald-500/30">
            <i class="fas fa-spinner fa-pulse text-3xl text-emerald-400"></i>
            <span class="text-sm font-medium text-gray-200" data-i18n="karaoke_processing">Đang xử lý...</span>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        // Gọi thẳng Flask/MongoDB API nội bộ (db.karaoke_rooms, business_id lấy từ session
        // phía server), cùng pattern hrApi() với templates/chat.html. LƯU Ý: collection Mongo
        // thật tên "dining_tables" là bảng bàn POS hoàn toàn khác (không có
        // status/price_per_hour/start_time) nên KHÔNG được dùng ở đây; endpoint đúng là
        // /api/karaoke/rooms* (dựa trên db.karaoke_rooms).
        async function hrApi(path, options) {
            const res = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options && options.headers) },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                const err = new Error(body.message || body.error || `Lỗi máy chủ (${res.status})`);
                err.status = res.status;
                err.body = body;
                throw err;
            }
            return body;
        }

        let currentRoomId = null;
        let currentRoomName = '';
        let currentRoomPrice = 0;
        let currentStartTime = null;
        let currentTotalAmount = 0;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }

        // Load danh sách phòng từ collection karaoke_rooms qua Flask API (GET /api/karaoke/rooms)
        async function loadRooms() {
            showLoading(true);
            try {
                const body = await hrApi('/api/karaoke/rooms');
                const rooms = body.data || [];
                if (rooms.length === 0) {
                    document.getElementById('roomGrid').innerHTML = `<div class="text-center col-span-full text-gray-500 py-10">${t('karaoke_no_rooms_yet')}</div>`;
                    return;
                }
                renderRooms(rooms);
            } catch (error) {
                showToast(tf('karaoke_toast_error_loading_rooms', { msg: error.message }), true);
                document.getElementById('roomGrid').innerHTML = `<div class="text-center col-span-full text-rose-400 py-10">${t('karaoke_unable_load_rooms')}</div>`;
            } finally {
                showLoading(false);
            }
        }

        function renderRooms(rooms) {
            const grid = document.getElementById('roomGrid');
            grid.innerHTML = rooms.map(room => `
                <div class="glass-card p-5 ${room.status === 'Đang chơi' ? 'room-card-active' : ''}" data-room-id="${room.id}" data-status="${room.status}" data-start="${room.start_time || ''}" data-price="${room.price_per_hour || 0}">
                    <div class="text-center">
                        <div class="text-2xl font-bold text-white mb-2">${escapeHtml(room.name)}</div>
                        <div class="text-emerald-400 font-mono text-sm mb-3">${(room.price_per_hour || 0).toLocaleString('vi-VN')} đ / ${t('karaoke_unit_hr_long')}</div>
                        ${room.status === 'Trống' ? `
                            <div class="text-gray-400 text-xs mb-3"><i class="fas fa-door-open"></i> ${t('karaoke_available')}</div>
                            <button class="btn-start start-room" data-id="${room.id}">
                                <i class="fas fa-play mr-1"></i> ${t('karaoke_btn_start')}
                            </button>
                        ` : `
                            <div class="text-gray-300 text-xs mb-2">
                                <i class="fas fa-hourglass-half"></i> ${t('karaoke_started_label')} ${room.start_time ? new Date(room.start_time).toLocaleTimeString() : '--:--'}
                            </div>
                            <div class="text-rose-400 font-mono text-sm mb-3" id="timer-${room.id}">
                                <i class="fas fa-clock"></i> ${t('karaoke_playing_label')} <span class="timer-value">0 ${t('karaoke_unit_min')}</span>
                            </div>
                            <button class="btn-stop checkout-room" data-id="${room.id}" data-name="${escapeHtml(room.name)}">
                                <i class="fas fa-money-bill-wave mr-1"></i> ${t('karaoke_btn_payment')}
                            </button>
                        `}
                    </div>
                </div>
            `).join('');
            attachEvents();
            startTimers();
        }

        function attachEvents() {
            document.querySelectorAll('.start-room').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const roomId = btn.getAttribute('data-id');
                    await startRoom(roomId);
                });
            });
            document.querySelectorAll('.checkout-room').forEach(btn => {
                btn.addEventListener('click', () => {
                    const card = btn.closest('.glass-card');
                    currentRoomId = parseInt(btn.getAttribute('data-id'));
                    currentRoomName = btn.getAttribute('data-name');
                    currentRoomPrice = parseInt(card.getAttribute('data-price')) || 0;
                    const startTimeStr = card.getAttribute('data-start');
                    if (!startTimeStr) { showToast(t('karaoke_toast_no_start_time'), true); return; }
                    currentStartTime = new Date(startTimeStr);
                    const now = new Date();
                    const diffMs = now - currentStartTime;
                    if (diffMs <= 0) { showToast(t('karaoke_toast_time_error'), true); return; }
                    const minutes = Math.floor(diffMs / 60000);
                    let roundedMinutes = minutes < 15 ? 15 : Math.ceil(minutes / 15) * 15;
                    const hours = roundedMinutes / 60;
                    const totalAmount = hours * currentRoomPrice;
                    currentTotalAmount = totalAmount;
                    const hoursShow = Math.floor(roundedMinutes / 60);
                    const minsShow = roundedMinutes % 60;
                    document.getElementById('modalRoomName').innerText = tf('karaoke_modal_room_label', { name: currentRoomName });
                    document.getElementById('modalDuration').innerText = `${hoursShow > 0 ? hoursShow + ' ' + t('karaoke_unit_hr') + ' ' : ''}${minsShow} ${t('karaoke_unit_min')}`;
                    document.getElementById('modalAmount').innerText = totalAmount.toLocaleString('vi-VN') + '₫';
                    document.getElementById('checkoutModal').classList.add('active');
                });
            });
        }

        async function startRoom(roomId) {
            showLoading(true);
            try {
                // Atomic trên server (find_one_and_update lọc status='Trống') — 409 nghĩa là
                // phòng vừa bị người khác bấm Start trước, không phải lỗi thật.
                await hrApi(`/api/karaoke/rooms/${roomId}/start`, { method: 'POST' });
                showToast(t('karaoke_toast_room_activated'));
                await loadRooms();
            } catch (error) {
                if (error.status === 409) {
                    showToast(t('karaoke_toast_room_taken'), true);
                    await loadRooms();
                } else {
                    showToast(tf('karaoke_toast_error_starting_room', { msg: error.message }), true);
                }
            } finally {
                showLoading(false);
            }
        }

        async function endRoom(roomId, customerPhone) {
            showLoading(true);
            try {
                // Server tính tiền theo thời gian thực tế (làm tròn lên 15 phút, tối thiểu 15
                // phút), tự tạo order/order_item doanh thu và reset phòng về trống — tất cả
                // trong 1 lệnh gọi duy nhất (trước đây là 3 lệnh riêng: insert orders, insert
                // order_items, update trạng thái phòng).
                const body = await hrApi(`/api/karaoke/rooms/${roomId}/checkout`, {
                    method: 'POST',
                    body: JSON.stringify({ customer_phone: customerPhone }),
                });
                const amountStr = (body.total_amount || 0).toLocaleString('vi-VN') + '₫';
                showToast(tf('karaoke_toast_payment_success', { amount: amountStr }));
                await loadRooms();
            } catch (error) {
                if (error.status === 409) {
                    showToast(t('karaoke_toast_already_checked_out'), true);
                    await loadRooms();
                } else {
                    showToast(tf('karaoke_toast_payment_error', { msg: error.message }), true);
                }
            } finally {
                showLoading(false);
            }
        }

        function startTimers() {
            setInterval(() => {
                document.querySelectorAll('.glass-card[data-status="Đang chơi"]').forEach(card => {
                    const startStr = card.getAttribute('data-start');
                    if (startStr) {
                        const start = new Date(startStr);
                        const now = new Date();
                        const diffMs = now - start;
                        if (diffMs > 0) {
                            const minutes = Math.floor(diffMs / 60000);
                            const hours = Math.floor(minutes / 60);
                            const mins = minutes % 60;
                            const timerSpan = card.querySelector('.timer-value');
                            if (timerSpan) {
                                if (hours > 0) timerSpan.innerText = `${hours} ${t('karaoke_unit_hr')} ${mins} ${t('karaoke_unit_min')}`;
                                else timerSpan.innerText = `${minutes} ${t('karaoke_unit_min')}`;
                            }
                        }
                    }
                });
            }, 60000);
        }

        document.getElementById('confirmCheckoutBtn').addEventListener('click', async () => {
            if (currentRoomId) {
                const custPhone = document.getElementById('custPhone').value.trim() || null;
                document.getElementById('checkoutModal').classList.remove('active');
                await endRoom(currentRoomId, custPhone);
                document.getElementById('custPhone').value = '';
                currentRoomId = null;
            }
        });
        document.getElementById('cancelModalBtn').addEventListener('click', () => {
            document.getElementById('checkoutModal').classList.remove('active');
            document.getElementById('custPhone').value = '';
            currentRoomId = null;
        });
        document.getElementById('checkoutModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('checkoutModal')) {
                document.getElementById('checkoutModal').classList.remove('active');
                currentRoomId = null;
            }
        });

        // CSKH track click + form hỗ trợ: gom về static/js/cskh_track.js (dùng chung,
        // gọi /api/cskh/click + /api/cskh/request qua Flask/MongoDB) — xem <script> nạp cuối trang.

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        // ========== MULTI-REGION i18n ==========
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";
        const translations = {
            vi: {
                karaoke_title_suffix: '| Karaoke & Bida',
                karaoke_subtitle: 'Quản lý phòng hát & bida thông minh',
                karaoke_nav_dashboard: 'Dashboard',
                karaoke_loading_rooms: 'Đang tải danh sách phòng...',
                karaoke_modal_confirm_title: 'Xác nhận thanh toán',
                karaoke_time_used: 'Thời gian đã sử dụng',
                karaoke_total_amount: 'Thành tiền',
                karaoke_cust_phone_label: 'Số điện thoại khách hàng (Tùy chọn)',
                karaoke_btn_confirm: 'Xác nhận',
                karaoke_btn_cancel: 'Hủy',
                karaoke_processing: 'Đang xử lý...',
                karaoke_toast_error_loading_rooms: 'Lỗi tải phòng: {msg}',
                karaoke_unable_load_rooms: 'Không thể tải danh sách phòng',
                karaoke_no_rooms_yet: 'Chưa có phòng nào. Hãy thêm phòng trong database.',

        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function tf(key, params) {
            let str = t(key);
            for (const k in params) str = str.split(`{${k}}`).join(params[k]);
            return str;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
            // Re-render dynamic room cards & timers so they re-localize too
            loadRooms();
        }
        applyStaticTranslations();
        const langToggleBtn = document.getElementById('langToggleBtn');
        if (langToggleBtn) {
            langToggleBtn.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));
        }

        loadRooms();

        // 3D Background (giữ nguyên)
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 600 : 1200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x10b981, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const starCount = 80;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.06, y: (Math.random() - 0.5) * 0.08 - 0.03, z: (Math.random() - 0.5) * 0.02 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.1, color: 0xffaa88, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            scene.fog = new THREE.FogExp2(0x08061a, 0.008);

            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length) {
                    mouseX = (e.touches[0].clientX - halfX) * 0.001;
                    mouseY = (e.touches[0].clientY - halfY) * 0.001;
                }
            }, { passive: true });
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsed = clock.getElapsedTime();
                const hue = (elapsed * 0.03) % 1;
                material.color.setHSL(hue, 0.8, 0.6);
                particles.rotation.y = elapsed * 0.02;
                particles.rotation.x = elapsed * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);

                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
