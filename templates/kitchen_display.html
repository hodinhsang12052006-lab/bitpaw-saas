<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BitPaw KDS | Smart Kitchen Display</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #08061a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.85;
            pointer-events: none;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .absolute-blur {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 500px;
            background: rgba(6, 182, 212, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes float-logo {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float {
            animation: float-logo 4s ease-in-out infinite;
        }

        .order-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.2rem;
            transition: all 0.2s;
        }
        .order-card:hover {
            border-color: #06b6d4;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        .new-order {
            animation: pulse-glow 0.5s ease-in-out 3;
        }
        @keyframes pulse-glow {
            0% { border-color: rgba(6, 182, 212, 0.3); box-shadow: 0 0 0 rgba(6,182,212,0); }
            50% { border-color: #06b6d4; box-shadow: 0 0 20px rgba(6,182,212,0.8); }
            100% { border-color: rgba(6, 182, 212, 0.3); box-shadow: 0 0 0 rgba(6,182,212,0); }
        }
        .btn-complete {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-complete:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.5); border-radius: 10px; }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.2rem;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 0.5rem;
        }
        @media (max-width: 768px) {
            .orders-grid { grid-template-columns: 1fr; }
        }

        /* CSKH Widget */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-top: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(6,182,212,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }
        .glass-input-sm {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }
        .glass-input-sm:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6,182,212,0.3);
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10003;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10002;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="antialiased">
    
    <div class="scan-line"></div>
    <div class="laser-vertical"></div>
    <div class="absolute-blur"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="relative z-10 h-screen flex flex-col p-4 md:p-6">
        
        <!-- Header với logo và thông tin -->
        <div class="flex justify-between items-center mb-6 glass-panel px-6 py-3 rounded-2xl">
            <div class="flex items-center gap-4">
                <div class="relative w-10 h-10 logo-float">
                    <div class="absolute inset-0 rounded-full border-2 border-cyan-500/50 animate-ping opacity-20"></div>
                    <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-full h-full rounded-full border-2 border-cyan-400 object-cover shadow-[0_0_15px_#06b6d4]">
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">Bit<span class="text-cyan-400">Paw</span> <span class="text-gray-300 text-lg font-medium" data-i18n="kitchen_display_header_suffix">| Kitchen Display</span></h1>
                    <p class="text-[10px] text-gray-400 tracking-wider" data-i18n="kitchen_display_header_subtitle">Kitchen Display System - Realtime order tracking</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="langToggleBtn" type="button" class="bg-white/10 hover:bg-white/20 text-white px-3 py-1 rounded-full text-[10px] font-bold transition">EN</button>
                <div class="bg-emerald-500/20 border border-emerald-500/50 rounded-full px-3 py-1 text-xs font-bold text-emerald-400 flex items-center gap-1">
                    <i class="fas fa-circle text-[6px] animate-pulse"></i> <span data-i18n="kitchen_display_online">Online</span>
                </div>
                <span id="currentTime" class="text-sm font-mono text-gray-300 bg-black/30 px-3 py-1 rounded-full"></span>
            </div>
        </div>

        <!-- Khu vực hiển thị đơn hàng -->
        <div class="flex-1 overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-cyan-400 flex items-center gap-2"><i class="fas fa-receipt"></i> <span data-i18n="kitchen_display_orders_heading">Orders to Prepare</span></h2>
                <div class="text-xs text-gray-400 bg-black/30 px-3 py-1 rounded-full">
                    <i class="fas fa-sync-alt"></i> <span data-i18n="kitchen_display_realtime_updates">Realtime updates</span>
                </div>
            </div>
            <div id="ordersContainer" class="orders-grid">
                <div class="col-span-full text-center text-gray-500 py-20" data-i18n="kitchen_display_loading_orders">Loading orders...</div>
            </div>
        </div>

    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="bg-black/80 rounded-2xl p-6 flex flex-col items-center gap-3 border border-cyan-500/30"><i class="fas fa-spinner fa-spin text-3xl text-cyan-400"></i><span class="text-sm" data-i18n="kitchen_display_processing">Processing...</span></div></div>
    <div id="toast" class="toast"></div>

    <script type="module">
        // ========== LOGIC CHÍNH — Flask API nội bộ (db.kitchen_orders), thay Supabase JS. ==========
        async function hrApi(path, options) {
            const res = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options && options.headers) },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                throw new Error(body.error || `Lỗi máy chủ (${res.status})`);
            }
            return body;
        }

        let orders = [];
        let realtimeChannel = null;

        const ordersContainer = document.getElementById('ordersContainer');
        const toast = document.getElementById('toast');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function showToast(msg, isError = false) {
            toast.innerText = msg;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function showLoading(show) {
            if (show) loadingOverlay.classList.add('active');
            else loadingOverlay.classList.remove('active');
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        }

        const STATUS_LABEL_KEY = { pending: 'kitchen_display_status_pending', cooking: 'kitchen_display_status_cooking', completed: 'kitchen_display_status_done' };
        const STATUS_BADGE_CLASS = {
            pending: 'bg-gray-500/20 text-gray-300 border-gray-500/30',
            cooking: 'bg-orange-500/20 text-orange-300 border-orange-500/30 animate-pulse',
            completed: 'bg-emerald-500/20 text-emerald-300 border-emerald-500/30'
        };

        function renderOrders() {
            if (!orders.length) {
                ordersContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-20"><i class="fas fa-check-circle text-4xl mb-2 opacity-30"></i><br>${t('kitchen_display_no_orders_waiting')}</div>`;
                return;
            }
            ordersContainer.innerHTML = orders.map(order => {
                const status = order.status || 'pending';
                const actionBtn = status === 'cooking'
                    ? `<button class="btn-complete text-sm px-3 py-1.5" onclick="completeOrder(${order.id})"><i class="fas fa-check mr-1"></i> ${t('kitchen_display_btn_complete')}</button>`
                    : `<button class="btn-complete text-sm px-3 py-1.5" onclick="startCooking(${order.id})"><i class="fas fa-fire mr-1"></i> ${t('kitchen_display_btn_start_cooking')}</button>`;
                return `
                <div class="order-card p-4 flex flex-col gap-3" data-order-id="${order.id}">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-white text-lg">${escapeHtml(order.table_name || ('Table ' + order.table_id))}</h3>
                            <p class="text-[10px] text-gray-400"><i class="far fa-clock"></i> ${formatTime(order.created_at)}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="text-[9px] font-bold uppercase px-2 py-0.5 rounded-full border ${STATUS_BADGE_CLASS[status] || STATUS_BADGE_CLASS.pending}">${t(STATUS_LABEL_KEY[status]) || status}</span>
                            ${actionBtn}
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${order.items.map(item => `
                            <div class="flex justify-between items-center border-b border-white/5 pb-1 text-sm">
                                <span class="text-gray-200">${escapeHtml(item.name)}</span>
                                <span class="text-emerald-400 font-bold">x${item.qty}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            }).join('');
        }

        let lastOrderIds = new Set();
        function checkNewOrders(newOrders) {
            const newIds = new Set(newOrders.map(o => o.id));
            newOrders.forEach(order => {
                if (!lastOrderIds.has(order.id)) {
                    const card = document.querySelector(`.order-card[data-order-id="${order.id}"]`);
                    if (card) {
                        card.classList.add('new-order');
                        setTimeout(() => card.classList.remove('new-order'), 1500);
                        showToast(`🆕 ${tf('kitchen_display_toast_new_order', { table: order.table_name || 'Table ' + order.table_id })}`, false);
                    }
                }
            });
            lastOrderIds = newIds;
        }

        window.startCooking = async (orderId) => {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            showLoading(true);
            try {
                await hrApi(`/api/kitchen/orders/${orderId}`, { method: 'PATCH', body: JSON.stringify({ status: 'cooking' }) });
                order.status = 'cooking';
                renderOrders();
                showToast(`🔥 ${tf('kitchen_display_toast_cooking_order', { table: order.table_name })}`, false);
            } catch (err) {
                console.warn(err);
                showToast(t('kitchen_display_toast_error_updating'), true);
            } finally {
                showLoading(false);
            }
        };

        window.completeOrder = async (orderId) => {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            showLoading(true);
            try {
                await hrApi(`/api/kitchen/orders/${orderId}`, { method: 'PATCH', body: JSON.stringify({ status: 'completed' }) });
                orders = orders.filter(o => o.id !== orderId);
                renderOrders();
                checkNewOrders(orders);
                showToast(`✅ ${tf('kitchen_display_toast_completed_order', { table: order.table_name })}`, false);
            } catch (err) {
                console.warn(err);
                showToast(t('kitchen_display_toast_error_updating'), true);
            } finally {
                showLoading(false);
            }
        };

        // Tải danh sách vé bếp + kết nối SSE thay Supabase Realtime.
        async function loadOrders() {
            try {
                const body = await hrApi('/api/kitchen/orders');
                orders = (body.data || []).map(o => ({
                    id: o.id,
                    table_id: o.table_id,
                    table_name: o.table_name,
                    items: o.items,
                    created_at: o.created_at,
                    status: o.status
                }));
                renderOrders();
                checkNewOrders(orders);
            } catch (err) {
                console.warn('Không tải được danh sách vé bếp.', err);
            }
        }

        // Layer tương đương "public:tasks_app" — SSE (MongoDB Change Stream ở
        // /api/stream/kitchen) thay kênh Supabase Realtime `kitchen-orders`. Server chỉ gửi
        // tín hiệu "đã đổi", client tự loadOrders() lại — không cần phân biệt INSERT/UPDATE
        // ở client như bản Supabase cũ vì loadOrders() luôn lấy đúng danh sách pending+cooking
        // mới nhất từ server.
        async function connectRealtime() {
            await loadOrders();
            realtimeChannel = new EventSource('/api/stream/kitchen');
            realtimeChannel.onmessage = () => loadOrders();
            realtimeChannel.onerror = () => console.warn('Mất kết nối SSE bếp, trình duyệt sẽ tự reconnect.');
        }

        // Cập nhật thời gian thực
        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('vi-VN');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // CSKH track click + form hỗ trợ: gom về static/js/cskh_track.js (dùng chung,
        // gọi /api/cskh/click + /api/cskh/request qua Flask/MongoDB) — xem <script> nạp cuối trang.

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        // ========== MULTI-REGION i18n ==========
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";
        const translations = {
            vi: {
                kitchen_display_header_suffix: '| Màn Hình Bếp',
                kitchen_display_header_subtitle: 'Hệ thống màn hình bếp - Theo dõi đơn hàng thời gian thực',
                kitchen_display_online: 'Đang hoạt động',
                kitchen_display_orders_heading: 'Đơn Hàng Cần Chế Biến',
                kitchen_display_realtime_updates: 'Cập nhật thời gian thực',
                kitchen_display_loading_orders: 'Đang tải đơn hàng...',
                kitchen_display_processing: 'Đang xử lý...',
                kitchen_display_no_orders_waiting: 'Không có đơn hàng chờ',
                kitchen_display_status_pending: 'Chờ xử lý',
                kitchen_display_status_cooking: 'Đang chế biến',
                kitchen_display_status_done: 'Hoàn thành',
                kitchen_display_btn_complete: 'Hoàn thành',
                kitchen_display_btn_start_cooking: 'Bắt đầu nấu',
                kitchen_display_toast_new_order: 'Đơn hàng mới từ {table}',
                kitchen_display_toast_cooking_order: 'Đang nấu đơn {table}',
                kitchen_display_toast_completed_order: 'Đã hoàn thành đơn {table}',
                kitchen_display_toast_error_updating: 'Lỗi khi cập nhật đơn hàng',
                kitchen_display_toast_fill_all: 'Vui lòng điền đầy đủ thông tin',
                kitchen_display_toast_request_sent: 'Đã gửi yêu cầu! Chúng tôi sẽ liên hệ trong vòng 15 phút.',
                kitchen_display_toast_error_prefix: 'Lỗi: '
            },
            en: {
                kitchen_display_header_suffix: '| Kitchen Display',
                kitchen_display_header_subtitle: 'Kitchen Display System - Realtime order tracking',
                kitchen_display_online: 'Online',
                kitchen_display_orders_heading: 'Orders to Prepare',
                kitchen_display_realtime_updates: 'Realtime updates',
                kitchen_display_loading_orders: 'Loading orders...',
                kitchen_display_processing: 'Processing...',
                kitchen_display_no_orders_waiting: 'No orders waiting',
                kitchen_display_status_pending: 'Pending',
                kitchen_display_status_cooking: 'Cooking',
                kitchen_display_status_done: 'Done',
                kitchen_display_btn_complete: 'Complete',
                kitchen_display_btn_start_cooking: 'Start Cooking',
                kitchen_display_toast_new_order: 'New order from {table}',
                kitchen_display_toast_cooking_order: 'Cooking order {table}',
                kitchen_display_toast_completed_order: 'Completed order {table}',
                kitchen_display_toast_error_updating: 'Error updating order',
                kitchen_display_toast_fill_all: 'Please fill in all information',
                kitchen_display_toast_request_sent: 'Request sent! We will contact you within 15 minutes.',
                kitchen_display_toast_error_prefix: 'Error: '
            }
        };
        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function tf(key, params) {
            let str = t(key);
            for (const k in params) str = str.split(`{${k}}`).join(params[k]);
            return str;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
            renderOrders();
        }
        applyStaticTranslations();
        const langToggleBtn = document.getElementById('langToggleBtn');
        if (langToggleBtn) {
            langToggleBtn.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));
        }

        // Khởi tạo
        renderOrders();
        connectRealtime();

        // 3D Background (giữ nguyên)
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 700 : 1500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x06b6d4, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const starCount = 100;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.07, y: (Math.random() - 0.5) * 0.1 - 0.04, z: (Math.random() - 0.5) * 0.03 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.09, color: 0xffaa88, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            scene.fog = new THREE.FogExp2(0x08061a, 0.008);

            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length) {
                    mouseX = (e.touches[0].clientX - halfX) * 0.001;
                    mouseY = (e.touches[0].clientY - halfY) * 0.001;
                }
            }, { passive: true });
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsed = clock.getElapsedTime();
                const hue = (elapsed * 0.03) % 1;
                material.color.setHSL(hue, 0.8, 0.6);
                particles.rotation.y = elapsed * 0.02;
                particles.rotation.x = elapsed * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);

                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
    <script src="{{ url_for('static', filename='js/cskh_track.js') }}"></script>
</body>
