<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08061a">
    
    <title>Chat Nội Bộ | BitPaw OS</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <style>
        body { background-color: #08061a; color: white; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; overscroll-behavior-y: none; }
        .mobile-container { max-width: 480px; margin: 0 auto; height: 100vh; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; background: transparent; }
        
        /* 3D Canvas Background */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.8; pointer-events: none; }
        
        /* Glassmorphism */
        .glass-panel { background: rgba(10, 15, 37, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-header { background: rgba(10, 15, 37, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Chat Bubbles */
        .chat-bubble-me { background: linear-gradient(135deg, #06b6d4, #3b82f6); border-radius: 18px 18px 4px 18px; box-shadow: 0 5px 15px rgba(6,182,212,0.2); }
        .chat-bubble-other { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px 18px 18px 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        /* Chuyển trang mượt mà */
        .screen { display: none; flex-direction: column; height: 100%; position: relative; z-index: 10; }
        .screen.active { display: flex; animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Ẩn input file camera & thanh cuộn */
        #cameraInput { display: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black">
    <canvas id="bg-canvas"></canvas>

    <div id="toast-container" class="fixed top-8 left-1/2 -translate-x-1/2 w-full max-w-[440px] px-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div id="lightbox" class="fixed inset-0 z-[9999] bg-black/90 backdrop-blur-lg hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white text-xl hover:bg-rose-500 transition-colors"><i class="fas fa-times"></i></button>
        <img id="lightbox-img" src="" class="max-w-full max-h-[85vh] rounded-2xl object-contain shadow-[0_0_50px_rgba(6,182,212,0.3)] transform scale-95 transition-transform duration-300">
    </div>

    <div class="mobile-container">
        
        <div id="screen_contacts" class="screen active glass-panel">
            <div class="p-6 shrink-0 glass-header rounded-b-[30px] z-20">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3 cursor-pointer group">
                        <div class="w-10 h-10 bg-gradient-to-br from-cyan-500/20 to-blue-600/20 rounded-xl flex items-center justify-center border border-cyan-500/50 group-hover:rotate-12 transition-transform overflow-hidden shadow-inner">
                            <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-full h-full object-cover drop-shadow-[0_0_8px_#06b6d4]">
                        </div>
                        <h1 class="text-xl font-black tracking-widest text-white" data-i18n="appchat_page_title">Trạm <span class="text-cyan-400">Liên Lạc</span></h1>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="langToggleBtn" type="button" class="bg-white/10 hover:bg-white/20 text-white px-2.5 py-1 rounded-full text-[10px] font-bold transition">EN</button>
                        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 hover:bg-white/20 transition flex items-center justify-center text-gray-400 hover:text-rose-400"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <div class="relative">
                    <input type="text" data-i18n-placeholder="appchat_search_placeholder" placeholder="Tìm kiếm đồng nghiệp..." class="w-full bg-black/50 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-sm text-white focus:outline-none focus:border-cyan-400 transition-colors shadow-inner">
                    <i class="fas fa-search absolute left-4 top-4 text-gray-500"></i>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-5 space-y-6 hide-scrollbar relative z-10">
                <div>
                    <p class="text-[10px] font-black text-cyan-500/70 uppercase tracking-widest mb-3 ml-2 flex items-center"><i class="fas fa-users mr-2"></i> <span data-i18n="appchat_group_label">Nhóm Tập Thể</span></p>
                    <div onclick="openChat('KenhChung', t('appchat_general_channel_name'))" class="flex items-center gap-4 p-4 rounded-3xl bg-gradient-to-r from-cyan-900/40 to-blue-900/20 border border-cyan-500/30 cursor-pointer active:scale-95 transition-all hover:border-cyan-400 shadow-[0_5px_20px_rgba(6,182,212,0.15)]">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center text-white text-2xl shadow-inner shrink-0 transform -rotate-6">
                            <i class="fas fa-bullhorn"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="font-black text-white truncate text-base" data-i18n="appchat_company_name">Công Ty BitPaw</h4>
                            </div>
                            <p class="text-xs text-cyan-300/80 truncate font-medium" id="last_msg_KenhChung" data-i18n="appchat_syncing">Đang đồng bộ vệ tinh...</p>
                        </div>
                    </div>
                </div>

                <div>
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 ml-2 flex items-center"><i class="fas fa-address-book mr-2"></i> <span data-i18n="appchat_staff_directory_label">Sơ đồ Nhân Sự</span></p>
                    <div class="space-y-3" id="danh_ba_nhan_su">
                        <div class="animate-pulse flex items-center gap-4 p-3 rounded-3xl bg-white/5 border border-white/5">
                            <div class="w-12 h-12 rounded-full bg-white/10 shrink-0"></div>
                            <div class="flex-1 space-y-2">
                                <div class="h-3 bg-white/10 rounded w-1/3"></div>
                                <div class="h-2 bg-white/10 rounded w-2/3"></div>
                            </div>
                        </div>
                        <div class="animate-pulse flex items-center gap-4 p-3 rounded-3xl bg-white/5 border border-white/5">
                            <div class="w-12 h-12 rounded-full bg-white/10 shrink-0"></div>
                            <div class="flex-1 space-y-2">
                                <div class="h-3 bg-white/10 rounded w-1/2"></div>
                                <div class="h-2 bg-white/10 rounded w-3/4"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen_chat" class="screen">
            <div class="h-20 glass-header flex items-center px-4 z-20 shrink-0">
                <button onclick="closeChat()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white mr-2 transition-colors"><i class="fas fa-arrow-left text-xl"></i></button>
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <div class="w-11 h-11 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center text-white font-bold overflow-hidden border-2 border-[#08061a] shadow-md shrink-0" id="chat_icon">
                        <i class="fas fa-bullhorn text-sm"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 id="chat_title" class="font-black text-white text-base truncate pr-2" data-i18n="appchat_loading">Đang tải...</h3>
                        <p class="text-[10px] text-emerald-400 flex items-center gap-1.5 font-bold tracking-widest uppercase"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_5px_#34d399]"></span> <span id="chat_status" data-i18n="appchat_connecting">Connecting...</span></p>
                    </div>
                </div>
            </div>

            <div id="chatBox" class="flex-1 overflow-y-auto p-5 space-y-5 scroll-smooth hide-scrollbar pb-6 bg-black/20 backdrop-blur-sm z-10">
            </div>

            <div class="flex items-center gap-4 px-4 py-2 bg-[#0a0f25]/90 backdrop-blur-md overflow-x-auto whitespace-nowrap hide-scrollbar border-t border-white/5 z-20">
                <button onclick="showToast(t('appchat_gif_wip'), 'warning')" class="px-3 py-1.5 bg-gradient-to-r from-cyan-500/20 to-blue-500/20 border border-cyan-500/30 rounded-lg text-[10px] font-black tracking-widest hover:bg-cyan-500 hover:text-black transition-all flex items-center gap-1 shrink-0 text-cyan-400 uppercase">
                    <i class="fas fa-photo-video"></i> GIF
                </button>
                <div class="w-px h-5 bg-white/10 shrink-0 mx-1"></div>
                <button onclick="addEmoji('👍')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">👍</button>
                <button onclick="addEmoji('❤️')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">❤️</button>
                <button onclick="addEmoji('😂')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">😂</button>
                <button onclick="addEmoji('✅')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">✅</button>
                <button onclick="addEmoji('🔥')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">🔥</button>
                <button onclick="addEmoji('🚀')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">🚀</button>
                <button onclick="addEmoji('💯')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">💯</button>
                <button onclick="addEmoji('🙏')" class="text-xl hover:scale-125 transition-transform shrink-0 drop-shadow-md">🙏</button>
            </div>

            <div class="p-4 bg-[#0a0f25] z-20 shrink-0 flex items-center gap-3 pb-6">
                <button onclick="document.getElementById('cameraInput').click()" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 text-cyan-400 hover:bg-cyan-500/20 hover:border-cyan-500/50 flex items-center justify-center text-xl shrink-0 transition-all shadow-inner">
                    <i class="fas fa-camera"></i>
                </button>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="uploadImage(this)">

                <form id="chatForm" class="flex-1 flex items-center gap-2 relative">
                    <input type="text" id="msgInput" data-i18n-placeholder="appchat_msg_placeholder" placeholder="Nhập tin nhắn..." autocomplete="off" class="flex-1 bg-black/60 border border-white/10 rounded-2xl py-3.5 pl-4 pr-12 text-sm text-white focus:outline-none focus:border-cyan-400 transition-colors shadow-inner">
                    <button type="submit" id="sendBtn" class="absolute right-1.5 top-1.5 bottom-1.5 w-10 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white flex items-center justify-center shadow-[0_0_10px_rgba(6,182,212,0.4)] shrink-0 transition-transform active:scale-90">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // ========================================================
        // MULTI-LANGUAGE i18n (shared 'bitpaw_lang' key with dashboard.html etc.)
        // ========================================================
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";
        const translations = {
            vi: {
                appchat_page_title: 'Trạm <span class="text-cyan-400">Liên Lạc</span>',
                appchat_search_placeholder: 'Tìm kiếm đồng nghiệp...',
                appchat_group_label: 'Nhóm Tập Thể',
                appchat_company_name: 'Công Ty BitPaw',
                appchat_syncing: 'Đang đồng bộ vệ tinh...',
                appchat_staff_directory_label: 'Sơ đồ Nhân Sự',
                appchat_loading: 'Đang tải...',
                appchat_connecting: 'Connecting...',
                appchat_general_channel_name: 'Kênh Thông Báo Chung',
                appchat_msg_placeholder: 'Nhập tin nhắn...',
                appchat_gif_wip: 'Kho GIF Meme đang được kỹ sư tải lên! Chờ xíu nha Sếp!',
                appchat_guest_name: 'Khách Vãng Lai',
                appchat_click_to_chat: 'Nhấn để trò chuyện...',
                appchat_sent_image: '[Đã gửi một hình ảnh]',
                appchat_sent_image_short: '[Hình ảnh]',
                appchat_you_prefix: 'Bạn: ',
                appchat_syncing_satellite: 'Đang lấy dữ liệu vệ tinh...',
                appchat_e2e_encrypted: 'Đoạn chat mã hóa 2 đầu',
                appchat_status_syncing: 'Syncing...',
                appchat_status_online: 'Online',
                appchat_error_load_chat: 'Lỗi load đoạn chat!',
                appchat_error_load_contacts: 'Lỗi tải danh bạ!',
                appchat_error_upload_image: 'Lỗi up ảnh! Kiểm tra mạng.',
            },
            en: {
                appchat_page_title: '<span class="text-cyan-400">Comms</span> Station',
                appchat_search_placeholder: 'Search colleagues...',
                appchat_group_label: 'Group Channels',
                appchat_company_name: 'BitPaw Company',
                appchat_syncing: 'Syncing satellite...',
                appchat_staff_directory_label: 'Staff Directory',
                appchat_loading: 'Loading...',
                appchat_connecting: 'Connecting...',
                appchat_general_channel_name: 'General Announcement Channel',
                appchat_msg_placeholder: 'Type a message...',
                appchat_gif_wip: 'The GIF/Meme library is being uploaded by engineers! Hang tight, boss!',
                appchat_guest_name: 'Guest',
                appchat_click_to_chat: 'Tap to chat...',
                appchat_sent_image: '[Sent an image]',
                appchat_sent_image_short: '[Image]',
                appchat_you_prefix: 'You: ',
                appchat_syncing_satellite: 'Fetching satellite data...',
                appchat_e2e_encrypted: 'End-to-end encrypted chat',
                appchat_status_syncing: 'Syncing...',
                appchat_status_online: 'Online',
                appchat_error_load_chat: 'Error loading chat!',
                appchat_error_load_contacts: 'Error loading contacts!',
                appchat_error_upload_image: 'Error uploading image! Check your connection.',
            }
        };
        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.getAttribute('data-i18n-title')); });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
            if (typeof loadDanhBa === 'function' && document.getElementById('screen_contacts').classList.contains('active')) loadDanhBa();
        }
        applyStaticTranslations();
        document.getElementById('langToggleBtn')?.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));

        // ========================================================
        // 🚀 UI/UX SYSTEM (TOAST & LIGHTBOX)
        // ========================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let colorClass = 'cyan'; let iconClass = 'fa-info-circle';
            if(type === 'success') { colorClass = 'emerald'; iconClass = 'fa-check-circle'; }
            if(type === 'error') { colorClass = 'rose'; iconClass = 'fa-exclamation-triangle'; }
            if(type === 'warning') { colorClass = 'amber'; iconClass = 'fa-exclamation-circle'; }

            toast.className = `bg-[#0a0f25]/95 backdrop-blur-xl border border-${colorClass}-500/50 text-white px-4 py-3.5 rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.5)] flex items-center gap-3 transform -translate-y-full opacity-0 transition-all duration-300 w-full`;
            toast.innerHTML = `<i class="fas ${iconClass} text-${colorClass}-400 text-xl shrink-0 drop-shadow-[0_0_5px_currentColor]"></i> <span class="text-[13px] font-medium leading-relaxed">${message}</span>`;
            
            container.appendChild(toast);
            
            // Animate in
            setTimeout(() => { toast.classList.remove('-translate-y-full', 'opacity-0'); toast.classList.add('translate-y-2'); }, 10);
            
            // Auto remove
            setTimeout(() => {
                toast.classList.remove('translate-y-2'); toast.classList.add('-translate-y-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function openLightbox(imgSrc) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = imgSrc;
            
            lightbox.classList.remove('hidden'); lightbox.classList.add('flex');
            setTimeout(() => { lightbox.classList.remove('opacity-0'); img.classList.remove('scale-95'); }, 10);
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            
            lightbox.classList.add('opacity-0'); img.classList.add('scale-95');
            setTimeout(() => { lightbox.classList.add('hidden'); lightbox.classList.remove('flex'); img.src = ''; }, 300);
        }

        // Khởi tạo nền 3D
        function init3DBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 600;
            const posArray = new Float32Array(particlesCount * 3);
            for(let i = 0; i < particlesCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 100; }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const material = new THREE.PointsMaterial({ size: 0.15, color: 0x06b6d4, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particlesMesh = new THREE.Points(particlesGeometry, material);
            scene.add(particlesMesh);

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();
                particlesMesh.rotation.y = elapsedTime * 0.05;
                particlesMesh.rotation.x = elapsedTime * 0.02;
                renderer.render(scene, camera);
            }
            animate();
        }

        // ========================================================
        // LOGIC CHÍNH — Flask API nội bộ (db.chat_messages/db.chat_presence/db.employees).
        // checkAuth() cũ dựa vào lớp xác thực client THỨ HAI chồng lên Flask session — thừa
        // và đã vô hiệu hoá từ khi route /app_chat có @login_required (app.py:4863); danh tính gửi tin
        // (sender_id/sender_name) giờ do SERVER tự resolve theo session['user_email'] (xem
        // _resolve_chat_identity trong app.py), không tự suy ra ở client nữa.
        // ========================================================
        async function hrApi(path, options) {
            const res = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options && options.headers) },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                throw new Error(body.error || `Lỗi máy chủ (${res.status})`);
            }
            return body;
        }

        async function hrUpload(fileOrBlob, kind, filename) {
            const formData = new FormData();
            formData.append('file', fileOrBlob, filename || fileOrBlob.name || 'upload.jpg');
            formData.append('kind', kind);
            const res = await fetch('/api/storage/upload', { method: 'POST', body: formData });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                throw new Error(body.error || `Lỗi upload (${res.status})`);
            }
            return body.url;
        }

        // myId (mã nhân viên) chỉ dùng để tạo room-id của các đoạn chat 1-1 (Room_<ma1>_<ma2>)
        // và tra cứu avatar trong danh bạ — KHÔNG PHẢI danh tính gửi tin nhắn thật. Danh tính
        // gửi tin (myEmail/myName) do server trả về qua /api/chat/presence/ping, giống hệt cách
        // chat.html đã migrate xác định "mình là ai" để so sánh sender_id khi vẽ bong bóng chat.
        const myId = localStorage.getItem('bp_emp_code') || "GUEST";
        let myName = localStorage.getItem('bp_emp_name') || t('appchat_guest_name');
        let myEmail = '';
        const identityReady = hrApi('/api/chat/presence/ping', {
            method: 'POST',
            body: JSON.stringify({ room: 'KenhChung' }),
        }).then(res => { myEmail = res.email; myName = res.name; }).catch(() => {});

        let currentRoom = ""; let currentRoomAvatar = ""; let avatarMap = {};
        let presenceIntervalId = null; let lastMessageTimestamp = null;
        const chatBox = document.getElementById('chatBox');

        window.onload = () => {
            init3DBackground();
            startChatStream();
            loadDanhBa();
        };

        function formatTime(isoString) {
            const date = isoString ? new Date(isoString) : new Date();
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
        }
        function getChatRoomId(id1, id2) { return [id1, id2].sort().join('_'); }
        function forceScrollToBottom() { setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 100); }

        // ==========================================
        // 1. TẢI DANH BẠ 
        // ==========================================
        async function loadDanhBa() {
            await identityReady;
            try {
                // Tải tin nhắn cuối của Kênh Chung — /api/chat/messages hỗ trợ limit bất kỳ room
                // nào (business-scoped), dùng limit=1 để lấy tin mới nhất thay maybeSingle() cũ.
                try {
                    const globalBody = await hrApi(`/api/chat/messages?room=${encodeURIComponent('KenhChung')}&limit=1`);
                    const globalMsg = (globalBody.data || [])[0];
                    if (globalMsg) {
                        let preview = globalMsg.content.startsWith('[IMG]') || globalMsg.content.startsWith('[GIF]') ? t('appchat_sent_image_short') : globalMsg.content;
                        document.getElementById('last_msg_KenhChung').innerHTML = `<span class="text-white">${globalMsg.sender_name}:</span> ${preview}`;
                    }
                } catch (e) { /* im lặng — không chặn tải danh bạ nếu Kênh Chung chưa có tin */ }

                // Tải danh bạ nhân sự (dùng chung /api/hr/employees đã migrate của HR stack)
                const body = await hrApi('/api/hr/employees');
                const users = body.data || [];
                let html = '';
                for (const u of users) {
                    if (u.avatar_url) avatarMap[u.ma_nv] = u.avatar_url;
                    if (u.ma_nv === myId) continue;

                    const roomId = 'Room_' + getChatRoomId(myId, u.ma_nv);
                    let previewText = t('appchat_click_to_chat');
                    let unreadDot = "";

                    try {
                        const msgBody = await hrApi(`/api/chat/messages?room=${encodeURIComponent(roomId)}&limit=1`);
                        const lastMsg = (msgBody.data || [])[0];
                        if (lastMsg) {
                            previewText = lastMsg.content.startsWith('[IMG]') || lastMsg.content.startsWith('[GIF]') ? t('appchat_sent_image') : lastMsg.content;
                            if (lastMsg.sender_id !== myEmail) {
                                previewText = `<span class="text-white font-bold drop-shadow-md">${previewText}</span>`;
                                unreadDot = `<div class="w-2.5 h-2.5 rounded-full bg-rose-500 shrink-0 shadow-[0_0_8px_rgba(244,63,94,0.8)] animate-pulse"></div>`;
                            } else {
                                previewText = `${t('appchat_you_prefix')}${previewText}`;
                            }
                        }
                    } catch (e) { /* im lặng — phòng chưa từng có tin nhắn */ }

                    const defaultAvt = `https://ui-avatars.com/api/?name=${encodeURIComponent(u.ho_ten)}&background=1E293B&color=06b6d4&bold=true`;
                    const avatarContent = `<img src="${u.avatar_url || defaultAvt}" class="w-full h-full object-cover">`;

                    html += `
                    <div onclick="openChat('${roomId}', '${u.ho_ten}', '${u.avatar_url || defaultAvt}')" class="flex items-center gap-4 p-3 rounded-3xl bg-white/5 border border-white/5 cursor-pointer active:scale-95 transition-all hover:bg-white/10 group">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center overflow-hidden border-2 border-transparent group-hover:border-cyan-500 transition-colors shrink-0 shadow-inner">
                            ${avatarContent}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="font-bold text-white text-sm truncate pr-2 group-hover:text-cyan-300 transition-colors">${u.ho_ten}</h4>
                                ${unreadDot}
                            </div>
                            <p class="text-[11px] text-gray-400 truncate">${previewText}</p>
                        </div>
                    </div>`;
                }
                document.getElementById('danh_ba_nhan_su').innerHTML = html;
            } catch(e) { showToast(t('appchat_error_load_contacts'), "error"); }
        }

        // ==========================================
        // 2. MỞ PHÒNG CHAT & LOAD LỊCH SỬ CHAT
        // ==========================================
        async function openChat(room_id, room_name, avatar_url = "") {
            await identityReady;
            currentRoom = room_id;
            currentRoomAvatar = avatar_url;
            document.getElementById('chat_title').innerText = room_name;

            const chatIconDiv = document.getElementById('chat_icon');
            if(room_id === 'KenhChung') {
                chatIconDiv.innerHTML = '<i class="fas fa-bullhorn text-xl"></i>';
                chatIconDiv.className = "w-11 h-11 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center text-white font-bold overflow-hidden border-2 border-[#08061a] shadow-md shrink-0 transform -rotate-6";
            } else {
                chatIconDiv.innerHTML = `<img src="${avatar_url}" class="w-full h-full object-cover">`;
                chatIconDiv.className = "w-11 h-11 rounded-full flex items-center justify-center text-white font-bold overflow-hidden border-2 border-[#08061a] shadow-md shrink-0";
            }

            document.getElementById('screen_contacts').classList.remove('active');
            document.getElementById('screen_chat').classList.add('active');
            document.getElementById('chat_status').innerText = t('appchat_status_syncing');

            chatBox.innerHTML = `<div class="text-center text-xs text-cyan-500/70 my-6 font-bold uppercase tracking-widest animate-pulse"><i class="fas fa-satellite fa-spin mr-2"></i>${t('appchat_syncing_satellite')}</div>`;
            lastMessageTimestamp = null;

            try {
                const body = await hrApi(`/api/chat/messages?room=${encodeURIComponent(currentRoom)}&limit=100`);
                const messages = (body.data || []).slice().reverse();

                chatBox.innerHTML = `<div class="text-center text-[9px] font-black text-gray-500 my-6 uppercase tracking-[0.2em] bg-white/5 inline-block px-4 py-1.5 rounded-full mx-auto border border-white/5 flex justify-center w-fit"><i class="fas fa-lock text-cyan-500 mr-2"></i> ${t('appchat_e2e_encrypted')}</div>`;
                messages.forEach(msg => renderMessage(msg));
                if (messages.length) lastMessageTimestamp = messages[messages.length - 1].timestamp;
                forceScrollToBottom();
            } catch (err) { showToast(t('appchat_error_load_chat'), "error"); }

            startRealtimeForRoom(currentRoom);
        }

        function closeChat() {
            document.getElementById('screen_chat').classList.remove('active');
            document.getElementById('screen_contacts').classList.add('active');
            stopRealtime();
            currentRoom = ""; currentRoomAvatar = "";
            loadDanhBa();
        }

        // ==========================================
        // 3. REALTIME & PRESENCE — 1 SSE dùng chung (/api/stream/chat, watch cả chat_messages
        // lẫn chat_presence) + heartbeat, giống hệt kiến trúc của chat.html. Presence không có
        // "bảng" thật để watch trực tiếp nên dùng: client tự ping định kỳ
        // (/api/chat/presence/ping), server coi 1 người "online" nếu last_seen trong
        // _CHAT_PRESENCE_TTL_SECONDS gần nhất.
        // ==========================================
        function startChatStream() {
            const stream = new EventSource('/api/stream/chat');
            stream.onmessage = () => {
                if (currentRoom && document.getElementById('screen_chat').classList.contains('active')) {
                    pollNewMessages();
                }
            };
        }

        async function pollNewMessages() {
            if (!currentRoom) return;
            try {
                const body = await hrApi(`/api/chat/messages?room=${encodeURIComponent(currentRoom)}&limit=20`);
                const msgs = (body.data || []).slice().reverse();
                let appended = false;
                msgs.forEach(msg => {
                    if (lastMessageTimestamp && msg.timestamp <= lastMessageTimestamp) return;
                    renderMessage(msg);
                    appended = true;
                });
                if (msgs.length) lastMessageTimestamp = msgs[msgs.length - 1].timestamp;
                if (appended) forceScrollToBottom();
            } catch (e) { /* im lặng — vòng sau thử lại */ }
        }

        function startRealtimeForRoom(room) {
            stopRealtime();
            document.getElementById('chat_status').innerText = t('appchat_status_online');
            // Heartbeat: tự ping presence mỗi 10s (< _CHAT_PRESENCE_TTL_SECONDS=20s ở server).
            hrApi('/api/chat/presence/ping', { method: 'POST', body: JSON.stringify({ room }) })
                .then(res => { myEmail = res.email; myName = res.name; }).catch(() => {});
            presenceIntervalId = setInterval(() => {
                hrApi('/api/chat/presence/ping', { method: 'POST', body: JSON.stringify({ room }) }).catch(() => {});
            }, 10000);
        }

        function stopRealtime() {
            if (presenceIntervalId) { clearInterval(presenceIntervalId); presenceIntervalId = null; }
        }

        // ==========================================
        // 4. GỬI TIN NHẮN CHỮ
        // ==========================================
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('msgInput');
            const msgText = input.value.trim();
            if(!msgText) return;

            input.value = '';
            try {
                await hrApi('/api/chat/messages', {
                    method: 'POST',
                    body: JSON.stringify({ room: currentRoom, content: msgText }),
                });
                pollNewMessages();
            } catch (error) { /* im lặng — SSE/vòng poll kế tiếp sẽ tự thử lại */ }
        });

        // ==========================================
        // 5. UPLOAD ẢNH (GIAO DIỆN LIGHTBOX MỚI)
        // ==========================================
        async function uploadImage(input) {
            const file = input.files[0]; if(!file) return;

            const tempId = 'upload_' + Date.now();
            chatBox.innerHTML += `<div id="${tempId}" class="flex justify-end mt-3"><div class="max-w-[80%] flex flex-col items-end"><div class="text-[10px] text-cyan-400 bg-cyan-900/30 border border-cyan-500/30 px-4 py-2.5 rounded-2xl animate-pulse font-bold tracking-widest"><i class="fas fa-spinner fa-spin mr-2"></i>UPLOADING...</div></div></div>`;
            forceScrollToBottom();

            try {
                const fileExt = file.name.split('.').pop() || 'jpg';
                const fileName = `${myId}_${Date.now()}.${fileExt}`;

                const imageUrl = await hrUpload(file, 'chat', fileName);
                await hrApi('/api/chat/messages', {
                    method: 'POST',
                    body: JSON.stringify({ room: currentRoom, content: `[IMG]${imageUrl}` }),
                });

                document.getElementById(tempId)?.remove();
                pollNewMessages();
            } catch (error) {
                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.innerHTML = `<div class="text-rose-400 text-[10px] bg-rose-500/10 px-3 py-2 rounded-xl border border-rose-500/30">${t('appchat_error_upload_image')}</div>`;
            }
            input.value = '';
        }

        // ==========================================
        // 6. RENDER TIN NHẮN LÊN MÀN HÌNH
        // ==========================================
        function renderMessage(data) {
            // Danh tính gửi tin (sender_id) là email do server resolve (session['user_email']),
            // KHÔNG PHẢI mã nhân viên (myId) — so sánh với myEmail lấy từ
            // /api/chat/presence/ping, đúng kiến trúc chat.html.
            const isMe = data.sender_id === myEmail;
            let contentHTML = "";
            const content = data.content || "";

            if (content.startsWith('[IMG]') || content.startsWith('[GIF]')) {
                const url = content.replace('[IMG]', '').replace('[GIF]', '');
                contentHTML = `<img src="${url}" onload="forceScrollToBottom()" class="max-w-[240px] w-full rounded-2xl border border-white/10 shadow-lg mt-1 cursor-pointer hover:opacity-80 transition object-cover bg-black/50" onclick="openLightbox(this.src)">`;
            } else {
                contentHTML = `<div class="${isMe ? 'chat-bubble-me text-white' : 'chat-bubble-other text-gray-200'} px-4 py-3 text-sm shadow-md mb-0.5 break-words inline-block leading-relaxed">${content}</div>`;
            }

            const timeStr = formatTime(data.timestamp);
            let html = '';

            if(isMe) {
                html = `
                <div class="flex justify-end mt-3">
                    <div class="max-w-[85%] flex flex-col items-end">
                        ${contentHTML}
                        <p class="text-[9px] font-bold text-gray-500 pr-2 mt-1 uppercase tracking-wider">${timeStr} <i class="fas fa-check-double text-cyan-500/50 ml-0.5"></i></p>
                    </div>
                </div>`;
            } else {
                // avatarMap được đánh chỉ mục theo ma_nv (danh bạ /api/hr/employees), nhưng
                // data.sender_id là email server-resolved nên không trùng khoá trong Kênh Chung
                // (nhiều người gửi) — fallback sang avatar ui-avatars theo tên. Trong đoạn chat
                // 1-1 thì dùng thẳng avatar_url đã biết của người đối diện (currentRoomAvatar)
                // truyền từ danh bạ khi bấm vào, chính xác hơn.
                const senderAvatarUrl = (currentRoom !== 'KenhChung' && currentRoomAvatar) ? currentRoomAvatar : avatarMap[data.sender_id];
                const defaultAvt = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.sender_name || '?')}&background=1E293B&color=06b6d4&bold=true`;
                const finalAvatarHTML = `<img src="${senderAvatarUrl || defaultAvt}" class="w-full h-full object-cover">`;

                html = `
                <div class="flex justify-start gap-3 mt-4">
                    <div class="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center text-xs mt-1 shrink-0 overflow-hidden border border-gray-600 shadow-md">
                        ${finalAvatarHTML}
                    </div>
                    <div class="max-w-[80%] flex flex-col items-start">
                        <p class="text-[10px] text-cyan-400 mb-1 ml-1 font-black tracking-widest uppercase opacity-80">${data.sender_name}</p>
                        ${contentHTML}
                        <p class="text-[9px] font-bold text-gray-500 pl-2 mt-1 uppercase tracking-wider">${timeStr}</p>
                    </div>
                </div>`;
            }
            chatBox.innerHTML += html;
        }

        // ==========================================
        // 7. TIỆN ÍCH EMOJI
        // ==========================================
        function addEmoji(emoji) {
            const input = document.getElementById('msgInput');
            input.value += emoji; input.focus();
        }
    </script>
</body>
</html>
