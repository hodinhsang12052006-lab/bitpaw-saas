<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Radar | BitPaw OS</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- ThreeJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #08061a; color: white; overflow: hidden; }
        
        /* 3D Background Canvas */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.85; pointer-events: none; }
        
        /* Hiệu ứng scanline và laser */
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed; top: 0; left: 0; width: 1px; height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        /* Glass Panels System */
        .glass-panel { background: rgba(10, 15, 37, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .glass-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; padding: 12px 15px; border-radius: 12px; outline: none; width: 100%; font-weight: 500;}
        .glass-input:focus { border-color: #06b6d4; box-shadow: 0 0 15px rgba(6,182,212,0.3); background: rgba(0,0,0,0.8); }

        #map-container { position: relative; height: 100%; width: 100%; border-radius: 1.5rem; overflow: hidden; z-index: 1; border: 1px solid rgba(255,255,255,0.05); }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Filter cho OSM map thành phong cách sci-fi */
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .leaflet-div-icon { background: transparent; border: none; }
        
        /* Radar sweep */
        .radar-sweep {
            position: absolute;
            top: 50%; left: 50%;
            width: 200%; height: 200%;
            margin-top: -100%; margin-left: -100%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(6, 182, 212, 0.1) 95%, rgba(6, 182, 212, 0.4) 100%);
            border-radius: 50%;
            animation: radar-spin 4s linear infinite;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes radar-spin { 100% { transform: rotate(360deg); } }
        
        .ai-laser-line {
            stroke: #06b6d4; 
            stroke-width: 4;
            stroke-dasharray: 10, 10;
            animation: dash 20s linear infinite;
            filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.8));
        }
        @keyframes dash { to { stroke-dashoffset: -1000; } }
        
        .pulse-target { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0; box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7); }
            50% { opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; box-shadow: 0 0 0 20px rgba(6, 182, 212, 0); }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.4); border-radius: 10px; }

        /* Hologram Logo (giống các trang) */
        @keyframes float-hologram {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(255, 148, 77, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float { animation: float-hologram 4s ease-in-out infinite; }

        .filter-chip { transition: all 0.2s; cursor: pointer; }
        .filter-chip.active { border-color: #06b6d4; background: rgba(6, 182, 212, 0.2); color: white; text-shadow: 0 0 5px #06b6d4; }
        
        /* Tooltip */
        [data-tooltip] { position: relative; cursor: help; }
        [data-tooltip]:before {
            content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #0a0f25; color: #fff; padding: 6px 10px; border-radius: 8px; font-size: 10px;
            white-space: nowrap; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.2s;
            border: 1px solid rgba(6,182,212,0.5);
        }
        [data-tooltip]:hover:before { opacity: 1; }
    </style>
</head>
<body class="h-screen flex overflow-hidden relative">

    <script>
        // ========================================================
        // THREE.JS BACKGROUND NÂNG CẤP (giống landing page)
        // ========================================================
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 700 : 1500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x06b6d4, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Shooting stars
            const starCount = 100;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.07, y: (Math.random() - 0.5) * 0.1 - 0.04, z: (Math.random() - 0.5) * 0.03 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.09, color: 0xffaa88, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            scene.fog = new THREE.FogExp2(0x08061a, 0.008);

            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsed = clock.getElapsedTime();
                const hue = (elapsed * 0.04) % 1;
                material.color.setHSL(hue, 0.9, 0.65);

                particles.rotation.y = elapsed * 0.03;
                particles.rotation.x = elapsed * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);

                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        // ========================================================
        // TOAST UTILITY
        // ========================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let colorClass = 'cyan', iconClass = 'fa-info-circle';
            if(type === 'success') { colorClass = 'emerald'; iconClass = 'fa-check-circle'; }
            if(type === 'error') { colorClass = 'rose'; iconClass = 'fa-exclamation-triangle'; }
            if(type === 'warning') { colorClass = 'amber'; iconClass = 'fa-exclamation-circle'; }
            toast.className = `bg-[#0a0f25]/95 backdrop-blur-xl border border-${colorClass}-500/50 text-white px-4 py-3.5 rounded-2xl shadow-lg flex items-center gap-3 transform -translate-y-full opacity-0 transition-all duration-300 w-full`;
            toast.innerHTML = `<i class="fas ${iconClass} text-${colorClass}-400 text-xl shrink-0"></i> <span class="text-[13px] font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('-translate-y-full', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('-translate-y-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ========================================================
        // MULTI-REGION i18n
        // ========================================================
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";
        const translations = {
            vi: {
                map_dashboard_nav_overview: 'Tổng quan',
                map_dashboard_nav_hr: 'Quản lý Nhân sự',
                map_dashboard_nav_attendance: 'Chấm công',
                map_dashboard_nav_payroll: 'Bảng lương',
                map_dashboard_nav_comm: 'Trạm Liên Lạc',

        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function tf(key, params) {
            let str = t(key);
            for (const k in params) str = str.split(`{${k}}`).join(params[k]);
            return str;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
            // Re-render worker cards & service dropdown so dynamic content re-localizes too
            if (typeof fetchWorkers === 'function' && currentWorkersData && currentWorkersData.length) fetchWorkers();
            if (typeof globalMenuData !== 'undefined' && globalMenuData && globalMenuData.length) {
                let opt = `<option value="" class="bg-gray-900">${t('map_dashboard_opt_manual_note')}</option>`;
                globalMenuData.forEach(dv => {
                    const giaThu = dv.gia_dich_vu ? Number(dv.gia_dich_vu).toLocaleString('vi-VN') : '0';
                    opt += `<option value="${dv.id}" class="bg-gray-900 text-pink-300">${dv.ten_dich_vu} - ${t('map_dashboard_svc_charge_label')}: ${giaThu}đ</option>`;
                });
                document.getElementById('manual_service_select').innerHTML = opt;
            }
        }
        applyStaticTranslations();
        const langToggleBtn = document.getElementById('langToggleBtn');
        if (langToggleBtn) {
            langToggleBtn.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));
        }

        // ========================================================
        // LOGIC CHÍNH — Flask API nội bộ (db.employees/db.tasks/db.dichvu), thay Supabase JS.
        // checkAuth() cũ gọi supabase.auth.getSession() để tự redirect nếu mất session — thừa,
        // vì route /map_dashboard đã có @login_required chặn ở tầng Flask (app.py:4251-4257),
        // trang này không thể vào được nếu chưa đăng nhập nên bỏ hẳn, không cần thay thế.
        // ========================================================
        async function hrApi(path, options) {
            const res = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options && options.headers) },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                throw new Error(body.error || `Lỗi máy chủ (${res.status})`);
            }
            return body;
        }

        // ========================================================
        // BẢN ĐỒ & LOGIC CHÍNH
        // ========================================================
        let map = L.map('map', { zoomControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        const markers = {}; 
        let currentWorkersData = []; 
        let globalMenuData = []; 
        let isMapCentered = false;
        let activeLaserLine = null;
        let activeTargetMarker = null;
        let currentFilter = 'all';

        async function fetchInitialData() {
            try {
                const body = await hrApi('/api/services');
                const data = body.data;
                if(data) {
                    globalMenuData = data;
                    let opt = `<option value="" class="bg-gray-900">${t('map_dashboard_opt_manual_note')}</option>`;
                    data.forEach(dv => {
                        const giaThu = dv.gia_dich_vu ? Number(dv.gia_dich_vu).toLocaleString('vi-VN') : '0';
                        opt += `<option value="${dv.id}" class="bg-gray-900 text-pink-300">${dv.ten_dich_vu} - ${t('map_dashboard_svc_charge_label')}: ${giaThu}đ</option>`;
                    });
                    document.getElementById('manual_service_select').innerHTML = opt;
                }
            } catch(e) {}
            fetchWorkers();
        }

        async function fetchWorkers() {
            try {
                const body = await hrApi('/api/hr/employees');
                const users = body.data || [];
                currentWorkersData = users;

                const workerListDiv = document.getElementById('workerList');
                workerListDiv.innerHTML = ''; 
                let validCoordinates = []; 

                users.forEach(u => {
                    const avatarContent = u.avatar_url ? `<img src="${u.avatar_url}" class="w-full h-full object-cover">` : u.ho_ten.charAt(0).toUpperCase();
                    
                    let profession = u.linh_vuc || t('map_dashboard_profession_default');
                    let profColor = "text-gray-400"; 
                    if(u.trang_thai_gps === 'Rảnh') profColor = "text-emerald-400";
                    if(u.trang_thai_gps === 'Bận') profColor = "text-rose-400";

                    const kudoBadge = u.diem_kudo > 0 ? `<span class="bg-yellow-500/20 border border-yellow-500/50 text-yellow-400 px-1.5 py-0.5 rounded text-[10px] ml-2"><i class="fas fa-star text-[9px]"></i> ${u.diem_kudo}</span>` : '';

                    const cardHtml = `
                        <div class="bg-black/40 border border-white/5 p-4 rounded-2xl flex items-start gap-4 transition-all hover:border-cyan-500/50 hover:bg-white/[0.05] group shadow-inner" id="card_${u.ma_nv}" data-status="${u.trang_thai_gps || 'offline'}">
                            <div class="relative w-12 h-12 shrink-0 cursor-pointer hover:scale-110 transition-transform" onclick="focusWorkerOnMap('${u.ma_nv}')">
                                <div class="w-full h-full rounded-xl bg-gradient-to-br from-gray-700 to-black flex items-center justify-center font-black text-xl text-white border border-gray-600 overflow-hidden shadow-lg">
                                    ${avatarContent}
                                </div>
                                <span id="dot_${u.ma_nv}" class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-gray-500 border-2 border-[#08061a] rounded-full z-10"></span>
                            </div>
                            <div class="flex-1 w-full min-w-0">
                                <h4 class="font-black text-white text-sm cursor-pointer hover:text-cyan-400 transition-colors truncate flex items-center tracking-wide" id="name_${u.ma_nv}" onclick="focusWorkerOnMap('${u.ma_nv}')">
                                    ${u.ho_ten} ${kudoBadge}
                                </h4>
                                <p id="status_${u.ma_nv}" class="text-[10px] font-bold text-gray-500 mt-1 font-mono uppercase tracking-widest">${t('map_dashboard_status_offline_initial')}</p>
                                
                                <div class="mt-2 bg-black/60 px-2.5 py-1 rounded border border-white/5 text-[9px] font-mono flex items-center gap-2 w-fit uppercase font-bold tracking-widest shadow-inner">
                                    <i class="fas fa-user-tag ${profColor}"></i>
                                    <span class="${profColor}">${profession}</span>
                                </div>

                                <div class="flex gap-2 mt-4">
                                    <button onclick="focusWorkerOnMap('${u.ma_nv}')" class="flex-1 bg-white/5 hover:bg-white/20 text-gray-300 border border-white/10 py-2 rounded-xl text-[10px] font-black transition-all flex items-center justify-center gap-1.5 uppercase tracking-widest shadow-sm">
                                        <i class="fas fa-crosshairs text-cyan-400 group-hover:animate-spin text-sm"></i> ${t('map_dashboard_btn_locate')}
                                    </button>
                                    <button onclick="openManualJobModal('${u.ma_nv}', '${u.ho_ten}')" class="flex-1 bg-cyan-500/20 hover:bg-cyan-500 hover:text-black text-cyan-400 border border-cyan-500/50 py-2 rounded-xl text-[10px] font-black transition-all hidden justify-center items-center gap-1.5 uppercase tracking-widest shadow-[0_0_10px_rgba(6,182,212,0.2)]" id="btn_${u.ma_nv}">
                                        <i class="fas fa-paper-plane text-sm"></i> ${t('map_dashboard_btn_assign')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    workerListDiv.innerHTML += cardHtml;

                    if (u.toa_do_lat && u.toa_do_lng) {
                        updateMapAndUI(u);
                        validCoordinates.push([u.toa_do_lat, u.toa_do_lng]); 
                    }
                });

                if(!isMapCentered && validCoordinates.length > 0) {
                    const bounds = new L.LatLngBounds(validCoordinates);
                    map.fitBounds(bounds, { padding: [50, 50] });
                    isMapCentered = true;
                } else if(!isMapCentered) {
                    map.setView([14.0583, 108.2772], 6);
                    isMapCentered = true;
                }

                setupRealtime();
            } catch (err) {
                document.getElementById('workerList').innerHTML = `<div class="text-rose-500 text-center mt-10 font-bold uppercase tracking-widest">${t('map_dashboard_satellite_error')}</div>`;
                showToast(t('map_dashboard_toast_load_employees_error'), "error");
            }
        }

        // Thay kênh Supabase Realtime `radar_tracking` bằng SSE dùng chung endpoint đã có sẵn
        // /api/stream/hr_employees (server chỉ báo "đã đổi", client tự fetchWorkers() lại toàn
        // bộ danh sách + vẽ lại marker — đơn giản hơn bản Supabase cũ vốn phải tự vá payload.new
        // vào từng nhân viên trong currentWorkersData).
        let radarStream = null;
        function setupRealtime() {
            if (radarStream) return;
            radarStream = new EventSource('/api/stream/hr_employees');
            radarStream.onmessage = () => fetchWorkers();
        }

        function updateMapAndUI(worker) {
            const { ma_nv, ho_ten, toa_do_lat: lat, toa_do_lng: lng, trang_thai_gps, nhiem_vu_hien_tai, avatar_url, diem_kudo } = worker;
            if (!lat || !lng) return; 

            let markerColor = trang_thai_gps === 'Rảnh' ? '#10b981' : '#f43f5e';
            const avatarContent = avatar_url ? `<img src="${avatar_url}" class="w-full h-full object-cover">` : ho_ten.charAt(0).toUpperCase();

            const kudoMarkerHTML = diem_kudo > 0 ? `<div class="absolute -top-3 -right-2 bg-yellow-500 text-black text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-[#08061a] z-20 shadow-[0_0_10px_#eab308]"><i class="fas fa-star text-[10px]"></i></div>` : '';

            const customIcon = L.divIcon({
                className: 'bg-transparent', iconSize: [100, 70], iconAnchor: [50, 60],
                html: `
                    <div class="flex flex-col items-center justify-center w-full h-full" id="marker_ui_${ma_nv}">
                        <div class="relative">
                            ${kudoMarkerHTML}
                            <div class="w-12 h-12 rounded-xl border-[3px] bg-gradient-to-br from-gray-800 to-black flex items-center justify-center text-white font-black text-xl shadow-[0_0_20px_${markerColor}] transition-transform hover:scale-110 overflow-hidden" style="border-color:${markerColor}">
                                ${avatarContent}
                            </div>
                        </div>
                        <div class="mt-1.5 px-3 py-1 bg-[#08061a]/95 border border-white/20 rounded-lg text-[9px] font-black tracking-widest uppercase text-white whitespace-nowrap shadow-lg">
                            ${ho_ten}
                        </div>
                    </div>`
            });

            if (markers[ma_nv]) {
                markers[ma_nv].setLatLng([lat, lng]);
                markers[ma_nv].setIcon(customIcon);
            } else {
                markers[ma_nv] = L.marker([lat, lng], {icon: customIcon}).addTo(map);
            }
            
            const statusText = document.getElementById(`status_${ma_nv}`);
            const dot = document.getElementById(`dot_${ma_nv}`);
            const btn = document.getElementById(`btn_${ma_nv}`);
            const card = document.getElementById(`card_${ma_nv}`);

            if(statusText && card) {
                card.setAttribute('data-status', trang_thai_gps);
                
                if(trang_thai_gps === 'Rảnh') {
                    statusText.innerHTML = `<span class="text-emerald-400 font-bold tracking-widest uppercase text-[10px]"><div class="inline-block w-1.5 h-1.5 bg-emerald-400 rounded-full mr-1 animate-pulse"></div> ${t('map_dashboard_status_available_full')}</span><br><span class="text-[9px] text-gray-500 mt-1 block">${t('map_dashboard_broadcasting_gps')}</span>`;
                    dot.className = "absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-emerald-500 border-2 border-[#08061a] rounded-full z-10 shadow-[0_0_10px_#10b981]";
                    card.classList.add('border-emerald-500/50'); card.classList.remove('border-rose-500/50');
                    btn.classList.remove('hidden'); btn.classList.add('flex');
                } else if(trang_thai_gps === 'Bận') {
                    statusText.innerHTML = `<span class="text-rose-400 font-bold tracking-widest uppercase text-[10px]"><div class="inline-block w-1.5 h-1.5 bg-rose-400 rounded-full mr-1 animate-pulse"></div> ${t('map_dashboard_status_busy_short')}</span><br><span class="text-[10px] font-bold truncate block w-full text-white mt-1" title="${nhiem_vu_hien_tai || ''}">📍 ${nhiem_vu_hien_tai || t('map_dashboard_working_default')}</span>`;
                    dot.className = "absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-rose-500 border-2 border-[#08061a] rounded-full z-10 shadow-[0_0_10px_#f43f5e]";
                    card.classList.add('border-rose-500/50'); card.classList.remove('border-emerald-500/50');
                    btn.classList.add('hidden'); btn.classList.remove('flex');
                }
            }
        }

        // Lọc, tìm kiếm
        function applyFilter(type, btnElement) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('active'));
            btnElement.classList.add('active');
            runFiltering();
        }

        function filterWorkers() { runFiltering(); }

        function runFiltering() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('[id^="card_"]');
            cards.forEach(card => {
                const nameEl = card.querySelector('h4');
                const nameMatch = nameEl ? nameEl.innerText.toLowerCase().includes(query) : false;
                const statusStr = card.getAttribute('data-status').toLowerCase();
                let statusMatch = true;
                if (currentFilter === 'ranh') statusMatch = (statusStr === 'rảnh');
                if (currentFilter === 'ban') statusMatch = (statusStr === 'bận');
                const isShow = nameMatch && statusMatch;
                card.style.display = isShow ? 'flex' : 'none';
                const ma_nv = card.id.replace('card_', '');
                if (markers[ma_nv]) {
                    const markerDOM = document.getElementById(`marker_ui_${ma_nv}`);
                    if(markerDOM) markerDOM.style.display = isShow ? 'flex' : 'none';
                }
            });
        }

        function focusWorkerOnMap(ma_nv) {
            if (markers[ma_nv]) {
                const latLng = markers[ma_nv].getLatLng();
                map.flyTo(latLng, 17, { animate: true, duration: 1.5 });
            } else {
                showToast(t('map_dashboard_toast_target_offline'), "warning");
            }
        }

        // AI Dispatch
        async function kichHoatAIDieuPhoi() {
            const btnAI = document.querySelector('button[onclick="kichHoatAIDieuPhoi()"]');
            const origHTML = btnAI.innerHTML;
            btnAI.innerHTML = `<i class="fas fa-spinner fa-spin mr-2 text-lg"></i> ${t('map_dashboard_calculating')}`;
            btnAI.disabled = true;

            if(activeLaserLine) map.removeLayer(activeLaserLine);
            if(activeTargetMarker) map.removeLayer(activeTargetMarker);

            try {
                const taskBody = await hrApi('/api/tasks');
                const tasks = (taskBody.data || []).filter(t => t.trang_thai === 'Chờ Nhận').slice(0, 1);

                if(!tasks || tasks.length === 0) {
                    showAIAlert(t('map_dashboard_ai_no_jobs'), t('map_dashboard_ai_title_perfect'));
                    btnAI.innerHTML = origHTML; btnAI.disabled = false; return;
                }
                const targetTask = tasks[0];
                const jobLatLng = [targetTask.lat || 12.2450, targetTask.lng || 109.1950];

                let bestWorker = null;
                let shortestDistance = Infinity;
                const targetPoint = L.latLng(jobLatLng[0], jobLatLng[1]);

                const onlineWorkers = currentWorkersData.filter(w => w.trang_thai_gps === 'Rảnh' && w.toa_do_lat);

                if (onlineWorkers.length === 0) {
                    showAIAlert(t('map_dashboard_ai_all_busy'), t('map_dashboard_ai_title_alert'));
                    btnAI.innerHTML = origHTML; btnAI.disabled = false; return;
                }

                onlineWorkers.forEach(w => {
                    const workerPoint = L.latLng(w.toa_do_lat, w.toa_do_lng);
                    const distance = workerPoint.distanceTo(targetPoint); 
                    if (distance < shortestDistance) {
                        shortestDistance = distance;
                        bestWorker = w;
                    }
                });

                await hrApi(`/api/tasks/${targetTask.id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ trang_thai: 'Đã Nhận', nguoi_nhan: bestWorker.ho_ten }),
                });

                const workerLatLng = [bestWorker.toa_do_lat, bestWorker.toa_do_lng];

                const targetIcon = L.divIcon({
                    className: 'bg-transparent', iconSize: [40, 40],
                    html: `<div class="w-10 h-10 bg-cyan-500/20 rounded-full flex items-center justify-center pulse-target"><div class="w-4 h-4 bg-cyan-400 rounded-full shadow-[0_0_15px_#06b6d4]"></div></div>`
                });
                activeTargetMarker = L.marker(jobLatLng, {icon: targetIcon}).addTo(map);

                const bounds = L.latLngBounds([workerLatLng, jobLatLng]);
                map.flyToBounds(bounds, { padding: [80, 80], duration: 1.5 });

                setTimeout(() => {
                    activeLaserLine = L.polyline([workerLatLng, jobLatLng], {className: 'ai-laser-line'}).addTo(map);
                    const realDist = Math.round(shortestDistance / 1000 * 10) / 10;
                    showAIAlert(tf('map_dashboard_ai_found_tech', { name: bestWorker.ho_ten, dist: realDist, jobid: targetTask.id }), t('map_dashboard_ai_title_success'));
                }, 1500);

            } catch (e) {
                showToast(tf('map_dashboard_toast_ai_error', { msg: e.message }), "error");
            }
            btnAI.innerHTML = origHTML; btnAI.disabled = false;
        }

        // Giao việc thủ công
        function openManualJobModal(ma_nv, ho_ten) {
            document.getElementById('modalManualJob').classList.remove('hidden');
            document.getElementById('modalManualJob').classList.add('flex');
            document.getElementById('lbl_tho_nhan').innerText = ho_ten;
            document.getElementById('tho_nhan_ma_nv').value = ma_nv;
        }

        function closeManualJobModal() {
            document.getElementById('modalManualJob').classList.add('hidden');
            document.getElementById('modalManualJob').classList.remove('flex');
        }

        async function submitManualJob() {
            const thoName = document.getElementById('lbl_tho_nhan').innerText;
            const ma_nv = document.getElementById('tho_nhan_ma_nv').value;
            const khach = document.getElementById('manual_khach').value.trim();
            const sdt = document.getElementById('manual_sdt').value.trim();
            const diachi = document.getElementById('manual_diachi').value.trim();
            
            if(!khach || !diachi) return showToast(t('map_dashboard_toast_need_customer_address'), "warning");

            const btn = document.getElementById('btn_submit_manual');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin text-lg"></i> ${t('map_dashboard_transmitting')}`;
            btn.disabled = true;

            try {
                const serviceId = document.getElementById('manual_service_select').value;
                let customNote = document.getElementById('manual_noidung').value.trim();
                let finalContent = customNote || t('map_dashboard_dispatch_order_default');

                if (serviceId) {
                    const selectedSvc = globalMenuData.find(dv => dv.id == serviceId);
                    if(selectedSvc) {
                        const giaThu = selectedSvc.gia_dich_vu ? Number(selectedSvc.gia_dich_vu).toLocaleString('vi-VN') : '0';
                        const hoaHong = selectedSvc.tien_tua ? Number(selectedSvc.tien_tua).toLocaleString('vi-VN') : '0';
                        finalContent = tf('map_dashboard_svc_note_template', { ten: selectedSvc.ten_dich_vu, gia: giaThu, hoahong: hoaHong, note: customNote });
                    }
                }

                await hrApi('/api/tasks', {
                    method: 'POST',
                    body: JSON.stringify({
                        ten_khach: khach, dia_chi: diachi, sdt: sdt || t('map_dashboard_sdt_none'), noi_dung: finalContent,
                        trang_thai: 'Đã Nhận', nguoi_nhan: thoName
                    }),
                });

                closeManualJobModal();
                
                if (markers[ma_nv]) {
                    const latLng = markers[ma_nv].getLatLng();
                    map.flyTo(latLng, 18, { animate: true, duration: 1.0 });
                    
                    setTimeout(() => {
                        const rippleIcon = L.divIcon({
                            className: 'bg-transparent', iconSize: [40, 40],
                            html: `<div class="w-10 h-10 bg-cyan-500/20 rounded-full flex items-center justify-center pulse-target"><div class="w-2 h-2 bg-white rounded-full"></div></div>`
                        });
                        const ripple = L.marker(latLng, {icon: rippleIcon}).addTo(map);
                        showToast(tf('map_dashboard_toast_dispatch_success', { name: thoName }), "success");
                        setTimeout(() => map.removeLayer(ripple), 3000);
                    }, 1000);
                } else {
                    showToast(tf('map_dashboard_toast_assigned_offline', { name: thoName }), "success");
                }

                document.getElementById('manual_khach').value = '';
                document.getElementById('manual_sdt').value = '';
                document.getElementById('manual_diachi').value = '';
                document.getElementById('manual_noidung').value = '';
                document.getElementById('manual_service_select').value = '';
            } catch(e) {
                showToast(t('map_dashboard_toast_cloud_error'), "error");
            }
            btn.innerHTML = `<i class="fas fa-satellite-dish text-lg"></i> ${t('map_dashboard_btn_send_signal')}`; btn.disabled = false;
        }

        // Quét vi phạm
        function kichHoatBotAI() {
            const btnAI = document.querySelector('button[onclick="kichHoatBotAI()"]');
            const origHTML = btnAI.innerHTML;
            btnAI.innerHTML = `<i class="fas fa-spinner fa-spin mr-2 text-lg"></i> ${t('map_dashboard_scanning')}`;
            btnAI.disabled = true;

            try {
                const thoRanh = currentWorkersData.filter(w => w.trang_thai_gps === 'Rảnh' && w.toa_do_lat);
                if (thoRanh.length === 0) {
                    showAIAlert(t('map_dashboard_ai_all_working'), t('map_dashboard_ai_title_positive'));
                    btnAI.innerHTML = origHTML; btnAI.disabled = false; return;
                }

                const thoViPham = thoRanh[Math.floor(Math.random() * thoRanh.length)];
                focusWorkerOnMap(thoViPham.ma_nv);

                setTimeout(() => {
                    alert(tf('map_dashboard_slacking_alert', { name: thoViPham.ho_ten }));
                }, 1500);

            } catch(e) { showToast(t('map_dashboard_toast_scan_error'), "error"); }
            btnAI.innerHTML = origHTML; btnAI.disabled = false;
        }

        function showAIAlert(message, title = t('map_dashboard_ai_title_alert_generic')) {
            const box = document.getElementById('ai_alert_box');
            document.getElementById('ai_alert_title').innerText = title;
            document.getElementById('ai_alert_text').innerHTML = message;
            
            box.classList.remove('hidden');
            setTimeout(() => {
                box.classList.remove('translate-x-10', 'opacity-0');
                box.classList.add('translate-x-0', 'opacity-100');
            }, 50);

            setTimeout(() => {
                box.classList.remove('translate-x-0', 'opacity-100');
                box.classList.add('translate-x-10', 'opacity-0');
                setTimeout(() => box.classList.add('hidden'), 500);
            }, 8000);
        }

        // Khởi tạo và lắng nghe sự kiện tìm kiếm
        document.getElementById('searchInput').addEventListener('input', filterWorkers);
        fetchInitialData();
    </script>
</body>
</html>
