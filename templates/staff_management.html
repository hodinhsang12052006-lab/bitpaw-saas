<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BitPaw | Quản lý Nhân viên</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #08061a;
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 24px;
        }
        
        /* 3D Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.85;
            pointer-events: none;
        }

        /* Scanline + Laser */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .absolute-blur {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 500px;
            background: rgba(6, 182, 212, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(10, 15, 37, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .glass-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            border-color: #06b6d4;
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        
        /* Logo float */
        @keyframes float-logo {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float {
            animation: float-logo 4s ease-in-out infinite;
        }

        /* Table style */
        .custom-table {
            width: 100%;
            border-collapse: collapse;
        }
        .custom-table th {
            text-align: left;
            padding: 1rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #9ca3af;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .custom-table td {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            vertical-align: middle;
        }
        .custom-table tr:hover td {
            background: rgba(6, 182, 212, 0.1);
        }
        .table-wrapper {
            overflow-x: auto;
            width: 100%;
        }
        
        /* Role badge */
        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
        }
        .role-admin { background: rgba(244, 63, 94, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .role-manager { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid #a855f7; }
        .role-staff { background: rgba(6, 182, 212, 0.2); color: #06b6d4; border: 1px solid #06b6d4; }
        .role-karaoke { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        
        /* Button */
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: 700;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6,182,212,0.4);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #06b6d4;
            color: #06b6d4;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-weight: 600;
            transition: 0.2s;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .btn-outline:hover {
            background: rgba(6,182,212,0.2);
            box-shadow: 0 0 8px rgba(6,182,212,0.5);
        }
        .btn-danger {
            background: rgba(239,68,68,0.2);
            border: 1px solid #f87171;
            color: #f87171;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.4);
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: rgba(10, 15, 37, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.4);
            border-radius: 2rem;
            padding: 1.5rem;
            max-width: 90%;
            width: 500px;
            transform: scale(0.9);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }
        .glass-input {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            width: 100%;
            outline: none;
        }
        .glass-input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 10px rgba(6,182,212,0.4);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10002;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        /* CSKH Widget */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(6,182,212,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }
        .glass-input-sm {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }
        .glass-input-sm:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6,182,212,0.3);
        }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .custom-table th, .custom-table td { font-size: 0.7rem; padding: 0.5rem; }
        }
    </style>
</head>

        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function tf(key, params) {
            let str = t(key);
            for (const k in params) str = str.split(`{${k}}`).join(params[k]);
            return str;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
            if (typeof loadStaff === 'function') loadStaff();
        }
        applyStaticTranslations();
        const langToggleBtn = document.getElementById('langToggleBtn');
        if (langToggleBtn) {
            langToggleBtn.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));
        }

        let currentDeleteId = null;

        // Helper functions
        function showToast(msg, isError = false) {
            toast.innerText = msg;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showLoading(show) {
            if (show) loadingOverlay.classList.add('active');
            else loadingOverlay.classList.remove('active');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        function getRoleBadge(role) {
            const roleMap = {
                admin: { class: 'role-admin', text: t('staff_management_badge_admin') },
                manager: { class: 'role-manager', text: t('staff_management_badge_manager') },
                staff: { class: 'role-staff', text: t('staff_management_badge_staff') },
                karaoke: { class: 'role-karaoke', text: t('staff_management_badge_karaoke') },
                spa: { class: 'role-staff', text: t('staff_management_badge_spa') }
            };
            const r = roleMap[role] || roleMap.staff;
            return `<span class="role-badge ${r.class}">${r.text}</span>`;
        }

        function getStatusBadge(status) {
            if (status === 'active') return '<span class="text-emerald-400 text-xs"><i class="fas fa-circle text-[8px] mr-1"></i> ' + t('staff_management_badge_active') + '</span>';
            return '<span class="text-rose-400 text-xs"><i class="fas fa-circle text-[8px] mr-1"></i> ' + t('staff_management_tam_nghi') + '</span>';
        }

        // Load staff list from Supabase
        async function loadStaff() {
            showLoading(true);
            try {
                const { data, error } = await supabase
                    .from('staff')
                    .select('*')
                    .order('id', { ascending: true });
                if (error) throw error;
                renderStaffTable(data || []);
            } catch (err) {
                console.error(err);
                showToast(t('staff_management_err_load_list') + err.message, true);
            } finally {
                showLoading(false);
            }
        }

        function renderStaffTable(staffList, filter = '') {
            const filtered = staffList.filter(s =>
                s.name.toLowerCase().includes(filter.toLowerCase()) ||
                s.phone.includes(filter)
            );
            if (filtered.length === 0) {
                staffTableBody.innerHTML = '<tr><td colspan="7" class="text-center py-10 text-gray-500">' + t('staff_management_no_results') + '</td></tr>';
                return;
            }
            staffTableBody.innerHTML = filtered.map(s => `
                <tr data-id="${s.id}">
                    <td class="text-gray-400">#${s.id}</td>
                    <td class="font-semibold">${escapeHtml(s.name)}</td>
                    <td>${escapeHtml(s.phone)}</td>
                    <td>${getRoleBadge(s.role)}</td>
                    <td class="font-mono">${s.commission_rate}%</td>
                    <td>${getStatusBadge(s.is_active ? 'active' : 'inactive')}</td>
                    <td class="flex gap-2">
                        <a href="/cauhinh_luong?staff_id=${s.id}" class="btn-outline text-xs px-3 py-1"><i class="fas fa-hand-holding-usd"></i> ${t('staff_management_action_salary')}</a>
                        <button class="edit-staff btn-outline text-xs px-3 py-1" data-id="${s.id}"><i class="fas fa-edit"></i> ${t('staff_management_action_edit')}</button>
                        <button class="delete-staff btn-danger text-xs px-3 py-1" data-id="${s.id}" data-name="${escapeHtml(s.name)}"><i class="fas fa-trash-alt"></i> ${t('staff_management_btn_delete')}</button>
                    </td>
                </tr>
            `).join('');

            // Attach edit/delete events
            document.querySelectorAll('.edit-staff').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    const staff = staffList.find(s => s.id === id);
                    if (staff) openEditModal(staff);
                });
            });
            document.querySelectorAll('.delete-staff').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    const name = btn.getAttribute('data-name');
                    openDeleteModal(id, name);
                });
            });
        }

        // Modal handlers
        function openAddModal() {
            staffIdInput.value = '';
            staffNameInput.value = '';
            staffPhoneInput.value = '';
            staffRoleSelect.value = 'staff';
            staffCommissionInput.value = '0';
            staffStatusSelect.value = 'active';
            modalTitle.innerHTML = '<i class="fas fa-user-plus mr-2"></i> ' + t('staff_management_btn_add');
            staffModal.classList.add('active');
        }

        function openEditModal(staff) {
            staffIdInput.value = staff.id;
            staffNameInput.value = staff.name;
            staffPhoneInput.value = staff.phone;
            staffRoleSelect.value = staff.role;
            staffCommissionInput.value = staff.commission_rate;
            staffStatusSelect.value = staff.is_active ? 'active' : 'inactive';
            modalTitle.innerHTML = '<i class="fas fa-user-edit mr-2"></i> ' + t('staff_management_modal_edit_title');
            staffModal.classList.add('active');
        }

        function closeModal() {
            staffModal.classList.remove('active');
        }

        // Save staff (insert or update)
        async function saveStaff(event) {
            event.preventDefault();
            const id = staffIdInput.value;
            const name = staffNameInput.value.trim();
            const phone = staffPhoneInput.value.trim();
            const role = staffRoleSelect.value;
            const commission_rate = parseFloat(staffCommissionInput.value) || 0;
            const is_active = staffStatusSelect.value === 'active';

            if (!name || !phone) {
                showToast(t('staff_management_err_missing_fields'), true);
                return;
            }

            showLoading(true);
            try {
                if (id) {
                    // Update
                    const { error } = await supabase
                        .from('staff')
                        .update({ name, phone, role, commission_rate, is_active })
                        .eq('id', id);
                    if (error) throw error;
                    showToast(t('staff_management_msg_update_success'));
                } else {
                    // Insert
                    const { error } = await supabase
                        .from('staff')
                        .insert([{ name, phone, role, commission_rate, is_active, created_at: new Date() }]);
                    if (error) throw error;
                    showToast(t('staff_management_msg_add_success'));
                }
                closeModal();
                await loadStaff(); // refresh list
            } catch (err) {
                console.error(err);
                showToast(t('staff_management_err_save') + err.message, true);
            } finally {
                showLoading(false);
            }
        }

        // Delete staff
        function openDeleteModal(id, name) {
            currentDeleteId = id;
            deleteStaffNameSpan.innerText = name;
            deleteModal.classList.add('active');
        }

        async function confirmDelete() {
            if (!currentDeleteId) return;
            showLoading(true);
            try {
                const { error } = await supabase
                    .from('staff')
                    .delete()
                    .eq('id', currentDeleteId);
                if (error) throw error;
                showToast(t('staff_management_msg_delete_success'));
                deleteModal.classList.remove('active');
                await loadStaff();
            } catch (err) {
                console.error(err);
                showToast(t('staff_management_err_delete') + err.message, true);
            } finally {
                showLoading(false);
                currentDeleteId = null;
            }
        }

        function closeDeleteModal() {
            deleteModal.classList.remove('active');
            currentDeleteId = null;
        }

        // Search filter
        function filterStaff() {
            const keyword = searchInput.value;
            // Reload and filter client-side (to avoid extra API calls)
            loadStaff().then(() => {
                const rows = document.querySelectorAll('#staffTableBody tr');
                if (!rows.length) return;
                rows.forEach(row => {
                    const name = row.cells[1]?.innerText.toLowerCase() || '';
                    const phone = row.cells[2]?.innerText || '';
                    const match = name.includes(keyword.toLowerCase()) || phone.includes(keyword);
                    row.style.display = match ? '' : 'none';
                });
            });
        }

        // CSKH track click + form hỗ trợ: gom về static/js/cskh_track.js (dùng chung,
        // gọi /api/cskh/click + /api/cskh/request qua Flask/MongoDB) — xem <script> nạp cuối trang.

        // Event listeners
        addStaffBtn.addEventListener('click', openAddModal);
        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);
        staffModal.addEventListener('click', (e) => { if (e.target === staffModal) closeModal(); });
        staffForm.addEventListener('submit', saveStaff);
        confirmDeleteBtn.addEventListener('click', confirmDelete);
        cancelDeleteBtn.addEventListener('click', closeDeleteModal);
        deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeDeleteModal(); });
        searchInput.addEventListener('input', filterStaff);

        // Initial load
        supabaseReady.then(() => { loadStaff(); });

        // 3D Background (giữ nguyên)
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 700 : 1500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x06b6d4, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            const starCount = 100;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.07, y: (Math.random() - 0.5) * 0.1 - 0.04, z: (Math.random() - 0.5) * 0.03 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.09, color: 0xffaa88, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            scene.fog = new THREE.FogExp2(0x08061a, 0.008);
            
            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsed = clock.getElapsedTime();
                const hue = (elapsed * 0.03) % 1;
                material.color.setHSL(hue, 0.8, 0.6);
                particles.rotation.y = elapsed * 0.02;
                particles.rotation.x = elapsed * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);
                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
