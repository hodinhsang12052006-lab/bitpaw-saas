<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>BitPaw Care | Trợ lý chốt sale + Realtime</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: #08061a; 
            color: white; 
        }
        #bg-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 0; 
            opacity: 0.6; 
            pointer-events: none; 
        }
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.4;
            animation: scanMove 8s linear infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        .glass-panel { 
            background: rgba(10, 15, 37, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); 
        }
        .glass-input { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            transition: all 0.3s; 
            padding: 12px 16px; 
            border-radius: 32px; 
            outline: none; 
            width: 100%; 
            font-size: 0.95rem;
        }
        .glass-input:focus { 
            border-color: #8b5cf6; 
            box-shadow: 0 0 20px rgba(139,92,246,0.4); 
            background: rgba(0,0,0,0.8); 
        }
        ::-webkit-scrollbar { width: 3px; } 
        ::-webkit-scrollbar-track { background: transparent; } 
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 10px; }
        .chat-ai { 
            background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(6,182,212,0.15)); 
            border: 1px solid rgba(139,92,246,0.3); 
            border-radius: 20px 20px 20px 8px; 
        }
        .chat-user { 
            background: linear-gradient(135deg, rgba(6,182,212,0.8), rgba(59,130,246,0.8)); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 20px 20px 8px 20px; 
        }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
        .suggestion-chip {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }
        .suggestion-chip:active { transform: scale(0.96); }
        .suggestions-scroll {
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .emoji-picker {
            position: absolute;
            bottom: 70px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 10px;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            z-index: 50;
            border: 1px solid rgba(6,182,212,0.3);
            max-width: 260px;
        }
        .emoji-picker span {
            font-size: 1.5rem;
            cursor: pointer;
            text-align: center;
            padding: 4px;
            border-radius: 12px;
            transition: 0.1s;
        }
        .emoji-picker span:hover {
            background: rgba(6,182,212,0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body class="flex items-center justify-center antialiased">
    
    <div class="scan-line"></div>
    <canvas id="bg-canvas"></canvas>

    <!-- Khung điện thoại -->
    <div class="max-w-md mx-auto h-screen relative shadow-2xl border-x border-white/10 flex flex-col bg-black/20 backdrop-blur-sm">
        
        <!-- Header -->
        <div class="flex-shrink-0 p-4 pb-2 flex items-center gap-3 border-b border-white/10 bg-black/30">
            <img src="https://placehold.co/400x150/1a1a2e/00d2ff?text=BitPaw+OS" class="w-8 h-8 rounded-full border border-cyan-500/50 object-cover">
            <div>
                <h1 class="text-base font-bold tracking-wide">Trợ lý <span class="text-cyan-400">BitPaw</span></h1>
                <p class="text-[9px] text-gray-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Online 24/7</p>
            </div>
            <div class="flex-1"></div>
            <div class="text-xs text-gray-400" id="customerIdBadge"></div>
        </div>

        <!-- Main chat -->
        <main class="flex-1 flex flex-col overflow-hidden px-2 py-2">
            <div class="glass-panel rounded-3xl flex flex-col flex-1 overflow-hidden shadow-2xl">
                <div id="chatBox" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar">
                    <div class="flex justify-center py-10 text-gray-400 text-sm">Đang tải hội thoại...</div>
                </div>

                <!-- Nút gợi ý ngang -->
                <div class="p-2 border-t border-white/10 bg-black/30">
                    <div class="suggestions-scroll flex gap-2 overflow-x-auto pb-1">
                        <button onclick="sendQuickMessage('Tôi cần hỗ trợ gói dịch vụ')" class="suggestion-chip whitespace-nowrap bg-cyan-500/10 hover:bg-cyan-500/30 border border-cyan-500/30 text-cyan-300 px-3 py-1.5 rounded-full text-xs font-medium">💬 Hỗ trợ dịch vụ</button>
                        <button onclick="sendQuickMessage('Tôi muốn nhận ưu đãi tri ân')" class="suggestion-chip whitespace-nowrap bg-emerald-500/10 hover:bg-emerald-500/30 border border-emerald-500/30 text-emerald-300 px-3 py-1.5 rounded-full text-xs font-medium">🎁 Ưu đãi tri ân</button>
                        <button onclick="sendQuickMessage('Khiếu nại / góp ý')" class="suggestion-chip whitespace-nowrap bg-rose-500/10 hover:bg-rose-500/30 border border-rose-500/30 text-rose-300 px-3 py-1.5 rounded-full text-xs font-medium">📝 Khiếu nại</button>
                        <button onclick="sendQuickMessage('Hướng dẫn đặt lịch')" class="suggestion-chip whitespace-nowrap bg-purple-500/10 hover:bg-purple-500/30 border border-purple-500/30 text-purple-300 px-3 py-1.5 rounded-full text-xs font-medium">📅 Đặt lịch</button>
                        <button onclick="sendQuickMessage('Xem chính sách bảo hành')" class="suggestion-chip whitespace-nowrap bg-yellow-500/10 hover:bg-yellow-500/30 border border-yellow-500/30 text-yellow-300 px-3 py-1.5 rounded-full text-xs font-medium">🔧 Bảo hành</button>
                    </div>
                </div>

                <!-- Toolbar + Input -->
                <div class="p-3 bg-black/60 border-t border-white/10">
                    <div class="flex gap-3 mb-2 px-1">
                        <button id="emojiBtn" class="text-gray-300 hover:text-cyan-400 text-xl"><i class="far fa-smile-wink"></i></button>
                        <button id="imageUploadBtn" class="text-gray-300 hover:text-cyan-400 text-xl"><i class="far fa-image"></i></button>
                        <button id="gifUploadBtn" class="text-gray-300 hover:text-cyan-400 text-xl"><i class="fas fa-file-video"></i></button>
                    </div>
                    <div id="emojiPicker" class="emoji-picker">
                        <span>😀</span><span>😂</span><span>😍</span><span>🥰</span><span>😎</span><span>🤔</span>
                        <span>😢</span><span>😡</span><span>👍</span><span>❤️</span><span>🔥</span><span>🎉</span>
                        <span>💯</span><span>✅</span><span>🙏</span><span>😘</span><span>😁</span><span>🤣</span>
                    </div>
                    <form id="chatForm" class="relative" onsubmit="handleSendMessage(event)">
                        <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." class="glass-input w-full pr-12 py-2 pl-4 rounded-full text-sm">
                        <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                            <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </form>
                    <input type="file" id="fileImageInput" accept="image/*" style="display: none;">
                    <input type="file" id="fileGifInput" accept="image/gif" style="display: none;">
                </div>
            </div>
        </main>
        
        <div class="text-center text-[9px] text-gray-500 py-2">
            <i class="fas fa-lock"></i> Bảo mật tuyệt đối | BitPaw
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full max-w-[280px] z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/module/index.js';

        // ========== SUPABASE ==========
        const supabaseUrl = 'https://iftrdngahdjpninjmzhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmdHJkbmdhaGRqcG5pbmptemhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDIyODQsImV4cCI6MjA5Mjg3ODI4NH0.TX0f_pbiqSiF39ISt9z_flvyRVxNc730By87Zae2uRc';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Lấy customer_id từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id');
        let currentCustomerId = customerId ? parseInt(customerId) : null;
        let needHumanFlag = false;
        let followUpTimer = null;
        let isWaitingForReply = false;
        let realtimeChannel = null;
        let lastReceivedMessageId = null; // tránh lặp tin nhắn

        // DOM
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const customerIdBadge = document.getElementById('customerIdBadge');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const imageUploadBtn = document.getElementById('imageUploadBtn');
        const gifUploadBtn = document.getElementById('gifUploadBtn');
        const fileImageInput = document.getElementById('fileImageInput');
        const fileGifInput = document.getElementById('fileGifInput');

        if (currentCustomerId) {
            customerIdBadge.innerHTML = `<i class="fas fa-user-check"></i> ID: ${currentCustomerId}`;
        } else {
            customerIdBadge.innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-400"></i> Chưa có ID`;
        }

        // Helper
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'emerald' : 'cyan';
            toast.className = `bg-black/80 backdrop-blur-lg border border-${color}-500/50 text-white px-3 py-2 rounded-xl text-xs flex items-center gap-2 shadow-xl`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'} text-${color}-400"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Hiển thị tin nhắn (hỗ trợ ảnh/GIF)
        function appendMessage(sender, text, time = null, mediaUrl = null, isGif = false) {
            const timeStr = time ? new Date(time).toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' }) 
                                 : new Date().toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' });
            const isUser = (sender === 'user' || sender === 'customer');
            const avatarHtml = isUser ? '' : `<div class="w-7 h-7 rounded-full bg-gradient-to-br from-cyan-600 to-blue-600 flex items-center justify-center flex-shrink-0 mt-1"><i class="fas fa-robot text-white text-xs"></i></div>`;
            const bubbleClass = isUser ? 'chat-user' : 'chat-ai';
            const justifyClass = isUser ? 'justify-end' : 'justify-start';
            const nameLabel = isUser ? '' : '<p class="text-[9px] text-cyan-400 mb-0.5 ml-1">Trợ lý BitPaw</p>';
            
            let contentHtml = '';
            if (mediaUrl) {
                if (isGif) {
                    contentHtml = `<img src="${mediaUrl}" class="max-w-full rounded-lg mb-1 max-h-40 object-contain">`;
                } else {
                    contentHtml = `<img src="${mediaUrl}" class="max-w-full rounded-lg mb-1 max-h-48 object-cover">`;
                }
            }
            if (text) contentHtml += `<div>${escapeHtml(text)}</div>`;
            
            const html = `
                <div class="flex ${justifyClass} gap-2">
                    ${avatarHtml}
                    <div class="max-w-[85%]">
                        ${nameLabel}
                        <div class="${bubbleClass} p-3 text-sm text-gray-200">${contentHtml}</div>
                        <p class="text-[8px] text-gray-500 ${isUser ? 'text-right' : 'ml-1'} mt-0.5">${timeStr}</p>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // Typing effect & chia tin nhắn dài
        async function typeMessageWithDelay(message, delayMs = 2000) {
            return new Promise((resolve) => {
                const typingId = 'typing_' + Date.now();
                const typingHtml = `
                    <div id="${typingId}" class="flex justify-start gap-2">
                        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-cyan-600 to-blue-600 flex items-center justify-center"><i class="fas fa-robot text-white text-xs"></i></div>
                        <div class="chat-ai p-3 flex items-center gap-1 h-9">
                            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full typing-dot"></div>
                            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full typing-dot"></div>
                            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full typing-dot"></div>
                        </div>
                    </div>
                `;
                chatBox.insertAdjacentHTML('beforeend', typingHtml);
                scrollToBottom();
                setTimeout(() => {
                    const el = document.getElementById(typingId);
                    if (el) el.remove();
                    appendMessage('ai', message);
                    resolve();
                }, delayMs);
            });
        }

        function splitMessage(text, maxLength = 120) {
            if (text.length <= maxLength) return [text];
            const sentences = text.split(/(?<=[.!?])\s+/);
            const chunks = [];
            let current = '';
            for (let s of sentences) {
                if ((current + s).length <= maxLength) {
                    current += (current ? ' ' : '') + s;
                } else {
                    if (current) chunks.push(current);
                    current = s;
                }
            }
            if (current) chunks.push(current);
            return chunks;
        }

        async function sendMultipleMessages(messages) {
            for (let i = 0; i < messages.length; i++) {
                const delay = (i === 0) ? 1500 : 2500;
                await typeMessageWithDelay(messages[i], delay);
            }
        }

        // Reset follow-up timer
        function resetFollowUpTimer() {
            if (followUpTimer) clearTimeout(followUpTimer);
            if (!needHumanFlag && currentCustomerId && isWaitingForReply) {
                followUpTimer = setTimeout(async () => {
                    if (!needHumanFlag && isWaitingForReply && currentCustomerId) {
                        const followUpMsg = "Dạ anh/chị có đang online đó không ạ? Lăn tăn gì cứ nhắn em nhé.";
                        const chunks = splitMessage(followUpMsg, 120);
                        await sendMultipleMessages(chunks);
                        await supabase.from('bot_messages').insert([{
                            customer_id: currentCustomerId,
                            sender: 'ai',
                            content: followUpMsg,
                            created_at: new Date().toISOString()
                        }]);
                        isWaitingForReply = false;
                    }
                }, 30000);
            }
        }

        // Hand-off detection
        function detectHandOff(userMessage) {
            const lowerMsg = userMessage.toLowerCase();
            const handOffKeywords = ['stk', 'chuyển khoản', 'ngân hàng', 'số tài khoản'];
            return handOffKeywords.some(kw => lowerMsg.includes(kw));
        }

        async function setNeedHumanFlag(customerId) {
            try {
                await supabase.from('bot_customers').update({ need_human: true }).eq('id', customerId);
            } catch(e) { console.warn(e); }
        }

        // Fake Typo (10% với câu ngắn <15 chữ)
        async function applyHumanTypo(text) {
            if (text.length > 15) return text;
            if (Math.random() > 0.1) return text;
            const words = text.split(' ');
            if (words.length === 0) return text;
            const lastWord = words[words.length - 1];
            if (lastWord.length < 3) return text;
            let wrongWord = lastWord.slice(0, -1) + 
                            (lastWord.slice(-1) === 'a' ? 'o' : 
                             lastWord.slice(-1) === 'e' ? 'u' : 
                             lastWord.slice(-1) === 'i' ? 'y' : 
                             lastWord.slice(-1) === 'n' ? 'm' : 
                             lastWord.slice(-1) + 'x');
            words[words.length - 1] = wrongWord;
            const wrongText = words.join(' ');
            // Hiển thị và lưu tin nhắn sai
            appendMessage('user', wrongText);
            await supabase.from('bot_messages').insert([{
                customer_id: currentCustomerId,
                sender: 'user',
                content: wrongText,
                created_at: new Date().toISOString()
            }]);
            // Sau 1.5s gửi sửa
            setTimeout(async () => {
                const corrected = `*${text}*`;
                appendMessage('user', corrected);
                await supabase.from('bot_messages').insert([{
                    customer_id: currentCustomerId,
                    sender: 'user',
                    content: corrected,
                    created_at: new Date().toISOString()
                }]);
                await processUserMessage(text, true);
            }, 1500);
            return null;
        }

        // AI Response (giả lập)
        async function getAIResponse(userMessage) {
            const lower = userMessage.toLowerCase();
            if (lower.includes('báo giá') || lower.includes('giá')) {
                return "Dạ, gói Pro của bên em là 2.5 triệu/tháng, gói Basic 800k/ tháng ạ. Anh/chị quan tâm gói nào để em tư vấn thêm nhé!";
            } else if (lower.includes('ưu đãi') || lower.includes('tri ân')) {
                return "Vâng, hiện tại bên em có ưu đãi giảm 20% cho gói Pro và tặng thêm voucher 200k ạ. Anh/chị đăng ký ngay hôm nay nha!";
            } else if (lower.includes('hỗ trợ') || lower.includes('dịch vụ')) {
                return "Dạ, em sẵn sàng hỗ trợ anh/chị. Anh/chị cần tư vấn về tính năng hay báo giá ạ?";
            } else {
                return "Dạ em cảm ơn anh/chị đã nhắn tin. Em đang kiểm tra thông tin, anh/chị vui lòng chờ em chút nhé!";
            }
        }

        // Xử lý tin nhắn user
        async function processUserMessage(userText, isTypoFixed = false) {
            if (!currentCustomerId) return;
            if (!isTypoFixed) {
                const { error } = await supabase.from('bot_messages').insert([{
                    customer_id: currentCustomerId,
                    sender: 'user',
                    content: userText,
                    created_at: new Date().toISOString()
                }]);
                if (error) console.error(error);
                await supabase.from('bot_customers').update({ last_message: userText, last_message_time: new Date().toISOString() }).eq('id', currentCustomerId);
            }
            if (followUpTimer) clearTimeout(followUpTimer);
            isWaitingForReply = false;

            // Hand-off
            if (detectHandOff(userText)) {
                needHumanFlag = true;
                await setNeedHumanFlag(currentCustomerId);
                const handOffMsg = "Dạ vâng, để em báo Quản lý kho lên đơn và gửi thông tin thanh toán cho mình ngay ạ. Anh/chị đợi em chút nhé!";
                const chunks = splitMessage(handOffMsg, 120);
                await sendMultipleMessages(chunks);
                await supabase.from('bot_messages').insert([{
                    customer_id: currentCustomerId,
                    sender: 'ai',
                    content: handOffMsg,
                    created_at: new Date().toISOString()
                }]);
                return;
            }

            // Gọi AI
            const aiReply = await getAIResponse(userText);
            const chunks = splitMessage(aiReply, 120);
            await sendMultipleMessages(chunks);
            await supabase.from('bot_messages').insert([{
                customer_id: currentCustomerId,
                sender: 'ai',
                content: aiReply,
                created_at: new Date().toISOString()
            }]);
            isWaitingForReply = true;
            resetFollowUpTimer();
        }

        // Gửi tin nhắn text (có typo)
        async function handleSendMessage(e) {
            e.preventDefault();
            let text = messageInput.value.trim();
            if (!text) return;
            if (!currentCustomerId) {
                showToast('Không tìm thấy mã khách hàng.', 'error');
                return;
            }
            messageInput.value = '';
            const finalText = await applyHumanTypo(text);
            if (finalText === null) return;
            await processUserMessage(finalText, false);
        }

        // Gửi ảnh/GIF
        async function sendMedia(file, isGif = false) {
            if (!currentCustomerId) {
                showToast('Không tìm thấy khách hàng', 'error');
                return;
            }
            if (!file) return;
            const ext = isGif ? 'gif' : 'jpg';
            const fileName = `${currentCustomerId}_${Date.now()}_media.${ext}`;
            const { data, error } = await supabase.storage
                .from('chat_images')
                .upload(fileName, file, { cacheControl: '3600', upsert: false });
            if (error) {
                showToast('Lỗi upload', 'error');
                return;
            }
            const { data: publicUrlData } = supabase.storage.from('chat_images').getPublicUrl(fileName);
            const mediaUrl = publicUrlData.publicUrl;
            appendMessage('user', '', null, mediaUrl, isGif);
            const contentText = isGif ? `[GIF] ${mediaUrl}` : `[Hình ảnh] ${mediaUrl}`;
            await supabase.from('bot_messages').insert([{
                customer_id: currentCustomerId,
                sender: 'user',
                content: contentText,
                created_at: new Date().toISOString()
            }]);
            await processUserMessage(`Đã gửi ${isGif ? 'GIF' : 'ảnh'}`, false);
        }

        // Emoji picker
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.style.display = emojiPicker.style.display === 'grid' ? 'none' : 'grid';
        });
        document.addEventListener('click', () => {
            emojiPicker.style.display = 'none';
        });
        emojiPicker.querySelectorAll('span').forEach(emojiSpan => {
            emojiSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                messageInput.value += emojiSpan.innerText;
                messageInput.focus();
                emojiPicker.style.display = 'none';
            });
        });

        imageUploadBtn.addEventListener('click', () => fileImageInput.click());
        gifUploadBtn.addEventListener('click', () => fileGifInput.click());
        fileImageInput.addEventListener('change', async (e) => {
            if (e.target.files.length) await sendMedia(e.target.files[0], false);
            fileImageInput.value = '';
        });
        fileGifInput.addEventListener('change', async (e) => {
            if (e.target.files.length) await sendMedia(e.target.files[0], true);
            fileGifInput.value = '';
        });

        window.sendQuickMessage = async function(text) {
            messageInput.value = text;
            await handleSendMessage(new Event('submit'));
        };

        // ========== REALTIME SUBSCRIBE (Portal) ==========
        function subscribeToRealtime() {
            if (!currentCustomerId) return;
            if (realtimeChannel) {
                realtimeChannel.unsubscribe();
                realtimeChannel = null;
            }
            realtimeChannel = supabase
                .channel(`public:bot_messages:${currentCustomerId}`)
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'bot_messages', filter: `customer_id=eq.${currentCustomerId}` },
                    async (payload) => {
                        const newMsg = payload.new;
                        // Bỏ qua tin nhắn do chính user này gửi (tránh lặp)
                        if (newMsg.sender === 'user') return;
                        if (lastReceivedMessageId === newMsg.id) return;
                        lastReceivedMessageId = newMsg.id;
                        // Kiểm tra trùng nội dung với tin nhắn cuối (dự phòng)
                        const lastMsgDiv = chatBox.querySelector('.chat-ai:last-child .text-gray-200');
                        if (lastMsgDiv && lastMsgDiv.innerText.trim() === newMsg.content) return;
                        // Hiển thị tin nhắn mới (từ AI hoặc staff)
                        appendMessage('ai', newMsg.content, newMsg.created_at);
                        scrollToBottom();
                        // Cập nhật lại trạng thái follow-up (vì admin/AI vừa nhắn)
                        if (followUpTimer) clearTimeout(followUpTimer);
                        isWaitingForReply = true;
                        resetFollowUpTimer();
                    })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') console.log('✅ Realtime subscribed for customer', currentCustomerId);
                });
        }

        // ========== LOAD LỊCH SỬ ==========
        async function loadHistory() {
            if (!currentCustomerId) {
                chatBox.innerHTML = '<div class="text-center text-gray-400 py-10">Link không hợp lệ.<br>Vui lòng quét mã QR hoặc liên hệ CSKH.</div>';
                return;
            }
            chatBox.innerHTML = '<div class="flex justify-center py-10"><i class="fas fa-circle-notch fa-spin text-2xl text-cyan-400"></i><span class="ml-2 text-gray-400">Đang tải...</span></div>';
            const { data, error } = await supabase
                .from('bot_messages')
                .select('*')
                .eq('customer_id', currentCustomerId)
                .order('created_at', { ascending: true });
            if (error) {
                chatBox.innerHTML = '<div class="text-center text-red-400 py-10">Lỗi tải lịch sử</div>';
                return;
            }
            chatBox.innerHTML = '';
            if (!data || data.length === 0) {
                appendMessage('ai', '🎉 Chào mừng bạn quay lại! Em là trợ lý BitPaw. Có gì cần tư vấn về dịch vụ hoặc ưu đãi hôm nay không ạ?');
                isWaitingForReply = true;
                resetFollowUpTimer();
            } else {
                data.forEach(msg => {
                    const senderType = (msg.sender === 'user') ? 'user' : 'ai';
                    const imgMatch = msg.content.match(/\[Hình ảnh\] (https?:\/\/[^\s]+)/);
                    const gifMatch = msg.content.match(/\[GIF\] (https?:\/\/[^\s]+)/);
                    if (imgMatch) {
                        appendMessage(senderType, '', msg.created_at, imgMatch[1], false);
                    } else if (gifMatch) {
                        appendMessage(senderType, '', msg.created_at, gifMatch[1], true);
                    } else {
                        appendMessage(senderType, msg.content, msg.created_at);
                    }
                });
                const lastMsg = data[data.length-1];
                if (lastMsg && lastMsg.sender === 'ai') {
                    isWaitingForReply = true;
                    resetFollowUpTimer();
                }
            }
            scrollToBottom();
            // Sau khi load xong, kích hoạt realtime
            subscribeToRealtime();
        }

        // 3D Background
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            const particlesCount = window.innerWidth < 768 ? 600 : 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 120;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.15, color: 0x06b6d4, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            scene.fog = new THREE.FogExp2(0x08061a, 0.01);
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.002;
                particles.rotation.x += 0.001;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        // Khởi động
        loadHistory();
        document.getElementById('chatForm').addEventListener('submit', handleSendMessage);
        messageInput.focus();
    </script>
    {% include 'components/cskh_global.html' %}
</body>
