<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BitPaw Care | Trợ lý chốt sale + Realtime</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: #08061a; 
            color: white; 
        }
        #bg-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 0; 
            opacity: 0.6; 
            pointer-events: none; 
        }
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.4;
            animation: scanMove 8s linear infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        .glass-panel { 
            background: rgba(10, 15, 37, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); 
        }
        .glass-input { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            transition: all 0.3s; 
            padding: 12px 16px; 
            border-radius: 32px; 
            outline: none; 
            width: 100%; 
            font-size: 0.95rem;
        }
        .glass-input:focus { 
            border-color: #8b5cf6; 
            box-shadow: 0 0 20px rgba(139,92,246,0.4); 
            background: rgba(0,0,0,0.8); 
        }
        ::-webkit-scrollbar { width: 3px; } 
        ::-webkit-scrollbar-track { background: transparent; } 
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 10px; }
        .chat-ai { 
            background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(6,182,212,0.15)); 
            border: 1px solid rgba(139,92,246,0.3); 
            border-radius: 20px 20px 20px 8px; 
        }
        .chat-user { 
            background: linear-gradient(135deg, rgba(6,182,212,0.8), rgba(59,130,246,0.8)); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 20px 20px 8px 20px; 
        }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
        .suggestion-chip {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }
        .suggestion-chip:active { transform: scale(0.96); }
        .suggestions-scroll {
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .emoji-picker {
            position: absolute;
            bottom: 70px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 10px;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            z-index: 50;
            border: 1px solid rgba(6,182,212,0.3);
            max-width: 260px;
        }
        .emoji-picker span {
            font-size: 1.5rem;
            cursor: pointer;
            text-align: center;
            padding: 4px;
            border-radius: 12px;
            transition: 0.1s;
        }
        .emoji-picker span:hover {
            background: rgba(6,182,212,0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body class="flex items-center justify-center antialiased">
    
    <div class="scan-line"></div>
    <canvas id="bg-canvas"></canvas>

    <!-- Khung điện thoại -->
    <div class="max-w-md mx-auto h-screen relative shadow-2xl border-x border-white/10 flex flex-col bg-black/20 backdrop-blur-sm">
        
        <!-- Header -->
        <div class="flex-shrink-0 p-4 pb-2 flex items-center gap-3 border-b border-white/10 bg-black/30">
            <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-8 h-8 rounded-full border border-cyan-500/50 object-cover">
            <div>
                <h1 class="text-base font-bold tracking-wide"><span data-i18n="portal_header_assistant">Trợ lý</span> <span class="text-cyan-400">BitPaw</span></h1>
                <p class="text-[9px] text-gray-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> <span data-i18n="portal_status_online">Online 24/7</span></p>
            </div>
            <div class="flex-1"></div>
            <button id="langToggleBtn" type="button" class="bg-white/10 hover:bg-white/20 text-white px-2 py-0.5 rounded-full text-[9px] font-bold transition mr-2">EN</button>
            <div class="text-xs text-gray-400" id="customerIdBadge"></div>
        </div>

        <!-- Main chat -->
        <main class="flex-1 flex flex-col overflow-hidden px-2 py-2">
            <div class="glass-panel rounded-3xl flex flex-col flex-1 overflow-hidden shadow-2xl">
                <div id="chatBox" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar">
                    <div class="flex justify-center py-10 text-gray-400 text-sm" data-i18n="portal_loading_conversation">Đang tải hội thoại...</div>
                </div>

                <!-- Nút gợi ý ngang -->
                <div class="p-2 border-t border-white/10 bg-black/30">
                    <div class="suggestions-scroll flex gap-2 overflow-x-auto pb-1">
                        <button onclick="sendQuickMessage('Tôi cần hỗ trợ gói dịch vụ')" class="suggestion-chip whitespace-nowrap bg-cyan-500/10 hover:bg-cyan-500/30 border border-cyan-500/30 text-cyan-300 px-3 py-1.5 rounded-full text-xs font-medium" data-i18n="portal_chip_support">💬 Hỗ trợ dịch vụ</button>
                        <button onclick="sendQuickMessage('Tôi muốn nhận ưu đãi tri ân')" class="suggestion-chip whitespace-nowrap bg-emerald-500/10 hover:bg-emerald-500/30 border border-emerald-500/30 text-emerald-300 px-3 py-1.5 rounded-full text-xs font-medium" data-i18n="portal_chip_promo">🎁 Ưu đãi tri ân</button>
                        <button onclick="sendQuickMessage('Khiếu nại / góp ý')" class="suggestion-chip whitespace-nowrap bg-rose-500/10 hover:bg-rose-500/30 border border-rose-500/30 text-rose-300 px-3 py-1.5 rounded-full text-xs font-medium" data-i18n="portal_chip_complaint">📝 Khiếu nại</button>
                        <button onclick="sendQuickMessage('Hướng dẫn đặt lịch')" class="suggestion-chip whitespace-nowrap bg-purple-500/10 hover:bg-purple-500/30 border border-purple-500/30 text-purple-300 px-3 py-1.5 rounded-full text-xs font-medium" data-i18n="portal_chip_booking">📅 Đặt lịch</button>
                        <button onclick="sendQuickMessage('Xem chính sách bảo hành')" class="suggestion-chip whitespace-nowrap bg-yellow-500/10 hover:bg-yellow-500/30 border border-yellow-500/30 text-yellow-300 px-3 py-1.5 rounded-full text-xs font-medium" data-i18n="portal_chip_warranty">🔧 Bảo hành</button>
                    </div>
                </div>

                <!-- Toolbar + Input -->
                <div class="p-3 bg-black/60 border-t border-white/10">
                    <div class="flex gap-3 mb-2 px-1">
                        <button id="emojiBtn" class="text-gray-300 hover:text-cyan-400 text-xl"><i class="far fa-smile-wink"></i></button>
                        <button id="imageUploadBtn" class="text-gray-300 hover:text-cyan-400 text-xl"><i class="far fa-image"></i></button>
                        <button id="gifUploadBtn" class="text-gray-300 hover:text-cyan-400 text-xl"><i class="fas fa-file-video"></i></button>
                    </div>
                    <div id="emojiPicker" class="emoji-picker">
                        <span>😀</span><span>😂</span><span>😍</span><span>🥰</span><span>😎</span><span>🤔</span>
                        <span>😢</span><span>😡</span><span>👍</span><span>❤️</span><span>🔥</span><span>🎉</span>
                        <span>💯</span><span>✅</span><span>🙏</span><span>😘</span><span>😁</span><span>🤣</span>
                    </div>
                    <form id="chatForm" class="relative" onsubmit="handleSendMessage(event)">
                        <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." class="glass-input w-full pr-12 py-2 pl-4 rounded-full text-sm" data-i18n-placeholder="portal_placeholder_message">
                        <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                            <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </form>
                    <input type="file" id="fileImageInput" accept="image/*" style="display: none;">
                    <input type="file" id="fileGifInput" accept="image/gif" style="display: none;">
                </div>
            </div>
        </main>

        <div class="text-center text-[9px] text-gray-500 py-2">
            <i class="fas fa-lock"></i> <span data-i18n="portal_footer_security">Bảo mật tuyệt đối</span> | BitPaw
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full max-w-[280px] z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // Lấy customer_id từ URL — customer_id là CHUỖI (vd "business123:0900000000"),
        // KHÔNG được parseInt như code backend cũ (id số serial cũ đã không còn đúng với schema Mongo mới).
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id');
        let currentCustomerId = customerId || null;
        let needHumanFlag = false;
        let followUpTimer = null;
        let isWaitingForReply = false;
        let eventSource = null; // EventSource SSE thay cho realtime channel cũ
        let knownMessageCount = 0; // số tin nhắn đã render, dùng để chỉ append phần mới khi SSE báo có thay đổi

        // DOM
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const customerIdBadge = document.getElementById('customerIdBadge');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const imageUploadBtn = document.getElementById('imageUploadBtn');
        const gifUploadBtn = document.getElementById('gifUploadBtn');
        const fileImageInput = document.getElementById('fileImageInput');
        const fileGifInput = document.getElementById('fileGifInput');

        // ========== MULTI-REGION i18n ==========
        let currentLang = localStorage.getItem('bitpaw_lang') || "{{ default_lang }}";
        const translations = {
            vi: {
                portal_header_assistant: 'Trợ lý',
                portal_status_online: 'Online 24/7',
                portal_loading_conversation: 'Đang tải hội thoại...',
                portal_chip_support: '💬 Hỗ trợ dịch vụ',
                portal_chip_promo: '🎁 Ưu đãi tri ân',
                portal_chip_complaint: '📝 Khiếu nại',
                portal_chip_booking: '📅 Đặt lịch',
                portal_chip_warranty: '🔧 Bảo hành',
                portal_placeholder_message: 'Nhập tin nhắn...',
                portal_footer_security: 'Bảo mật tuyệt đối',
                portal_no_id: 'Chưa có ID',
                portal_assistant_name: 'Trợ lý BitPaw',
                portal_err_no_customer_id: 'Không tìm thấy mã khách hàng.',
                portal_err_no_customer: 'Không tìm thấy khách hàng',
                portal_err_upload: 'Lỗi upload',
                portal_invalid_link: 'Link không hợp lệ.<br>Vui lòng quét mã QR hoặc liên hệ CSKH.',
                portal_loading: 'Đang tải...',
                portal_err_load_history: 'Lỗi tải lịch sử',
                portal_welcome_message: '🎉 Chào mừng bạn quay lại! Em là trợ lý BitPaw. Có gì cần tư vấn về dịch vụ hoặc ưu đãi hôm nay không ạ?'
            },
            en: {
                portal_header_assistant: 'Assistant',
                portal_status_online: 'Online 24/7',
                portal_loading_conversation: 'Loading conversation...',
                portal_chip_support: '💬 Service Support',
                portal_chip_promo: '🎁 Loyalty Offers',
                portal_chip_complaint: '📝 Complaint',
                portal_chip_booking: '📅 Book Appointment',
                portal_chip_warranty: '🔧 Warranty',
                portal_placeholder_message: 'Type a message...',
                portal_footer_security: 'Fully Secure',
                portal_no_id: 'No ID yet',
                portal_assistant_name: 'BitPaw Assistant',
                portal_err_no_customer_id: 'Customer ID not found.',
                portal_err_no_customer: 'Customer not found',
                portal_err_upload: 'Upload error',
                portal_invalid_link: 'Invalid link.<br>Please scan the QR code or contact support.',
                portal_loading: 'Loading...',
                portal_err_load_history: 'Error loading history',
                portal_welcome_message: "🎉 Welcome back! I'm the BitPaw assistant. Anything you'd like help with regarding services or offers today?"
            }
        };
        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations.vi[key] || key;
        }
        function tf(key, params) {
            let str = t(key);
            for (const k in params) str = str.split(`{${k}}`).join(params[k]);
            return str;
        }
        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            const langBtn = document.getElementById('langToggleBtn');
            if (langBtn) langBtn.innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bitpaw_lang', lang);
            applyStaticTranslations();
            if (currentCustomerId) {
                customerIdBadge.innerHTML = `<i class="fas fa-user-check"></i> ID: ${currentCustomerId}`;
            } else {
                customerIdBadge.innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-400"></i> ${t('portal_no_id')}`;
            }
        }
        applyStaticTranslations();
        const langToggleBtn = document.getElementById('langToggleBtn');
        if (langToggleBtn) {
            langToggleBtn.addEventListener('click', () => changeLanguage(currentLang === 'vi' ? 'en' : 'vi'));
        }

        if (currentCustomerId) {
            customerIdBadge.innerHTML = `<i class="fas fa-user-check"></i> ID: ${currentCustomerId}`;
        } else {
            customerIdBadge.innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-400"></i> ${t('portal_no_id')}`;
        }

        // Helper
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'emerald' : 'cyan';
            toast.className = `bg-black/80 backdrop-blur-lg border border-${color}-500/50 text-white px-3 py-2 rounded-xl text-xs flex items-center gap-2 shadow-xl`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'} text-${color}-400"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Hiển thị tin nhắn (hỗ trợ ảnh/GIF)
        function appendMessage(sender, text, time = null, mediaUrl = null, isGif = false) {
            const timeStr = time ? new Date(time).toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' }) 
                                 : new Date().toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' });
            const isUser = (sender === 'user' || sender === 'customer');
            const avatarHtml = isUser ? '' : `<div class="w-7 h-7 rounded-full bg-gradient-to-br from-cyan-600 to-blue-600 flex items-center justify-center flex-shrink-0 mt-1"><i class="fas fa-robot text-white text-xs"></i></div>`;
            const bubbleClass = isUser ? 'chat-user' : 'chat-ai';
            const justifyClass = isUser ? 'justify-end' : 'justify-start';
            const nameLabel = isUser ? '' : '<p class="text-[9px] text-cyan-400 mb-0.5 ml-1">' + t('portal_assistant_name') + '</p>';
            
            let contentHtml = '';
            if (mediaUrl) {
                if (isGif) {
                    contentHtml = `<img src="${mediaUrl}" class="max-w-full rounded-lg mb-1 max-h-40 object-contain">`;
                } else {
                    contentHtml = `<img src="${mediaUrl}" class="max-w-full rounded-lg mb-1 max-h-48 object-cover">`;
                }
            }
            if (text) contentHtml += `<div>${escapeHtml(text)}</div>`;
            
            const html = `
                <div class="flex ${justifyClass} gap-2">
                    ${avatarHtml}
                    <div class="max-w-[85%]">
                        ${nameLabel}
                        <div class="${bubbleClass} p-3 text-sm text-gray-200">${contentHtml}</div>
                        <p class="text-[8px] text-gray-500 ${isUser ? 'text-right' : 'ml-1'} mt-0.5">${timeStr}</p>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // Typing effect & chia tin nhắn dài
        async function typeMessageWithDelay(message, delayMs = 2000) {
            return new Promise((resolve) => {
                const typingId = 'typing_' + Date.now();
                const typingHtml = `
                    <div id="${typingId}" class="flex justify-start gap-2">
                        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-cyan-600 to-blue-600 flex items-center justify-center"><i class="fas fa-robot text-white text-xs"></i></div>
                        <div class="chat-ai p-3 flex items-center gap-1 h-9">
                            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full typing-dot"></div>
                            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full typing-dot"></div>
                            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full typing-dot"></div>
                        </div>
                    </div>
                `;
                chatBox.insertAdjacentHTML('beforeend', typingHtml);
                scrollToBottom();
                setTimeout(() => {
                    const el = document.getElementById(typingId);
                    if (el) el.remove();
                    appendMessage('ai', message);
                    resolve();
                }, delayMs);
            });
        }

        function splitMessage(text, maxLength = 120) {
            if (text.length <= maxLength) return [text];
            const sentences = text.split(/(?<=[.!?])\s+/);
            const chunks = [];
            let current = '';
            for (let s of sentences) {
                if ((current + s).length <= maxLength) {
                    current += (current ? ' ' : '') + s;
                } else {
                    if (current) chunks.push(current);
                    current = s;
                }
            }
            if (current) chunks.push(current);
            return chunks;
        }

        async function sendMultipleMessages(messages) {
            for (let i = 0; i < messages.length; i++) {
                const delay = (i === 0) ? 1500 : 2500;
                await typeMessageWithDelay(messages[i], delay);
            }
        }

        // Ghi 1 tin nhắn vào backend (thay cho lời gọi insert bot_messages trực tiếp từ client cũ)
        // senderType phải là 'customer' (tin thật của khách, kể cả bản mô phỏng gõ sai/gõ lại)
        // hoặc 'ai' (phản hồi giả lập của getAIResponse()/follow-up/hand-off) — KHÔNG được gửi 'staff' ở route public này.
        // Nội dung các tin đã render optimistic ở tab này, chờ được "khớp" và bỏ qua khi
        // /api/portal/stream báo có thay đổi rồi ta gọi lại /api/portal/messages — tránh hiển thị lặp
        // (endpoint stream chỉ báo tín hiệu, không phân biệt tin đó do chính tab này vừa gửi hay không).
        const ownPendingContents = [];
        async function postPortalMessage(content, senderType) {
            if (!currentCustomerId) return { success: false };
            ownPendingContents.push(content);
            try {
                const res = await fetch('/api/portal/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: currentCustomerId, content, sender_type: senderType })
                });
                const json = await res.json();
                if (!json.success) {
                    console.error('Lỗi lưu tin nhắn:', json.message);
                    const idx = ownPendingContents.indexOf(content);
                    if (idx !== -1) ownPendingContents.splice(idx, 1);
                }
                return json;
            } catch (e) {
                console.error('Lỗi lưu tin nhắn:', e);
                const idx = ownPendingContents.indexOf(content);
                if (idx !== -1) ownPendingContents.splice(idx, 1);
                return { success: false };
            }
        }

        // Render 1 message doc từ backend ra chatBox (dùng chung cho loadHistory và cập nhật SSE)
        function renderStoredMessage(msg) {
            const senderType = (msg.sender_type === 'customer') ? 'user' : 'ai';
            const imgMatch = msg.content.match(/^\[IMG\](https?:\/\/\S+)/);
            const gifMatch = msg.content.match(/^\[GIF\](https?:\/\/\S+)/);
            if (imgMatch) {
                appendMessage(senderType, '', msg.created_at, imgMatch[1], false);
            } else if (gifMatch) {
                appendMessage(senderType, '', msg.created_at, gifMatch[1], true);
            } else {
                appendMessage(senderType, msg.content, msg.created_at);
            }
        }

        // Reset follow-up timer
        function resetFollowUpTimer() {
            if (followUpTimer) clearTimeout(followUpTimer);
            if (!needHumanFlag && currentCustomerId && isWaitingForReply) {
                followUpTimer = setTimeout(async () => {
                    if (!needHumanFlag && isWaitingForReply && currentCustomerId) {
                        const followUpMsg = "Dạ anh/chị có đang online đó không ạ? Lăn tăn gì cứ nhắn em nhé.";
                        const chunks = splitMessage(followUpMsg, 120);
                        await sendMultipleMessages(chunks);
                        await postPortalMessage(followUpMsg, 'ai');
                        isWaitingForReply = false;
                    }
                }, 30000);
            }
        }

        // Hand-off detection
        function detectHandOff(userMessage) {
            const lowerMsg = userMessage.toLowerCase();
            const handOffKeywords = ['stk', 'chuyển khoản', 'ngân hàng', 'số tài khoản'];
            return handOffKeywords.some(kw => lowerMsg.includes(kw));
        }

        async function setNeedHumanFlag(customerId) {
            // GAP: không có endpoint /api/portal/* nào để set cờ need_human=true trên bot_customers
            // (route public không được phép ghi trực tiếp field này). needHumanFlag chỉ còn tồn tại
            // client-side (điều khiển việc dừng follow-up timer trong phiên hiện tại) — không còn
            // được đồng bộ lên server/CRM như trước. Không tự chế endpoint mới ở đây.
            console.warn('need_human flag chỉ set client-side — chưa có backend endpoint public để persist cho customer', customerId);
        }

        // Fake Typo (10% với câu ngắn <15 chữ)
        async function applyHumanTypo(text) {
            if (text.length > 15) return text;
            if (Math.random() > 0.1) return text;
            const words = text.split(' ');
            if (words.length === 0) return text;
            const lastWord = words[words.length - 1];
            if (lastWord.length < 3) return text;
            let wrongWord = lastWord.slice(0, -1) + 
                            (lastWord.slice(-1) === 'a' ? 'o' : 
                             lastWord.slice(-1) === 'e' ? 'u' : 
                             lastWord.slice(-1) === 'i' ? 'y' : 
                             lastWord.slice(-1) === 'n' ? 'm' : 
                             lastWord.slice(-1) + 'x');
            words[words.length - 1] = wrongWord;
            const wrongText = words.join(' ');
            // Hiển thị và lưu tin nhắn sai
            appendMessage('user', wrongText);
            await postPortalMessage(wrongText, 'customer');
            // Sau 1.5s gửi sửa
            setTimeout(async () => {
                const corrected = `*${text}*`;
                appendMessage('user', corrected);
                await postPortalMessage(corrected, 'customer');
                await processUserMessage(text, true);
            }, 1500);
            return null;
        }

        // AI Response (giả lập)
        async function getAIResponse(userMessage) {
            const lower = userMessage.toLowerCase();
            if (lower.includes('báo giá') || lower.includes('giá')) {
                return "Dạ, gói Pro của bên em là 2.5 triệu/tháng, gói Basic 800k/ tháng ạ. Anh/chị quan tâm gói nào để em tư vấn thêm nhé!";
            } else if (lower.includes('ưu đãi') || lower.includes('tri ân')) {
                return "Vâng, hiện tại bên em có ưu đãi giảm 20% cho gói Pro và tặng thêm voucher 200k ạ. Anh/chị đăng ký ngay hôm nay nha!";
            } else if (lower.includes('hỗ trợ') || lower.includes('dịch vụ')) {
                return "Dạ, em sẵn sàng hỗ trợ anh/chị. Anh/chị cần tư vấn về tính năng hay báo giá ạ?";
            } else {
                return "Dạ em cảm ơn anh/chị đã nhắn tin. Em đang kiểm tra thông tin, anh/chị vui lòng chờ em chút nhé!";
            }
        }

        // Xử lý tin nhắn user
        async function processUserMessage(userText, isTypoFixed = false) {
            if (!currentCustomerId) return;
            if (!isTypoFixed) {
                // Lưu ý: POST /api/portal/messages đã tự cập nhật last_message/last_message_time
                // của bot_customers phía server, nên KHÔNG cần thêm lời gọi update bot_customers riêng
                // (lời gọi update bot_customers trực tiếp từ client cũ đã bị xoá vì trùng lặp).
                await postPortalMessage(userText, 'customer');
            }
            if (followUpTimer) clearTimeout(followUpTimer);
            isWaitingForReply = false;

            // Hand-off
            if (detectHandOff(userText)) {
                needHumanFlag = true;
                await setNeedHumanFlag(currentCustomerId);
                const handOffMsg = "Dạ vâng, để em báo Quản lý kho lên đơn và gửi thông tin thanh toán cho mình ngay ạ. Anh/chị đợi em chút nhé!";
                const chunks = splitMessage(handOffMsg, 120);
                await sendMultipleMessages(chunks);
                await postPortalMessage(handOffMsg, 'ai');
                return;
            }

            // Gọi AI
            const aiReply = await getAIResponse(userText);
            const chunks = splitMessage(aiReply, 120);
            await sendMultipleMessages(chunks);
            await postPortalMessage(aiReply, 'ai');
            isWaitingForReply = true;
            resetFollowUpTimer();
        }

        // Gửi tin nhắn text (có typo)
        async function handleSendMessage(e) {
            e.preventDefault();
            let text = messageInput.value.trim();
            if (!text) return;
            if (!currentCustomerId) {
                showToast(t('portal_err_no_customer_id'), 'error');
                return;
            }
            messageInput.value = '';
            const finalText = await applyHumanTypo(text);
            if (finalText === null) return;
            await processUserMessage(finalText, false);
        }

        // Gửi ảnh/GIF
        async function sendMedia(file, isGif = false) {
            if (!currentCustomerId) {
                showToast(t('portal_err_no_customer'), 'error');
                return;
            }
            if (!file) return;
            try {
                const formData = new FormData();
                formData.append('customer_id', currentCustomerId);
                formData.append('file', file);
                const res = await fetch('/api/portal/upload', { method: 'POST', body: formData });
                const json = await res.json();
                if (!json.success) {
                    showToast(t('portal_err_upload'), 'error');
                    return;
                }
                const mediaUrl = json.url;
                appendMessage('user', '', null, mediaUrl, isGif);
                // Quy ước prefix [IMG]/[GIF] giống templates/chat.html để tương thích khi hiển thị lại
                const contentText = isGif ? `[GIF]${mediaUrl}` : `[IMG]${mediaUrl}`;
                await postPortalMessage(contentText, 'customer');
                await processUserMessage(`Đã gửi ${isGif ? 'GIF' : 'ảnh'}`, false);
            } catch (e) {
                showToast(t('portal_err_upload'), 'error');
            }
        }

        // Emoji picker
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.style.display = emojiPicker.style.display === 'grid' ? 'none' : 'grid';
        });
        document.addEventListener('click', () => {
            emojiPicker.style.display = 'none';
        });
        emojiPicker.querySelectorAll('span').forEach(emojiSpan => {
            emojiSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                messageInput.value += emojiSpan.innerText;
                messageInput.focus();
                emojiPicker.style.display = 'none';
            });
        });

        imageUploadBtn.addEventListener('click', () => fileImageInput.click());
        gifUploadBtn.addEventListener('click', () => fileGifInput.click());
        fileImageInput.addEventListener('change', async (e) => {
            if (e.target.files.length) await sendMedia(e.target.files[0], false);
            fileImageInput.value = '';
        });
        fileGifInput.addEventListener('change', async (e) => {
            if (e.target.files.length) await sendMedia(e.target.files[0], true);
            fileGifInput.value = '';
        });

        window.sendQuickMessage = async function(text) {
            messageInput.value = text;
            await handleSendMessage(new Event('submit'));
        };

        // ========== REALTIME (Portal) — SSE thay cho realtime channel cũ ==========
        // /api/portal/stream chỉ là tín hiệu "có gì mới", không mang dữ liệu — mỗi lần nhận
        // signal ta gọi lại /api/portal/messages rồi chỉ append phần tin nhắn mới (so với knownMessageCount).
        async function refreshFromServer() {
            if (!currentCustomerId) return;
            try {
                const res = await fetch(`/api/portal/messages?customer_id=${encodeURIComponent(currentCustomerId)}`);
                const json = await res.json();
                if (!json.success || !Array.isArray(json.data)) return;
                const newMessages = json.data.slice(knownMessageCount);
                knownMessageCount = json.data.length;
                let gotNewMsg = false;
                newMessages.forEach(msg => {
                    // Bỏ qua tin nhắn nội dung khớp với tin ta vừa optimistic-render + POST từ chính tab
                    // này (typing effect của AI giả lập / tin nhắn user vừa gõ) — tránh hiển thị lặp.
                    const pendingIdx = ownPendingContents.indexOf(msg.content);
                    if (pendingIdx !== -1) {
                        ownPendingContents.splice(pendingIdx, 1);
                        return;
                    }
                    renderStoredMessage(msg);
                    if (msg.sender_type !== 'customer') gotNewMsg = true;
                });
                if (gotNewMsg) {
                    scrollToBottom();
                    // Cập nhật lại trạng thái follow-up (vì admin/AI vừa nhắn)
                    if (followUpTimer) clearTimeout(followUpTimer);
                    isWaitingForReply = true;
                    resetFollowUpTimer();
                }
            } catch (e) {
                console.warn('Lỗi refresh tin nhắn từ SSE:', e);
            }
        }

        function subscribeToRealtime() {
            if (!currentCustomerId) return;
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            eventSource = new EventSource(`/api/portal/stream?customer_id=${encodeURIComponent(currentCustomerId)}`);
            eventSource.onmessage = () => { refreshFromServer(); };
            eventSource.onerror = (e) => { console.warn('SSE lỗi kết nối:', e); };
        }

        // ========== LOAD LỊCH SỬ ==========
        async function loadHistory() {
            if (!currentCustomerId) {
                chatBox.innerHTML = '<div class="text-center text-gray-400 py-10">' + t('portal_invalid_link') + '</div>';
                return;
            }
            chatBox.innerHTML = '<div class="flex justify-center py-10"><i class="fas fa-circle-notch fa-spin text-2xl text-cyan-400"></i><span class="ml-2 text-gray-400">' + t('portal_loading') + '</span></div>';
            let json;
            try {
                const res = await fetch(`/api/portal/messages?customer_id=${encodeURIComponent(currentCustomerId)}`);
                json = await res.json();
                if (!res.ok || !json.success) {
                    chatBox.innerHTML = '<div class="text-center text-red-400 py-10">' + t('portal_err_load_history') + '</div>';
                    return;
                }
            } catch (e) {
                chatBox.innerHTML = '<div class="text-center text-red-400 py-10">' + t('portal_err_load_history') + '</div>';
                return;
            }
            const data = json.data || [];
            chatBox.innerHTML = '';
            knownMessageCount = data.length;
            if (data.length === 0) {
                appendMessage('ai', t('portal_welcome_message'));
                isWaitingForReply = true;
                resetFollowUpTimer();
            } else {
                data.forEach(renderStoredMessage);
                const lastMsg = data[data.length-1];
                if (lastMsg && lastMsg.sender_type !== 'customer') {
                    isWaitingForReply = true;
                    resetFollowUpTimer();
                }
            }
            scrollToBottom();
            // Sau khi load xong, kích hoạt SSE
            subscribeToRealtime();
        }

        // 3D Background
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            const particlesCount = window.innerWidth < 768 ? 600 : 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 120;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.15, color: 0x06b6d4, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            scene.fog = new THREE.FogExp2(0x08061a, 0.01);
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.002;
                particles.rotation.x += 0.001;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        // Khởi động
        loadHistory();
        document.getElementById('chatForm').addEventListener('submit', handleSendMessage);
        messageInput.focus();
    </script>
