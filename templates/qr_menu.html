<!DOCTYPE html>
<html lang="{{ default_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BitPaw Menu | QR Order</title>

    <!-- Open Graph: preview khi link nay duoc share qua Zalo/iMessage. Dung branding chung
    BitPaw (giong landing.html) vi route /qr_menu hien khong truyen ten/logo rieng cua tung
    tiem -- muon hien dung ten/logo tiem thi can sua route truyen them bien do (viec khac). -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="BitPaw Menu | QR Order">
    <meta property="og:description" content="Xem menu và đặt món trực tiếp qua mã QR trên bàn.">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:image" content="{{ url_for('static', filename='cho1.jpg', _external=True) }}">
    <meta name="twitter:card" content="summary_large_image">

    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #08061a;
            color: #ffffff;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.7;
            pointer-events: none;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998;
            pointer-events: none;
            opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .glass-panel {
            background: rgba(10, 15, 37, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .glass-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            border-color: #06b6d4;
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        
        @keyframes float-logo {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float {
            animation: float-logo 4s ease-in-out infinite;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 10px; }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid #06b6d4;
            color: white;
            font-weight: bold;
            transition: 0.1s;
        }
        .qty-btn:active { transform: scale(0.9); }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 380px;
            height: 100vh;
            background: rgba(8, 6, 26, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(6, 182, 212, 0.4);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }
        .cart-sidebar.open {
            transform: translateX(0);
        }
        @media (max-width: 480px) {
            .cart-sidebar { width: 100%; }
        }
        
        .cart-item {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.1s;
        }
        .cart-item:hover { background: rgba(6,182,212,0.1); }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        @media (max-width: 640px) {
            .menu-grid { grid-template-columns: 1fr; }
        }

        /* CSKH Widget */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(6,182,212,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }
        .glass-input-sm {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }
        .glass-input-sm:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6,182,212,0.3);
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="laser-vertical"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="relative z-10 max-w-6xl mx-auto px-4 pt-5">
        <div class="glass-panel p-4 flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="relative w-12 h-12 logo-float">
                    <div class="absolute inset-0 rounded-full border-2 border-cyan-500/50 animate-ping opacity-20"></div>
                    <img src="{{ url_for('static', filename='cho1.jpg') }}" class="w-full h-full rounded-full border-2 border-cyan-400 object-cover shadow-[0_0_15px_#06b6d4]">
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">Bit<span class="text-cyan-400">Paw</span> <span class="text-gray-300 text-sm font-normal">Menu</span></h1>
                    <p class="text-[10px] text-gray-400 flex items-center gap-1"><i class="fas fa-qrcode"></i> <span id="tableLabelPrefix">Bàn</span>: <span class="text-cyan-300 font-bold" id="tableNameDisplay" data-table-id="{{ table.id }}" data-table-name="{{ table.name }}">{{ table.name }}</span></p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="cartButton" class="bg-cyan-500/20 hover:bg-cyan-500/40 text-cyan-300 border border-cyan-500/50 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 transition">
                    <i class="fas fa-shopping-cart"></i> <span data-i18n="cart_title">Giỏ hàng</span> <span id="cartBadge" class="bg-rose-500 text-white text-xs w-5 h-5 rounded-full inline-flex items-center justify-center ml-1">0</span>
                </button>
                <div class="relative">
                    <button id="langBtn" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-full text-sm font-semibold flex items-center gap-1">
                        <span id="currentLangFlag">🇻🇳</span> <span id="currentLangName">VN</span> <i class="fas fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="langDropdown" class="absolute right-0 mt-2 w-32 bg-black/80 backdrop-blur border border-white/10 rounded-xl hidden flex-col z-30">
                        <button onclick="setLanguage('vi')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 rounded-t-xl flex items-center gap-2" data-lang="vi">🇻🇳 Tiếng Việt</button>
                        <button onclick="setLanguage('en')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 flex items-center gap-2" data-lang="en">🇬🇧 English</button>
                        <button onclick="setLanguage('ko')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 flex items-center gap-2" data-lang="ko">🇰🇷 한국어</button>
                        <button onclick="setLanguage('zh')" class="lang-option text-left px-4 py-2 hover:bg-cyan-500/20 rounded-b-xl flex items-center gap-2" data-lang="zh">🇨🇳 中文</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 py-6">
        <div class="glass-panel p-5">
            <div class="mb-4 relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Tìm món..." class="w-full bg-black/50 border border-white/10 rounded-full py-3 pl-11 pr-4 text-white focus:outline-none focus:border-cyan-400">
            </div>
            <div class="menu-grid" id="menuGrid">
                <div class="col-span-full text-center py-10 text-gray-500" data-i18n="loading_menu">Đang tải thực đơn...</div>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="p-5 border-b border-white/10 flex justify-between items-center bg-black/40">
            <h2 class="text-xl font-bold text-cyan-400"><i class="fas fa-shopping-basket mr-2"></i> <span data-i18n="cart_title">Giỏ hàng</span></h2>
            <button id="closeCartBtn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="cartItemsList" class="flex-1 overflow-y-auto p-4 space-y-3">
            <div class="text-center text-gray-500 py-10" data-i18n="cart_empty">Chưa có món nào</div>
        </div>
        <div class="p-4 border-t border-white/10 bg-black/40">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-300" data-i18n="total">Tổng cộng:</span>
                <span id="cartTotal" class="text-2xl font-bold text-cyan-400">0₫</span>
            </div>
            <button id="submitOrderBtn" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 text-white font-bold py-3 rounded-xl transition shadow-lg">
                <i class="fas fa-paper-plane mr-1"></i> Gửi đơn hàng
            </button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="bg-black/70 rounded-2xl p-6 flex flex-col items-center gap-3 border border-cyan-500/30"><i class="fas fa-spinner fa-pulse text-3xl text-cyan-400"></i><span data-i18n="loading">Đang xử lý...</span></div></div>
    <div id="toast" class="toast"></div>

    <script>
        // ========== FLASK/MONGO JSON API (thay lớp gọi thẳng DB từ trình duyệt trước đây) ==========
        // Wrapper fetch dùng chung, cùng phong cách posApi() ở templates/table_order.html: set JSON
        // header, throw nếu !res.ok hoặc body.success === false để các nơi gọi chỉ cần try/catch.
        async function posApi(path, options) {
            const res = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options && options.headers) },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok || body.success === false) {
                throw new Error(body.message || body.error || `Lỗi máy chủ (${res.status})`);
            }
            return body;
        }

        // Menu đã được server lọc sẵn theo đúng table/channel_type khi render trang (route
        // /qr_menu/<identifier>) — dùng trực tiếp cho lần tải đầu tiên, không cần fetch.
        const initialMenu = {{ menu | tojson }};
        // channel_type mà server đã dùng để lọc `menu` ở trên — mọi lần refresh thủ công qua
        // /api/public/pos/products phải dùng lại đúng giá trị này để nhất quán với lần render đầu.
        const serverChannelType = {{ channel_type | tojson }};

        // State
        let tableId = null;
        let tableName = null;
        // business_id của tiệm sở hữu bàn đang được quét — dùng để chặn lộ menu/đơn hàng chéo giữa các tiệm khác nhau
        const tableBusinessId = {{ (table.business_id or '') | tojson }};

        // Load table parameters from DOM data attributes to prevent VS Code JS syntax checking errors
        const tableDisplayEl = document.getElementById('tableNameDisplay');
        if (tableDisplayEl) {
            const attrId = tableDisplayEl.getAttribute('data-table-id');
            tableId = attrId ? parseInt(attrId) : null;
            tableName = tableDisplayEl.getAttribute('data-table-name');
        }
        let products = [];
        let cart = []; // { id, name, price, quantity }
        let currentLang = 'vi';
        let currentIndustry = 'fnb';

        // Translation dictionary
        const translations = {
            vi: {
                cart_empty: "Chưa có món nào",
                total: "Tổng cộng:",
                send_order: "Gửi đơn hàng",
                added_to_cart: "Đã thêm vào giỏ",
                order_sent: "Đơn hàng đã gửi!",
                order_failed: "Gửi đơn thất bại, thử lại",
                staff_called: "Đã gọi nhân viên",
                bill_requested: "Đã yêu cầu tính tiền",
                loading: "Đang xử lý...",
                search_placeholder: "Tìm món...",
                cart_title: "Giỏ hàng",
                loading_menu: "Đang tải thực đơn...",
                loading_generic: "Đang tải...",
                menu_empty: "Chưa có món nào",
                default_category: "Món",
                menu_load_error: "Lỗi tải thực đơn: ",
                cart_empty_warning: "Giỏ hàng trống!",
                table_undetermined: "Không xác định được bàn",
                location_load_error: "Lỗi tải vị trí",
                table_not_found_error: "Không tìm thấy thông tin bàn. Vui lòng quét lại QR code.",
                label_table: "Bàn",
                label_chair: "Ghế",
                label_bed_room: "Giường/Phòng"
            },
            en: {
                cart_empty: "Cart is empty",
                total: "Total:",
                send_order: "Place order",
                added_to_cart: "Added to cart",
                order_sent: "Order sent!",
                order_failed: "Order failed, please retry",
                staff_called: "Staff called",
                bill_requested: "Bill requested",
                loading: "Processing...",
                search_placeholder: "Search dish...",
                cart_title: "Shopping Cart",
                loading_menu: "Loading menu...",
                loading_generic: "Loading...",
                menu_empty: "No dishes available",
                default_category: "Dish",
                menu_load_error: "Error loading menu: ",
                cart_empty_warning: "Your cart is empty!",
                table_undetermined: "Could not determine the table",
                location_load_error: "Error loading location",
                table_not_found_error: "Table information not found. Please scan the QR code again.",
                label_table: "Table",
                label_chair: "Chair",
                label_bed_room: "Bed/Room"
            },
            ko: {
                cart_empty: "장바구니가 비어 있습니다",
                total: "총계:",
                send_order: "주문하기",
                added_to_cart: "장바구니에 추가됨",
                order_sent: "주문이 접수되었습니다!",
                order_failed: "주문 실패, 다시 시도하세요",
                staff_called: "직원 호출됨",
                bill_requested: "계산서 요청됨",
                loading: "처리 중...",
                search_placeholder: "메뉴 검색...",
                cart_title: "장바구니",
                loading_menu: "메뉴 로딩 중...",
                loading_generic: "로딩 중...",
                menu_empty: "메뉴가 없습니다",
                default_category: "메뉴",
                menu_load_error: "메뉴 로딩 오류: ",
                cart_empty_warning: "장바구니가 비어 있습니다!",
                table_undetermined: "테이블을 확인할 수 없습니다",
                location_load_error: "위치 로딩 오류",
                table_not_found_error: "테이블 정보를 찾을 수 없습니다. QR 코드를 다시 스캔해 주세요.",
                label_table: "테이블",
                label_chair: "의자",
                label_bed_room: "침대/객실"
            },
            zh: {
                cart_empty: "购物车是空的",
                total: "总计:",
                send_order: "下订单",
                added_to_cart: "已添加到购物车",
                order_sent: "订单已发送！",
                order_failed: "订单失败，请重试",
                staff_called: "已呼叫服务员",
                bill_requested: "已请求结账",
                loading: "处理中...",
                search_placeholder: "搜索菜品...",
                cart_title: "购物车",
                loading_menu: "菜单加载中...",
                loading_generic: "加载中...",
                menu_empty: "暂无菜品",
                default_category: "菜品",
                menu_load_error: "菜单加载错误：",
                cart_empty_warning: "购物车是空的！",
                table_undetermined: "无法确定桌台",
                location_load_error: "位置加载错误",
                table_not_found_error: "未找到桌台信息。请重新扫描二维码。",
                label_table: "桌台",
                label_chair: "座椅",
                label_bed_room: "床位/房间"
            }
        };
        
        function t(key) {
            return translations[currentLang]?.[key] || translations.vi[key] || key;
        }
        
        function updateUIAfterLang() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.placeholder = t('search_placeholder');
            const submitBtn = document.getElementById('submitOrderBtn');
            if (submitBtn) submitBtn.innerHTML = `<i class="fas fa-paper-plane mr-1"></i> ${t('send_order')}`;
            updateTableLabel();
            renderCart();
        }

        // Nhãn "Bàn/Ghế/Giường/Phòng" phụ thuộc industry (không đổi khi chuyển ngôn ngữ)
        // nhưng vẫn phải dịch theo currentLang mỗi khi người dùng đổi ngôn ngữ.
        function tableLabelKey(ind) {
            if (ind === 'nail') return 'label_chair';
            if (ind === 'spa') return 'label_bed_room';
            return 'label_table';
        }
        function updateTableLabel() {
            const labelSpan = document.getElementById('tableLabelPrefix');
            if (labelSpan) labelSpan.innerText = t(tableLabelKey(currentIndustry));
        }
        
        // Helper functions
        function showToastMessage(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }
        
        // Thông tin bàn (id/name) do Flask render sẵn vào data-attribute của #tableNameDisplay —
        // route /qr_menu/<identifier> đã xác thực bàn tồn tại trước khi render trang (404 nếu
        // không), nên không còn cần tự query lại 'dining_tables' phía client nữa.
        async function loadTableInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const ind = urlParams.get('industry') || 'fnb';
            currentIndustry = ind;
            updateTableLabel();

            if (tableId && tableName) {
                const nameSpan = document.getElementById('tableNameDisplay');
                if (nameSpan) nameSpan.innerText = tableName;
                return true;
            }

            const nameSpan = document.getElementById('tableNameDisplay');
            if (nameSpan) nameSpan.innerText = t('location_load_error');
            return null;
        }

        // Lấy danh sách sản phẩm: lần tải đầu dùng `initialMenu` server render sẵn (đã lọc theo
        // đúng table/channel_type); các lần refresh thủ công sau đó gọi lại
        // GET /api/public/pos/products với cùng serverChannelType để luôn nhất quán với lần render đầu.
        async function loadProducts(forceRefresh = false) {
            if (!forceRefresh && Array.isArray(initialMenu)) {
                return initialMenu;
            }
            showLoading(true);
            try {
                const body = await posApi(`/api/public/pos/products?table_id=${encodeURIComponent(tableId)}&channel_type=${encodeURIComponent(serverChannelType)}`);
                showLoading(false);
                return body.data || [];
            } catch (error) {
                showToastMessage(t('menu_load_error') + error.message, true);
                showLoading(false);
                return [];
            }
        }
        
        function renderMenu(productsArray) {
            const container = document.getElementById('menuGrid');
            if (!productsArray.length) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">${t('menu_empty')}</div>`;
                return;
            }
            container.innerHTML = productsArray.map(p => `
                <div class="glass-card p-3 cursor-pointer transition" data-product-id="${p.id}" data-product-name="${escapeHtml(p.name)}" data-product-price="${p.price}" data-product-img="${p.image || ''}">
                    <div class="flex gap-3">
                        ${p.image ? `<img src="${p.image}" class="w-20 h-20 rounded-xl object-cover bg-black/30">` : `<div class="w-20 h-20 rounded-xl bg-black/30 flex items-center justify-center text-3xl">🍽️</div>`}
                        <div class="flex-1">
                            <h3 class="font-bold text-white text-base">${escapeHtml(p.name)}</h3>
                            <p class="text-xs text-gray-400">${escapeHtml(p.category) || t('default_category')}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-cyan-400 font-mono font-bold">${p.price.toLocaleString('vi-VN')}₫</span>
                                <div class="flex items-center gap-2">
                                    <button class="qty-btn-decr w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30 text-white text-sm">-</button>
                                    <span class="item-qty-display w-6 text-center text-white font-bold">1</span>
                                    <button class="qty-btn-incr w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30 text-white text-sm">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="add-to-cart-btn mt-2 w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-2 rounded-xl text-sm transition">+ ${t('added_to_cart')}</button>
                </div>
            `).join('');
            attachProductEvents();
        }
        
        function attachProductEvents() {
            // Tăng/giảm số lượng
            document.querySelectorAll('.qty-btn-decr').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.glass-card');
                    const qtySpan = card.querySelector('.item-qty-display');
                    let val = parseInt(qtySpan.innerText) || 1;
                    if (val > 1) qtySpan.innerText = val - 1;
                });
            });
            document.querySelectorAll('.qty-btn-incr').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.glass-card');
                    const qtySpan = card.querySelector('.item-qty-display');
                    let val = parseInt(qtySpan.innerText) || 1;
                    qtySpan.innerText = val + 1;
                });
            });
            // Thêm vào giỏ
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.glass-card');
                    const productId = parseInt(card.getAttribute('data-product-id'));
                    const name = card.getAttribute('data-product-name');
                    const price = parseInt(card.getAttribute('data-product-price'));
                    const qtySpan = card.querySelector('.item-qty-display');
                    const quantity = parseInt(qtySpan.innerText) || 1;
                    addToCart(productId, name, price, quantity);
                    qtySpan.innerText = '1';
                });
            });
        }
        
        function addToCart(productId, name, price, quantity) {
            const existing = cart.find(item => item.id === productId);
            if (existing) existing.quantity += quantity;
            else cart.push({ id: productId, name, price, quantity });
            renderCart();
            showToastMessage(t('added_to_cart'));
        }
        
        function renderCart() {
            const container = document.getElementById('cartItemsList');
            const totalSpan = document.getElementById('cartTotal');
            const badge = document.getElementById('cartBadge');
            let total = 0, count = 0;
            if (!cart.length) {
                container.innerHTML = `<div class="text-center text-gray-500 py-10">${t('cart_empty')}</div>`;
                totalSpan.innerText = '0₫';
                badge.innerText = '0';
                return;
            }
            let html = '';
            cart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                count += item.quantity;
                html += `
                    <div class="cart-item flex justify-between items-center p-3 rounded-xl">
                        <div class="flex-1">
                            <h4 class="font-bold text-white">${escapeHtml(item.name)}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <button class="cart-qty-down w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30" data-idx="${idx}">-</button>
                                <span class="w-6 text-center text-white">${item.quantity}</span>
                                <button class="cart-qty-up w-7 h-7 rounded-full bg-white/10 hover:bg-cyan-500/30" data-idx="${idx}">+</button>
                                <span class="ml-2 text-cyan-400 font-mono">${item.price.toLocaleString('vi-VN')}₫</span>
                            </div>
                        </div>
                        <button class="cart-remove text-rose-400 hover:text-rose-300 text-xl w-8 h-8 rounded-full flex items-center justify-center" data-idx="${idx}"><i class="fas fa-trash-alt text-sm"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html;
            totalSpan.innerText = total.toLocaleString('vi-VN') + '₫';
            badge.innerText = count;
            
            // Cart events
            document.querySelectorAll('.cart-qty-down').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    if (cart[idx].quantity > 1) cart[idx].quantity--;
                    else cart.splice(idx, 1);
                    renderCart();
                });
            });
            document.querySelectorAll('.cart-qty-up').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    cart[idx].quantity++;
                    renderCart();
                });
            });
            document.querySelectorAll('.cart-remove').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    cart.splice(idx, 1);
                    renderCart();
                });
            });
        }
        
        async function submitOrder() {
            if (cart.length === 0) {
                showToastMessage(t('cart_empty_warning'), true);
                return;
            }
            if (!tableId) {
                showToastMessage(t('table_undetermined'), true);
                return;
            }
            showLoading(true);

            // Gửi đơn hàng qua Flask API (POST /api/submit_qr_order) — route PUBLIC, tự xác
            // thực bàn theo table_id phía server, tạo đơn + phiếu bếp + cập nhật trạng thái
            // bàn, không cần session đăng nhập.
            try {
                await posApi('/api/submit_qr_order', {
                    method: 'POST',
                    body: JSON.stringify({
                        table_id: tableId,
                        items: cart,
                        total: cart.reduce((acc, item) => acc + (item.price * item.quantity), 0),
                        customer_note: ''
                    })
                });
                cart = [];
                renderCart();
                showToastMessage(t('order_sent'));
                document.getElementById('cartSidebar').classList.remove('open');
            } catch (err) {
                console.error(err);
                showToastMessage(t('order_failed'), true);
            } finally {
                showLoading(false);
            }
        }

        // Gọi nhân viên / tính tiền qua POST /api/table/notify (route PUBLIC, ghi vào
        // db.user_logs để POS/nhân viên theo dõi — thay cho insert thẳng từ trình duyệt trước đây).
        async function callService(type) {
            if (!tableId) return;
            showLoading(true);
            try {
                await posApi('/api/table/notify', {
                    method: 'POST',
                    body: JSON.stringify({
                        table_id: tableId,
                        table_name: tableName,
                        type: type === 'staff' ? 'staff' : 'bill'
                    })
                });
                showToastMessage(type === 'staff' ? t('staff_called') : t('bill_requested'));
            } catch (err) {
                console.warn(err);
                showToastMessage(type === 'staff' ? t('staff_called') : t('bill_requested')); // vẫn hiển thị mặc dù log lỗi
            } finally {
                showLoading(false);
            }
        }
        
        // Tìm kiếm sản phẩm (client-side)
        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                const cards = document.querySelectorAll('.glass-card[data-product-id]');
                cards.forEach(card => {
                    const name = card.getAttribute('data-product-name').toLowerCase();
                    card.style.display = name.includes(keyword) ? '' : 'none';
                });
            });
        }
        
        // Sidebar controls
        function initSidebar() {
            const cartButton = document.getElementById('cartButton');
            const cartSidebar = document.getElementById('cartSidebar');
            const closeCartBtn = document.getElementById('closeCartBtn');
            cartButton.addEventListener('click', () => cartSidebar.classList.add('open'));
            closeCartBtn.addEventListener('click', () => cartSidebar.classList.remove('open'));
            document.addEventListener('click', (e) => {
                if (!cartSidebar.contains(e.target) && e.target !== cartButton && !cartButton.contains(e.target)) {
                    cartSidebar.classList.remove('open');
                }
            });
            document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);
        }
        
        // FAB gọi nhân viên & tính tiền
        function initFAB() {
            const fabDiv = document.createElement('div');
            fabDiv.className = 'fixed bottom-24 right-6 z-30 flex flex-col gap-3';
            fabDiv.innerHTML = `
                <button id="callStaffBtn" class="bg-white/10 backdrop-blur border border-cyan-500/30 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg hover:scale-105 transition"><i class="fas fa-bell text-cyan-400 text-xl"></i></button>
                <button id="callBillBtn" class="bg-white/10 backdrop-blur border border-cyan-500/30 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg hover:scale-105 transition"><i class="fas fa-receipt text-cyan-400 text-xl"></i></button>
            `;
            document.body.appendChild(fabDiv);
            document.getElementById('callStaffBtn').addEventListener('click', () => callService('staff'));
            document.getElementById('callBillBtn').addEventListener('click', () => callService('bill'));
        }
        
        // Ngôn ngữ
        function initLanguage() {
            const langBtn = document.getElementById('langBtn');
            const langDropdown = document.getElementById('langDropdown');
            langBtn.addEventListener('click', () => langDropdown.classList.toggle('hidden'));
            document.addEventListener('click', (e) => {
                if (!langBtn.contains(e.target) && !langDropdown.contains(e.target)) langDropdown.classList.add('hidden');
            });
            window.setLanguage = (lang) => {
                currentLang = lang;
                const flag = lang === 'vi' ? '🇻🇳' : lang === 'en' ? '🇬🇧' : lang === 'ko' ? '🇰🇷' : '🇨🇳';
                const name = lang === 'vi' ? 'VN' : lang === 'en' ? 'EN' : lang === 'ko' ? 'KO' : 'ZH';
                document.getElementById('currentLangFlag').innerText = flag;
                document.getElementById('currentLangName').innerText = name;
                langDropdown.classList.add('hidden');
                updateUIAfterLang();
            };
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        // Khởi tạo
        async function init() {
            const tableLoaded = await loadTableInfo();
            if (!tableLoaded) {
                document.getElementById('menuGrid').innerHTML = `<div class="col-span-full text-center py-10 text-rose-400">${t('table_not_found_error')}</div>`;
                return;
            }
            const productsList = await loadProducts();
            products = productsList;
            renderMenu(products);
            initSearch();
            initSidebar();
            initFAB();
            initLanguage();
            updateUIAfterLang();
        }
        init();
        
        // 3D Background (giữ nguyên)
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 600 : 1200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x06b6d4, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            const starCount = 80;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.06, y: (Math.random() - 0.5) * 0.08 - 0.03, z: (Math.random() - 0.5) * 0.02 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.1, color: 0xffaa88, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            scene.fog = new THREE.FogExp2(0x08061a, 0.008);
            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length) {
                    mouseX = (e.touches[0].clientX - halfX) * 0.001;
                    mouseY = (e.touches[0].clientY - halfY) * 0.001;
                }
            }, { passive: true });
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();
                const hue = (t * 0.03) % 1;
                material.color.setHSL(hue, 0.8, 0.6);
                particles.rotation.y = t * 0.02;
                particles.rotation.x = t * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);
                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
