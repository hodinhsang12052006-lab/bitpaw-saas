<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Thêm Sản Phẩm Mới - BitPaw</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #08061a; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.85; pointer-events: none; }

        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.5;
            animation: scanMove 8s linear infinite;
        }
        .laser-vertical {
            position: fixed; top: 0; left: 0; width: 1px; height: 100%;
            background: linear-gradient(180deg, transparent, #06b6d4, #a855f7, transparent);
            z-index: 9998; pointer-events: none; opacity: 0.3;
            animation: laserVertical 12s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes laserVertical { 0% { left: -10%; } 50% { left: 110%; } 100% { left: -10%; } }

        .absolute-blur {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: rgba(6, 182, 212, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            pointer-events: none;
            z-index: 0;
        }

        .glass-panel { 
            background: rgba(10, 15, 37, 0.6); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(6, 182, 212, 0.1); 
        }
        
        .glass-input, .glass-select { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            transition: all 0.3s; 
            padding: 12px 16px; 
            border-radius: 12px; 
            outline: none; 
            width: 100%; 
            font-weight: 500;
            font-size: 0.9rem;
        }
        .glass-input:focus, .glass-select:focus { 
            border-color: #06b6d4; 
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); 
            background: rgba(0,0,0,0.8); 
        }
        
        .glass-select option { background-color: #0f111a; color: white; padding: 10px; }
        .glass-select optgroup { color: #06b6d4; font-weight: 900; background: #08061a; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; padding: 5px; }

        .file-label {
            cursor: pointer;
            transition: 0.2s;
        }
        .file-label:hover {
            background: rgba(6, 182, 212, 0.2);
            border-color: #06b6d4;
        }
        #imagePreview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(6,182,212,0.5);
            background: rgba(0,0,0,0.5);
        }

        @keyframes float-hologram {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 12px 12px rgba(168, 85, 247, 0.5)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 5px 5px rgba(6, 182, 212, 0.4)); }
        }
        .logo-float { animation: float-hologram 4s ease-in-out infinite; }

        /* CSKH Widget với thông tin chi tiết */
        .cskh-widget {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cskh-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .cskh-item:hover {
            background: rgba(6,182,212,0.15);
        }
        .cskh-info {
            display: flex;
            flex-direction: column;
        }
        .cskh-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        .cskh-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.5); border-radius: 10px; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="antialiased relative">
    
    <!-- <div class="scan-line"></div> -->
    <!-- <div class="laser-vertical"></div> -->
    <div class="absolute-blur"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="w-full max-w-lg mx-auto relative z-10 px-4 py-8 max-h-screen overflow-y-auto custom-scrollbar">
        
        <div class="flex flex-col items-center justify-center mb-6">
            <div class="relative w-16 h-16 flex items-center justify-center logo-float mb-3">
                <div class="absolute w-full h-full border-t-2 border-purple-500/80 rounded-full animate-spin" style="animation-duration: 3s;"></div>
                <div class="absolute w-[120%] h-[120%] border-b-2 border-cyan-400/80 rounded-full animate-spin" style="animation-duration: 4s; animation-direction: reverse;"></div>
                <img src="{{ url_for('static', filename='cho1.jpg') }}" alt="BitPaw Logo" class="relative w-12 h-12 rounded-full object-cover bg-[#08061a] border border-white/20 p-0.5 z-10">
            </div>
            <h1 class="text-2xl font-black tracking-widest text-white">Bit<span class="text-cyan-400">Paw</span></h1>
            <p class="text-xs text-gray-400 mt-1">Quản lý kho hàng thông minh</p>
        </div>

        <div class="glass-panel rounded-3xl p-6 sm:p-8">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-cyan-400 flex items-center justify-center gap-2">
                    <i class="fas fa-box-open"></i> Thêm Sản Phẩm / Món Mới
                </h2>
                <p class="text-[11px] text-gray-400 mt-1.5 font-medium uppercase tracking-widest">Cập nhật kho hàng vào hệ thống</p>
            </div>

            <form id="productForm" enctype="multipart/form-data" class="space-y-5">
                <!-- Upload ảnh có preview -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Hình ảnh (Tuỳ chọn)</label>
                    <div class="flex items-center gap-4">
                        <div class="flex-1 glass-input p-2 file-label border-dashed border-2 hover:border-cyan-400 transition-colors flex items-center gap-2">
                            <i class="fas fa-image text-gray-500"></i>
                            <span id="fileName" class="text-gray-400 text-sm">Chưa có ảnh</span>
                            <input type="file" id="imageInput" name="image" accept="image/*" class="hidden">
                        </div>
                        <div class="w-16 h-16 flex-shrink-0 bg-black/30 rounded-xl border border-white/10 flex items-center justify-center overflow-hidden">
                            <img id="imagePreview" class="w-full h-full object-cover hidden">
                            <i id="previewPlaceholder" class="fas fa-camera text-gray-500 text-2xl"></i>
                        </div>
                    </div>
                </div>

                <!-- Tên sản phẩm -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Tên Sản Phẩm / Món</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-tag text-gray-500 text-sm"></i></div>
                        <input type="text" name="name" id="productName" required placeholder="VD: Cà phê sữa đá, Áo thun..." class="glass-input pl-11">
                    </div>
                </div>
                
                <!-- Danh mục mở rộng -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Thuộc nhóm / Lĩnh vực</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-layer-group text-gray-500 text-sm"></i></div>
                        <select name="category" id="productCategory" required class="glass-select pl-11 appearance-none cursor-pointer">
                            <optgroup label="🍻 Dịch Vụ F&B">
                                <option value="Đồ Ăn">🍛 Đồ Ăn / Mồi Nhậu</option>
                                <option value="Nước Uống">🍹 Nước Uống / Cà Phê</option>
                                <option value="Bia & Rượu">🍻 Bia & Rượu</option>
                            </optgroup>
                            <optgroup label="🛍️ Bán Lẻ">
                                <option value="Thời Trang">👗 Thời Trang & Phụ Kiện</option>
                                <option value="Mỹ Phẩm">💄 Mỹ Phẩm & Làm Đẹp</option>
                                <option value="Đồ Gia Dụng">🏠 Đồ Gia Dụng</option>
                            </optgroup>
                            <optgroup label="💆 Spa & Làm Đẹp">
                                <option value="Spa">💆 Dịch vụ Spa</option>
                                <option value="Mỹ Phẩm Cao Cấp">✨ Mỹ phẩm cao cấp</option>
                            </optgroup>
                            <optgroup label="🎤 Karaoke & Giải Trí">
                                <option value="Dịch Vụ Karaoke">🎤 Karaoke</option>
                                <option value="Bida">🎱 Bida</option>
                            </optgroup>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><i class="fas fa-chevron-down text-cyan-500 text-xs"></i></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Tồn kho</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-boxes text-gray-500 text-sm"></i></div>
                            <input type="number" name="stock" id="productStock" required value="999" min="0" class="glass-input pl-11 font-mono text-cyan-300">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Giá bán (VNĐ)</label>
                        <div class="relative">
                            <input type="text" id="priceDisplay" placeholder="0" class="glass-input pr-8 font-mono text-emerald-400 text-right">
                            <input type="hidden" name="price" id="priceHidden">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"><span class="text-gray-500 text-sm font-bold">₫</span></div>
                        </div>
                    </div>
                </div>

                <div class="pt-4 space-y-3">
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)] hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <i class="fas fa-check-circle"></i> Thêm Vào Hệ Thống
                    </button>
                    
                    <a href="javascript:history.back()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-rose-400 hover:text-rose-300 font-semibold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-times"></i> Hủy Bỏ
                    </a>
                </div>
            </form>
        </div>

    </div>

    <div id="toast" class="toast">Thông báo</div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // ========== SUPABASE CONFIG ==========
        const supabaseUrl = 'https://iojtglaxgdwsxxalhubx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvanRnbGF4Z2R3c3h4YWxodWJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjgzNTIsImV4cCI6MjA5MzE0NDM1Mn0.KA7wdsZsK3oA6ybi5Gl_KnkzAKZM-ESI3Eyzx-mipwM';
        const supabase = createClient(supabaseUrl, supabaseKey);
        const STORAGE_BUCKET = 'product_images';

        // DOM elements
        const imageInput = document.getElementById('imageInput');
        const previewImg = document.getElementById('imagePreview');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const fileNameSpan = document.getElementById('fileName');
        const priceDisplay = document.getElementById('priceDisplay');
        const priceHidden = document.getElementById('priceHidden');
        const form = document.getElementById('productForm');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        // ========== Preview ảnh ==========
        imageInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                fileNameSpan.innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    previewPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            } else {
                fileNameSpan.innerText = 'Chưa có ảnh';
                previewImg.classList.add('hidden');
                previewPlaceholder.classList.remove('hidden');
                previewImg.src = '';
            }
        });
        document.querySelector('.file-label').addEventListener('click', () => imageInput.click());

        // ========== Format giá tiền ==========
        function formatPriceInput(e) {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value === '') value = '0';
            let intValue = parseInt(value, 10);
            e.target.value = intValue.toLocaleString('vi-VN');
            priceHidden.value = intValue;
        }
        priceDisplay.addEventListener('input', formatPriceInput);

        // ========== Toast ==========
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.borderColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== Upload ảnh lên Supabase Storage ==========
        async function uploadImage(file) {
            if (!file) return null;
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            const filePath = `products/${fileName}`;
            const { data, error } = await supabase.storage
                .from(STORAGE_BUCKET)
                .upload(filePath, file, {
                    cacheControl: '3600',
                    upsert: false
                });
            if (error) {
                console.error('Upload error:', error);
                showToast('Lỗi upload ảnh: ' + error.message, true);
                return null;
            }
            const { data: publicUrl } = supabase.storage
                .from(STORAGE_BUCKET)
                .getPublicUrl(filePath);
            return publicUrl.publicUrl;
        }

        // ========== Submit form: lưu vào Supabase ==========
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('productName').value.trim();
            if (!name) {
                showToast('Vui lòng nhập tên sản phẩm', true);
                return;
            }
            const priceVal = priceHidden.value;
            if (!priceVal || parseInt(priceVal) <= 0) {
                showToast('Vui lòng nhập giá bán hợp lệ', true);
                return;
            }
            const stock = document.getElementById('productStock').value;
            if (stock === '' || parseInt(stock) < 0) {
                showToast('Vui lòng nhập tồn kho hợp lệ', true);
                return;
            }
            const category = document.getElementById('productCategory').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            
            let imageUrl = null;
            if (imageInput.files.length > 0) {
                imageUrl = await uploadImage(imageInput.files[0]);
                if (!imageUrl && imageInput.files[0]) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Thêm Vào Hệ Thống';
                    return;
                }
            }
            
            try {
                const { data, error } = await supabase
                    .from('products')
                    .insert([{
                        name: name,
                        category: category,
                        channel_type: 'retail',
                        stock: parseInt(stock),
                        price: parseFloat(priceVal),
                        image: imageUrl,
                        is_active: true,
                        created_at: new Date().toISOString()
                    }]);
                if (error) throw error;
                showToast('✅ Thêm sản phẩm thành công!');
                setTimeout(() => {
                    window.location.href = "{{ url_for('index') }}";
                }, 1500);
            } catch (err) {
                console.error(err);
                showToast('❌ Lỗi: ' + err.message, true);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Thêm Vào Hệ Thống';
            }
        });

        // ========== 3D Background (giữ nguyên) ==========
        (function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const isMobile = window.innerWidth < 768;
            const particlesCount = isMobile ? 500 : 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) positions[i] = (Math.random() - 0.5) * 140;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({ size: isMobile ? 0.14 : 0.2, color: 0x06b6d4, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const starCount = 80;
            const starPositions = new Float32Array(starCount * 3);
            const starVelocities = [];
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 120;
                starPositions[i*3+1] = (Math.random() - 0.5) * 70;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
                starVelocities.push({ x: (Math.random() - 0.5) * 0.07, y: (Math.random() - 0.5) * 0.1 - 0.04, z: (Math.random() - 0.5) * 0.03 });
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.09, color: 0xffaa88, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            scene.fog = new THREE.FogExp2(0x08061a, 0.008);

            let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
            const halfX = window.innerWidth / 2, halfY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - halfX) * 0.0005;
                mouseY = (e.clientY - halfY) * 0.0005;
            });

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();
                material.color.setHSL((t * 0.02) % 0.1 + 0.5, 0.8, 0.6);
                particles.rotation.y = t * 0.03;
                particles.rotation.x = t * 0.01;
                targetX = mouseX * 0.5;
                targetY = mouseY * 0.5;
                particles.rotation.y += 0.5 * (targetX - particles.rotation.y);
                particles.rotation.x += 0.5 * (targetY - particles.rotation.x);

                const posArr = stars.geometry.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    posArr[i*3] += starVelocities[i].x;
                    posArr[i*3+1] += starVelocities[i].y;
                    posArr[i*3+2] += starVelocities[i].z;
                    if (Math.abs(posArr[i*3]) > 70 || Math.abs(posArr[i*3+1]) > 45) {
                        posArr[i*3] = (Math.random() - 0.5) * 120;
                        posArr[i*3+1] = 40;
                        posArr[i*3+2] = (Math.random() - 0.5) * 50 - 25;
                    }
                }
                stars.geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
