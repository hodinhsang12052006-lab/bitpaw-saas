<!-- =============================================================================
     COMPONENT: Mobile Bottom Tab Bar + Solutions Bottom Sheet (DRY, shared)
     CSS: static/css/bp_mobile_ui.css | JS: static/js/bp_mobile_ui.js
     (trang gọi include này phải tự link 2 file đó — xem hướng dẫn tích hợp)

     YÊU CẦU ở trang chủ (host template) trước khi include:
       - Đã có <div id="mobile-menu">...</div> (drawer menu cũ) — tab "More"
         bên dưới GỌI LẠI toggleMobileMenu() có sẵn để mở đúng nó, không tạo
         menu trùng lặp lần 2.
       - Nút hamburger cũ có id="hamburgerBtn" (bị ẩn ở mobile bởi CSS module).

     THAM SỐ tuỳ chỉnh (đặt bằng lệnh Jinja "set" TRƯỚC dòng include, bỏ qua =
     dùng mặc định của trang landing chính):
       - pricing_anchor: id (KHÔNG có dấu #) của section bảng giá cần cuộn tới
         khi bấm tab "Pricing". Mặc định "bang-gia".
     ============================================================================= -->
