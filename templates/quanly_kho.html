<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Kho Vật Tư | BitPaw Enterprise</title>
    
    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Supabase & ThreeJS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="{{ url_for('static', filename='js/tenant_supabase_client.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background-color: #050510; color: white; overflow: hidden; }
        
        /* 3D Background Canvas */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.9; }

        /* Glass Panels */
        .glass-panel { background: rgba(10, 15, 37, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .glass-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; padding: 12px 15px; border-radius: 12px; outline: none; width: 100%; font-weight: 500; font-size: 14px;}
        .glass-input:focus { border-color: #10b981; box-shadow: 0 0 15px rgba(16,185,129,0.3); background: rgba(0,0,0,0.8); }

        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; } 
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.3); border-radius: 10px; }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .stock-critical { color: #f43f5e; font-weight: 900; animation: blink 1s infinite; text-shadow: 0 0 10px rgba(244,63,94,0.5); }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* Tab Filter Styles */
        .filter-btn.active { background-color: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #34d399; box-shadow: inset 0 0 10px rgba(16,185,129,0.2); }
        
        .text-glow-emerald { text-shadow: 0 0 10px rgba(16,185,129,0.5); }
    </style>
</head>
<body class="p-6 md:p-10 h-screen flex flex-col relative overflow-hidden antialiased">

    <!-- 3D Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 shrink-0 relative z-10 glass-panel p-5 px-8 rounded-3xl border-t-2 border-t-emerald-500/50 shadow-2xl gap-5">
        <div>
            <h2 class="text-3xl lg:text-4xl font-black text-white flex items-center gap-3 tracking-wide drop-shadow-md">
                <i class="fas fa-boxes text-emerald-400 text-glow-emerald"></i> Trạm <span class="text-emerald-400">Quản Lý Kho</span>
            </h2>
            <p class="text-gray-400 text-xs mt-2 font-bold uppercase tracking-widest"><span class="w-2 h-2 rounded-full bg-emerald-500 inline-block animate-pulse mr-1 shadow-[0_0_8px_#10b981]"></span> Giám sát vật tư & Tự động trừ kho từ Radar Điều Phối</p>
        </div>
        <div class="flex flex-wrap gap-4 items-center w-full md:w-auto">
            <a href="{{ url_for('chamcong_industry', industry_code='kythuat') }}" class="flex-1 md:flex-none bg-yellow-500/10 border border-yellow-500/30 hover:bg-yellow-500/20 px-6 py-3.5 rounded-xl transition-all font-black text-yellow-400 flex items-center justify-center gap-2 uppercase tracking-widest text-xs shadow-inner"><i class="fas fa-tools text-base"></i> Điều Phối Kỹ Thuật</a>
            <a href="/dashboard" class="flex-1 md:flex-none bg-white/5 border border-white/10 hover:bg-white/10 px-6 py-3.5 rounded-xl transition-all font-bold text-gray-300 hover:text-white flex items-center justify-center gap-2 uppercase tracking-widest text-xs backdrop-blur-md"><i class="fas fa-home text-base"></i> Trở về</a>
        </div>
    </div>

    <!-- MAIN BODY -->
    <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 min-h-0 relative z-10">
        
        <!-- CỘT TRÁI: FORM NHẬP / SỬA -->
        <div class="lg:col-span-4 glass-panel border-t border-white/10 rounded-3xl p-8 flex flex-col shadow-[0_0_40px_rgba(0,0,0,0.5)] h-fit relative overflow-hidden">
            <!-- Decoration -->
            <div class="absolute -right-10 -bottom-10 text-9xl text-white/5 pointer-events-none transform -rotate-12"><i class="fas fa-box-open"></i></div>

            <h3 class="font-black text-emerald-400 mb-6 border-b border-white/10 pb-4 uppercase tracking-widest text-sm flex items-center gap-2 relative z-10">
                <i class="fas fa-plus-circle text-glow-emerald text-lg"></i> Nhập / Sửa Vật Tư
            </h3>
            
            <form id="formNhapKho" class="space-y-5 relative z-10">
                <input type="hidden" id="edit_id">
                
                <div>
                    <label class="block text-gray-400 text-[10px] font-black mb-2 uppercase tracking-widest ml-1">Tên Vật Tư / Thiết Bị</label>
                    <input type="text" id="ten_vat_tu" required class="glass-input" placeholder="VD: Gas R32, Ống đồng 6mm...">
                </div>
                
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-gray-400 text-[10px] font-black mb-2 uppercase tracking-widest ml-1">Số Lượng Tồn</label>
                        <input type="number" id="ton_kho" required class="glass-input text-emerald-400 font-mono text-xl font-black text-center shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)] bg-emerald-900/10 border-emerald-500/30 focus:border-emerald-500" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-[10px] font-black mb-2 uppercase tracking-widest ml-1">Đơn Vị Tính</label>
                        <input type="text" id="don_vi" required class="glass-input text-cyan-400 font-bold text-center" placeholder="Cái, Bình, Mét...">
                    </div>
                </div>
                
                <div class="pt-4 border-t border-white/10 mt-2">
                    <button type="submit" id="btnLuu" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-4 rounded-xl transition-transform hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(16,185,129,0.4)] flex justify-center items-center gap-2 uppercase tracking-widest text-sm border border-emerald-400/50">
                        <i class="fas fa-box-open text-lg"></i> Lưu Vào Kho
                    </button>
                    
                    <button type="button" onclick="resetForm()" id="btnHuy" class="w-full bg-white/5 hover:bg-white/10 text-gray-300 font-bold py-3.5 rounded-xl transition-all hidden uppercase tracking-widest text-xs mt-3 border border-white/10 shadow-sm">
                        Hủy Cập Nhật
                    </button>
                </div>
            </form>
        </div>

        <!-- CỘT PHẢI: BẢNG KHO -->
        <div class="lg:col-span-8 glass-panel border-t border-white/10 rounded-3xl p-6 md:p-8 flex flex-col min-h-0 shadow-[0_0_40px_rgba(0,0,0,0.5)]">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 shrink-0 gap-4 border-b border-white/10 pb-5">
                <h3 class="font-black text-gray-300 text-sm uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-list text-cyan-400"></i> Tồn Kho Hiện Tại
                </h3>
                
                <div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
                    <div class="relative w-full md:w-auto">
                        <input type="text" id="searchKho" onkeyup="renderKho()" placeholder="Tìm kiếm vật tư..." class="glass-input pl-10 py-2.5 text-sm md:w-56 font-normal">
                        <i class="fas fa-search absolute left-4 top-3 text-cyan-500/70"></i>
                    </div>
                    <button onclick="exportToCSV()" class="flex-1 md:flex-none bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white border border-blue-500/50 px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-colors flex items-center justify-center gap-2 shadow-inner">
                        <i class="fas fa-file-excel text-base"></i> Xuất CSV
                    </button>
                </div>
            </div>

            <!-- Tabs Bộ Lọc -->
            <div class="flex gap-3 mb-5 shrink-0 bg-black/40 p-2 rounded-2xl border border-white/5 w-fit shadow-inner">
                <button onclick="setFilter('all', this)" class="filter-btn active border border-transparent text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                    Tất cả (<span id="count_all">0</span>)
                </button>
                <button onclick="setFilter('critical', this)" class="filter-btn border border-transparent text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                    <i class="fas fa-exclamation-triangle text-rose-500 mr-1"></i> Sắp hết (<span id="count_critical">0</span>)
                </button>
                <button onclick="setFilter('instock', this)" class="filter-btn border border-transparent text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                    Còn hàng (<span id="count_instock">0</span>)
                </button>
            </div>

            <div class="flex-1 overflow-x-auto overflow-y-auto custom-scrollbar pr-2">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="sticky top-0 bg-black/80 backdrop-blur-xl z-20 shadow-md">
                        <tr class="text-[10px] font-black uppercase tracking-widest text-gray-400 border-b border-emerald-500/30">
                            <th class="py-4 px-4 border-r border-white/5 w-96">Tên Vật Tư</th>
                            <th class="py-4 px-4 text-center border-r border-white/5 w-32">Tồn Kho</th>
                            <th class="py-4 px-4 text-center border-r border-white/5 w-32">ĐVT</th>
                            <th class="py-4 px-4 text-center w-36">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="tableKho" class="text-sm">
                        <tr><td colspan="4" class="text-center py-20 text-emerald-500 font-bold uppercase tracking-widest animate-pulse"><i class="fas fa-network-wired text-4xl mb-4 block"></i> Đang kiểm kê kho...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- SCRIPT GỐC CỦA SẾP (GIỮ NGUYÊN 100%) -->
    <script>
        // ========================================================
        // 🌌 BACKGROUND 3D HẠT (THREE.JS) CHUẨN KHO
        // ========================================================
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene(); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000); 
        camera.position.z = 30;
        
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true }); 
        renderer.setSize(window.innerWidth, window.innerHeight); 
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        const particlesGeometry = new THREE.BufferGeometry(); 
        const particlesCount = window.innerWidth < 768 ? 600 : 1500; 
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 120; }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        // Hạt màu Xanh Ngọc (Emerald) chuẩn Quản Lý Kho
        const material = new THREE.PointsMaterial({ size: 0.15, color: 0x10b981, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const particlesMesh = new THREE.Points(particlesGeometry, material); 
        scene.add(particlesMesh);
        
        let mouseX = 0; let mouseY = 0; let targetX = 0; let targetY = 0; 
        const windowHalfX = window.innerWidth / 2; const windowHalfY = window.innerHeight / 2;
        
        if (window.innerWidth >= 768) { 
            document.addEventListener('mousemove', (event) => { 
                mouseX = (event.clientX - windowHalfX) * 0.0005; 
                mouseY = (event.clientY - windowHalfY) * 0.0005; 
            }); 
        }
        
        const clock = new THREE.Clock();
        function animateBg() {
            requestAnimationFrame(animateBg); const elapsedTime = clock.getElapsedTime();
            particlesMesh.rotation.y = elapsedTime * 0.02; particlesMesh.rotation.x = elapsedTime * 0.01;
            
            if (window.innerWidth >= 768) { 
                targetX = mouseX * 0.5; targetY = mouseY * 0.5; 
                particlesMesh.rotation.y += 0.5 * (targetX - particlesMesh.rotation.y); 
                particlesMesh.rotation.x += 0.5 * (targetY - particlesMesh.rotation.x); 
            }
            renderer.render(scene, camera);
        }
        animateBg();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

        // ========================================================
        // 🚀 LOGIC CŨ CỦA SẾP (GIỮ NGUYÊN 100%)
        // ========================================================
        const supabaseUrl = 'https://iojtglaxgdwsxxalhubx.supabase.co';
        var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvanRnbGF4Z2R3c3h4YWxodWJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjgzNTIsImV4cCI6MjA5MzE0NDM1Mn0.KA7wdsZsK3oA6ybi5Gl_KnkzAKZM-ESI3Eyzx-mipwM';
        var supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        // Nâng cấp lên client có JWT business_id để RLS lọc đúng tenant.
        var supabaseReady = createTenantSupabaseClient(supabaseUrl, supabaseKey).then(function(c) { supabase = c; return c; });

        let khoData = [];
        let currentFilter = 'all'; // all | critical | instock

        // 1. TẢI DỮ LIỆU KHO
        async function loadDataKho() {
            try {
                const { data, error } = await supabase.from('kho_vat_tu').select('*').order('id', { ascending: false });
                if (error) throw error;
                khoData = data || [];
                
                // Cập nhật số lượng trên các nút Filter
                document.getElementById('count_all').innerText = khoData.length;
                document.getElementById('count_critical').innerText = khoData.filter(i => i.ton_kho <= 2).length;
                document.getElementById('count_instock').innerText = khoData.filter(i => i.ton_kho > 2).length;

                renderKho();
            } catch(e) {
                document.getElementById('tableKho').innerHTML = '<tr><td colspan="4" class="text-center py-10 text-rose-500 font-bold uppercase tracking-widest text-xs">Lỗi kết nối máy chủ! (Chưa tạo bảng kho_vat_tu)</td></tr>';
            }
        }

        // 2. HÀM CHUYỂN ĐỔI BỘ LỌC
        function setFilter(type, btnElement) {
            currentFilter = type;
            
            // Đổi style các nút
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-emerald-500/20', 'border-emerald-500', 'text-emerald-400');
            });
            btnElement.classList.add('active');

            renderKho();
        }

        // 3. HIỂN THỊ LÊN BẢNG (KẾT HỢP TÌM KIẾM & LỌC)
        function renderKho() {
            const query = document.getElementById('searchKho').value.toLowerCase();
            const tbody = document.getElementById('tableKho');
            tbody.innerHTML = '';

            // Lọc theo Text Search và Tình trạng kho
            const filteredData = khoData.filter(item => {
                const matchSearch = item.ten_vat_tu.toLowerCase().includes(query);
                let matchFilter = true;
                if (currentFilter === 'critical') matchFilter = item.ton_kho <= 2;
                if (currentFilter === 'instock') matchFilter = item.ton_kho > 2;
                
                return matchSearch && matchFilter;
            });

            if(filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-gray-500 font-bold uppercase tracking-widest text-xs italic">Kho đang trống hoặc không tìm thấy.</td></tr>';
                return;
            }

            filteredData.forEach(item => {
                const isCritical = item.ton_kho <= 2;
                const stockClass = isCritical ? 'stock-critical' : 'text-emerald-400 font-bold';
                
                tbody.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/[0.05] transition-colors group bg-black/20 backdrop-blur-sm">
                        <td class="py-4 px-4 font-black text-white tracking-wide border-r border-white/5">${item.ten_vat_tu}</td>
                        <td class="py-4 px-4 text-center text-xl font-mono ${stockClass} border-r border-white/5 shadow-inner">
                            ${item.ton_kho} 
                            ${isCritical ? '<i class="fas fa-exclamation-triangle text-sm text-rose-500 ml-1 drop-shadow-md animate-pulse" title="Sắp hết hàng!"></i>' : ''}
                        </td>
                        <td class="py-4 px-4 text-center text-cyan-400 text-xs font-black uppercase tracking-widest border-r border-white/5">${item.don_vi}</td>
                        <td class="py-4 px-4 text-center">
                            <button onclick="editItem(${item.id})" class="text-blue-400 hover:text-white w-10 h-10 rounded-xl bg-blue-500/10 hover:bg-blue-500 transition-colors shadow-sm border border-blue-500/30" title="Sửa"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${item.id})" class="text-rose-400 hover:text-white w-10 h-10 rounded-xl bg-rose-500/10 hover:bg-rose-500 transition-colors ml-2 shadow-sm border border-rose-500/30" title="Xóa"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // 4. THÊM / SỬA VẬT TƯ
        document.getElementById('formNhapKho').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const ten = document.getElementById('ten_vat_tu').value.trim();
            const ton = parseInt(document.getElementById('ton_kho').value) || 0;
            const dv = document.getElementById('don_vi').value.trim();

            const btn = document.getElementById('btnLuu');
            const originalClasses = btn.className; // Lưu lại class để revert nếu cần
            btn.innerHTML = '<i class="fas fa-spinner fa-spin text-lg"></i> ĐANG XỬ LÝ...'; btn.disabled = true;

            try {
                if (id) {
                    await supabase.from('kho_vat_tu').update({ ten_vat_tu: ten, ton_kho: ton, don_vi: dv }).eq('id', id);
                } else {
                    await supabase.from('kho_vat_tu').insert([{ ten_vat_tu: ten, ton_kho: ton, don_vi: dv }]);
                }
                resetForm();
                loadDataKho();
            } catch(e) { alert("Lỗi lưu trữ!"); }
            
            // Xử lý nút quay về gốc vì resetForm đã gọi nhưng có thể không clear hết disabled
            btn.innerHTML = '<i class="fas fa-box-open text-lg"></i> Lưu Vào Kho'; 
            btn.disabled = false;
        });

        // 5. CÁC HÀM PHỤ TRỢ (Sửa, Xóa, Reset)
        function editItem(id) {
            const item = khoData.find(i => i.id == id);
            if(!item) return;
            
            document.getElementById('edit_id').value = item.id;
            document.getElementById('ten_vat_tu').value = item.ten_vat_tu;
            document.getElementById('ton_kho').value = item.ton_kho;
            document.getElementById('don_vi').value = item.don_vi;

            const btn = document.getElementById('btnLuu');
            btn.innerHTML = '<i class="fas fa-save text-lg"></i> CẬP NHẬT KHO';
            btn.classList.replace('bg-emerald-500', 'bg-blue-500');
            btn.classList.replace('hover:bg-emerald-400', 'hover:bg-blue-400');
            btn.classList.replace('border-emerald-400/50', 'border-blue-400/50');
            btn.classList.replace('shadow-[0_0_20px_rgba(16,185,129,0.4)]', 'shadow-[0_0_20px_rgba(59,130,246,0.4)]');
            
            document.getElementById('btnHuy').classList.remove('hidden');
        }

        async function deleteItem(id) {
            if(confirm("Sếp có chắc muốn xóa vật tư này khỏi kho?")) {
                await supabase.from('kho_vat_tu').delete().eq('id', id);
                loadDataKho();
            }
        }

        function resetForm() {
            document.getElementById('edit_id').value = '';
            document.getElementById('formNhapKho').reset();
            
            const btn = document.getElementById('btnLuu');
            btn.innerHTML = '<i class="fas fa-box-open text-lg"></i> Lưu Vào Kho';
            btn.classList.replace('bg-blue-500', 'bg-emerald-500');
            btn.classList.replace('hover:bg-blue-400', 'hover:bg-emerald-400');
            btn.classList.replace('border-blue-400/50', 'border-emerald-400/50');
            btn.classList.replace('shadow-[0_0_20px_rgba(59,130,246,0.4)]', 'shadow-[0_0_20px_rgba(16,185,129,0.4)]');
            
            document.getElementById('btnHuy').classList.add('hidden');
        }

        // 🚀 TÍNH NĂNG MỚI: XUẤT FILE CSV CHO KẾ TOÁN
        function exportToCSV() {
            if(khoData.length === 0) return alert("Kho đang trống, không có gì để xuất!");
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // Ký tự \uFEFF giúp Excel đọc được Tiếng Việt có dấu
            csvContent += "ID,Tên Vật Tư,Tồn Kho,Đơn Vị Tính\r\n"; // Tiêu đề cột

            khoData.forEach(function(row) {
                // Thoát các ký tự phẩy trong chuỗi để tránh lỗi CSV
                let rowData = [
                    row.id, 
                    `"${row.ten_vat_tu}"`, 
                    row.ton_kho, 
                    `"${row.don_vi}"`
                ];
                csvContent += rowData.join(",") + "\r\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            const today = new Date().toLocaleDateString('vi-VN').replace(/\//g, '-');
            
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Bao_Cao_Kho_${today}.csv`);
            document.body.appendChild(link); // Required for FF
            link.click();
            document.body.removeChild(link);
        }

        supabaseReady.then(function() {
            // LẮNG NGHE REALTIME: Kho nhảy số tự động khi bên Kỹ Thuật rút đồ!
            supabase.channel('kho_tracking')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'kho_vat_tu' }, () => { loadDataKho(); })
                .subscribe();

            loadDataKho();
        });
    </script>
</body>
</html>
