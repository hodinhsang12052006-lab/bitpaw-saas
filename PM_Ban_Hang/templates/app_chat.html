<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08061a">

    <title>Chat Nội Bộ | BitPaw OS</title>

    <link href="{{ url_for('static', filename='css/tailwind.output.css') }}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        body {
            background-color: #08061a;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        .mobile-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }

        /* 3D Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.8;
            pointer-events: none;
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(10, 15, 37, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-header {
            background: rgba(10, 15, 37, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Chat Bubbles */
        .chat-bubble-me {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 5px 15px rgba(6, 182, 212, 0.2);
        }

        .chat-bubble-other {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Chuyển trang mượt mà */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 10;
        }

        .screen.active {
            display: flex;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(30px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Ẩn input file camera & thanh cuộn */
        #cameraInput {
            display: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-black">

                    <button onclick="window.history.back()"

                        class="flex items-center gap-4 p-4 rounded-3xl bg-gradient-to-r from-cyan-900/40 to-blue-900/20 border border-cyan-500/30 cursor-pointer active:scale-95 transition-all hover:border-cyan-400 shadow-[0_5px_20px_rgba(6,182,212,0.15)]">
                        <div

        <div id="screen_chat" class="screen">

                <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="uploadImage(this)">

    </div>

    <script>
        // ========================================================
        // 🚀 UI/UX SYSTEM (TOAST & LIGHTBOX)
        // ========================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            let colorClass = 'cyan'; let iconClass = 'fa-info-circle';
            if (type === 'success') { colorClass = 'emerald'; iconClass = 'fa-check-circle'; }
            if (type === 'error') { colorClass = 'rose'; iconClass = 'fa-exclamation-triangle'; }
            if (type === 'warning') { colorClass = 'amber'; iconClass = 'fa-exclamation-circle'; }

            toast.className = `bg-[#0a0f25]/95 backdrop-blur-xl border border-${colorClass}-500/50 text-white px-4 py-3.5 rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.5)] flex items-center gap-3 transform -translate-y-full opacity-0 transition-all duration-300 w-full`;
            toast.innerHTML = `<i class="fas ${iconClass} text-${colorClass}-400 text-xl shrink-0 drop-shadow-[0_0_5px_currentColor]"></i> <span class="text-[13px] font-medium leading-relaxed">${message}</span>`;

            container.appendChild(toast);

            // Animate in
            setTimeout(() => { toast.classList.remove('-translate-y-full', 'opacity-0'); toast.classList.add('translate-y-2'); }, 10);

            // Auto remove
            setTimeout(() => {
                toast.classList.remove('translate-y-2'); toast.classList.add('-translate-y-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function openLightbox(imgSrc) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = imgSrc;

            lightbox.classList.remove('hidden'); lightbox.classList.add('flex');
            setTimeout(() => { lightbox.classList.remove('opacity-0'); img.classList.remove('scale-95'); }, 10);
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');

            lightbox.classList.add('opacity-0'); img.classList.add('scale-95');
            setTimeout(() => { lightbox.classList.add('hidden'); lightbox.classList.remove('flex'); img.src = ''; }, 300);
        }

        // Khởi tạo nền 3D
        function init3DBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 600;
            const posArray = new Float32Array(particlesCount * 3);
            for (let i = 0; i < particlesCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 100; }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const material = new THREE.PointsMaterial({ size: 0.15, color: 0x06b6d4, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particlesMesh = new THREE.Points(particlesGeometry, material);
            scene.add(particlesMesh);

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();
                particlesMesh.rotation.y = elapsedTime * 0.05;
                particlesMesh.rotation.x = elapsedTime * 0.02;
                renderer.render(scene, camera);
            }
            animate();
        }

        // ========================================================
        // 🚀 CẤU HÌNH SUPABASE & DỮ LIỆU USER LOCAL
        // ========================================================
        const supabaseUrl = 'https://iojtglaxgdwsxxalhubx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmdHJkbmdhaGRqcG5pbmptemhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDIyODQsImV4cCI6MjA5Mjg3ODI4NH0.TX0f_pbiqSiF39ISt9z_flvyRVxNc730By87Zae2uRc';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const myId = localStorage.getItem('bp_emp_code') || "GUEST";
        const myName = localStorage.getItem('bp_emp_name') || "Khách Vãng Lai";

        let currentRoom = ""; let realtimeChannel = null; let avatarMap = {};
        const chatBox = document.getElementById('chatBox');

        window.onload = () => {
            init3DBackground();
            loadDanhBa();
        };

        function formatTime(isoString) {
            const date = isoString ? new Date(isoString) : new Date();
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
        }
        function getChatRoomId(id1, id2) { return [id1, id2].sort().join('_'); }
        function forceScrollToBottom() { setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 100); }

        // ==========================================
        // 1. TẢI DANH BẠ 
        // ==========================================
        async function loadDanhBa() {
            try {
                // Tải tin nhắn cuối của Kênh Chung
                const { data: globalMsg } = await supabase.from('messages').select('content, sender_name').eq('room', 'KenhChung').order('timestamp', { ascending: false }).limit(1).maybeSingle();
                if (globalMsg) {
                    let preview = globalMsg.content.includes('/storage/v1/object/public/') ? '[Hình ảnh]' : globalMsg.content;
                    document.getElementById('last_msg_KenhChung').innerHTML = `<span class="text-white">${globalMsg.sender_name}:</span> ${preview}`;
                }

                // Tải danh bạ
                const { data: users, error } = await supabase.from('employees').select('ma_nv, ho_ten, linh_vuc, avatar_url');
                if (!error && users) {
                    let html = '';
                    for (const u of users) {
                        if (u.avatar_url) avatarMap[u.ma_nv] = u.avatar_url;
                        if (u.ma_nv === myId) continue;

                        const roomId = 'Room_' + getChatRoomId(myId, u.ma_nv);
                        const { data: lastMsg } = await supabase.from('messages').select('content, sender_email').eq('room', roomId).order('timestamp', { ascending: false }).limit(1).maybeSingle();

                        let previewText = "Nhấn để trò chuyện...";
                        let unreadDot = "";

                        if (lastMsg) {
                            previewText = lastMsg.content.includes('/storage/v1/object/public/') ? '[Đã gửi một hình ảnh]' : lastMsg.content;
                            if (lastMsg.sender_email !== myId) {
                                previewText = `<span class="text-white font-bold drop-shadow-md">${previewText}</span>`;
                                unreadDot = `<div class="w-2.5 h-2.5 rounded-full bg-rose-500 shrink-0 shadow-[0_0_8px_rgba(244,63,94,0.8)] animate-pulse"></div>`;
                            } else {
                                previewText = `Bạn: ${previewText}`;
                            }
                        }

                        const defaultAvt = `https://ui-avatars.com/api/?name=${encodeURIComponent(u.ho_ten)}&background=1E293B&color=06b6d4&bold=true`;
                        const avatarContent = `<img src="${u.avatar_url || defaultAvt}" class="w-full h-full object-cover">`;

                        html += `
                        <div onclick="openChat('${roomId}', '${u.ho_ten}', '${u.avatar_url || defaultAvt}')" class="flex items-center gap-4 p-3 rounded-3xl bg-white/5 border border-white/5 cursor-pointer active:scale-95 transition-all hover:bg-white/10 group">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center overflow-hidden border-2 border-transparent group-hover:border-cyan-500 transition-colors shrink-0 shadow-inner">
                                ${avatarContent}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-center mb-1">
                                    <h4 class="font-bold text-white text-sm truncate pr-2 group-hover:text-cyan-300 transition-colors">${u.ho_ten}</h4>
                                    ${unreadDot}
                                </div>
                                <p class="text-[11px] text-gray-400 truncate">${previewText}</p>
                            </div>
                        </div>`;
                    }
                    document.getElementById('danh_ba_nhan_su').innerHTML = html;
                }
            } catch (e) { showToast("Lỗi tải danh bạ!", "error"); }
        }

        // ==========================================
        // 2. MỞ PHÒNG CHAT & LOAD LỊCH SỬ CHAT
        // ==========================================
        async function openChat(room_id, room_name, avatar_url = "") {
            currentRoom = room_id;
            document.getElementById('chat_title').innerText = room_name;

            const chatIconDiv = document.getElementById('chat_icon');
            if (room_id === 'KenhChung') {
                chatIconDiv.innerHTML = '<i class="fas fa-bullhorn text-xl"></i>';
                chatIconDiv.className = "w-11 h-11 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center text-white font-bold overflow-hidden border-2 border-[#08061a] shadow-md shrink-0 transform -rotate-6";
            } else {
                chatIconDiv.innerHTML = `<img src="${avatar_url}" class="w-full h-full object-cover">`;
                chatIconDiv.className = "w-11 h-11 rounded-full flex items-center justify-center text-white font-bold overflow-hidden border-2 border-[#08061a] shadow-md shrink-0";
            }

            document.getElementById('screen_contacts').classList.remove('active');
            document.getElementById('screen_chat').classList.add('active');
            document.getElementById('chat_status').innerText = 'Syncing...';

            chatBox.innerHTML = '<div class="text-center text-xs text-cyan-500/70 my-6 font-bold uppercase tracking-widest animate-pulse"><i class="fas fa-satellite fa-spin mr-2"></i>Đang lấy dữ liệu vệ tinh...</div>';

            try {
                const { data: messages, error } = await supabase.from('messages').select('*').eq('room', currentRoom).order('timestamp', { ascending: true }).limit(100);

                if (!error && messages) {
                    chatBox.innerHTML = '<div class="text-center text-[9px] font-black text-gray-500 my-6 uppercase tracking-[0.2em] bg-white/5 inline-block px-4 py-1.5 rounded-full mx-auto border border-white/5 flex justify-center w-fit"><i class="fas fa-lock text-cyan-500 mr-2"></i> Đoạn chat mã hóa 2 đầu</div>';
                    messages.forEach(msg => renderMessage(msg));
                    forceScrollToBottom();
                }
            } catch (err) { showToast("Lỗi load đoạn chat!", "error"); }

            setupRealtime();
        }

        function closeChat() {
            document.getElementById('screen_chat').classList.remove('active');
            document.getElementById('screen_contacts').classList.add('active');
            if (realtimeChannel) supabase.removeChannel(realtimeChannel);
            loadDanhBa();
        }

        // ==========================================
        // 3. KÊNH REALTIME
        // ==========================================
        function setupRealtime() {
            document.getElementById('chat_status').innerText = 'Online';
            realtimeChannel = supabase.channel('chat_phong_' + currentRoom)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room=eq.${currentRoom}` }, (payload) => {
                    if (payload.new.sender_email !== myId) {
                        renderMessage(payload.new); forceScrollToBottom();
                    }
                }).subscribe();
        }

        // ==========================================
        // 4. GỬI TIN NHẮN CHỮ
        // ==========================================
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('msgInput');
            const msgText = input.value.trim();
            if (!msgText) return;

            input.value = '';
            const newMsgObj = { room: currentRoom, sender_email: myId, sender_name: myName, content: msgText, timestamp: new Date().toISOString() };

            renderMessage(newMsgObj); forceScrollToBottom();
            await supabase.from('messages').insert([newMsgObj]);
        });

        // ==========================================
        // 5. UPLOAD ẢNH (GIAO DIỆN LIGHTBOX MỚI)
        // ==========================================
        async function uploadImage(input) {
            const file = input.files[0]; if (!file) return;

            const tempId = 'upload_' + Date.now();
            chatBox.innerHTML += `<div id="${tempId}" class="flex justify-end mt-3"><div class="max-w-[80%] flex flex-col items-end"><div class="text-[10px] text-cyan-400 bg-cyan-900/30 border border-cyan-500/30 px-4 py-2.5 rounded-2xl animate-pulse font-bold tracking-widest"><i class="fas fa-spinner fa-spin mr-2"></i>UPLOADING...</div></div></div>`;
            forceScrollToBottom();

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${myId}_${Date.now()}.${fileExt}`;

                const { data, error } = await supabase.storage.from('chat_images').upload(fileName, file);
                if (error) throw error;

                const { data: publicUrlData } = supabase.storage.from('chat_images').getPublicUrl(fileName);
                const imageUrl = publicUrlData.publicUrl;

                const newMsgObj = { room: currentRoom, sender_email: myId, sender_name: myName, content: imageUrl, timestamp: new Date().toISOString() };
                await supabase.from('messages').insert([newMsgObj]);

                document.getElementById(tempId).remove();
                renderMessage(newMsgObj); forceScrollToBottom();
            } catch (error) {
                document.getElementById(tempId).innerHTML = `<div class="text-rose-400 text-[10px] bg-rose-500/10 px-3 py-2 rounded-xl border border-rose-500/30">Lỗi up ảnh! Kiểm tra mạng.</div>`;
            }
            input.value = '';
        }

        // ==========================================
        // 6. RENDER TIN NHẮN LÊN MÀN HÌNH
        // ==========================================
        function renderMessage(data) {
            const isMe = data.sender_email === myId;
            let contentHTML = "";

            if (data.content && data.content.startsWith('http') && data.content.includes('/storage/v1/object/public/')) {
                // Đổi window.open thành onclick="openLightbox(...)"
                contentHTML = `<img src="${data.content}" onload="forceScrollToBottom()" class="max-w-[240px] w-full rounded-2xl border border-white/10 shadow-lg mt-1 cursor-pointer hover:opacity-80 transition object-cover bg-black/50" onclick="openLightbox(this.src)">`;
            } else {
                contentHTML = `<div class="${isMe ? 'chat-bubble-me text-white' : 'chat-bubble-other text-gray-200'} px-4 py-3 text-sm shadow-md mb-0.5 break-words inline-block leading-relaxed">${data.content}</div>`;
            }

            const timeStr = formatTime(data.timestamp);
            let html = '';

            if (isMe) {
                html = `
                <div class="flex justify-end mt-3">
                    <div class="max-w-[85%] flex flex-col items-end">
                        ${contentHTML}
                        <p class="text-[9px] font-bold text-gray-500 pr-2 mt-1 uppercase tracking-wider">${timeStr} <i class="fas fa-check-double text-cyan-500/50 ml-0.5"></i></p>
                    </div>
                </div>`;
            } else {
                const senderAvatarUrl = avatarMap[data.sender_email];
                const defaultAvt = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.sender_name || '?')}&background=1E293B&color=06b6d4&bold=true`;
                const finalAvatarHTML = `<img src="${senderAvatarUrl || defaultAvt}" class="w-full h-full object-cover">`;

                html = `
                <div class="flex justify-start gap-3 mt-4">
                    <div class="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center text-xs mt-1 shrink-0 overflow-hidden border border-gray-600 shadow-md">
                        ${finalAvatarHTML}
                    </div>
                    <div class="max-w-[80%] flex flex-col items-start">
                        <p class="text-[10px] text-cyan-400 mb-1 ml-1 font-black tracking-widest uppercase opacity-80">${data.sender_name}</p>
                        ${contentHTML}
                        <p class="text-[9px] font-bold text-gray-500 pl-2 mt-1 uppercase tracking-wider">${timeStr}</p>
                    </div>
                </div>`;
            }
            chatBox.innerHTML += html;
        }

        // ==========================================
        // 7. TIỆN ÍCH EMOJI
        // ==========================================
        function addEmoji(emoji) {
            const input = document.getElementById('msgInput');
            input.value += emoji; input.focus();
        }
    </script>
</body>

</html>
